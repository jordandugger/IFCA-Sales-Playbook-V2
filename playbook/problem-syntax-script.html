      "If they say \"No\" \u2014 it is their loss. I am not attached to the outcome."
    ]},
    {t:"coach",c:"You are a doctor, not a salesperson. A doctor diagnoses before prescribing. Never answer 'how much?' or 'what's included?' before you've completed discovery. If they ask early: \"Everything we do is customized to your situation \u2014 so honestly, I'm not even sure we can help until I understand where you're at. Let me ask you a few more questions.\""},
    {t:"beliefs",label:"THE 7 BELIEFS \u2014 PRE-CALL CHECKLIST",coach:"Every objection you receive traces back to one of these 7 beliefs not being fully built in discovery. Your job during discovery is to build all 7 BEFORE the pitch. Problem Syntax closers especially need to nail Beliefs #1 (Pain), #2 (Doubt), and #3 (Cost) \u2014 these are the beliefs most likely to be weak with established coaches who think they can fix it themselves.",rows:[
      {n:1,name:"Pain (The Gap)",desc:"They believe there is a severe gap between where they are and where they want to be"},
      {n:2,name:"Doubt",desc:"They believe they cannot fix this alone \u2014 DIY wastes time, money, and energy"},
      {n:3,name:"Cost",desc:"They believe inaction is MORE expensive than the investment"},
      {n:4,name:"Desire",desc:"They are emotionally connected to the payoff of making this work"},
      {n:5,name:"Money",desc:"They have resources and are willing to invest"},
      {n:6,name:"Support",desc:"Spouse or stakeholders will support the decision"},
      {n:7,name:"Trust (Methodology)",desc:"They believe IFCA's specific method is the only logical path forward"}
    ]},
    {t:"train",title:"You Are a Doctor, Not a Salesperson \u2014 The Diagnostic Mindset",c:`<p>Problem Syntax prospects already have a business. They've already tried things. They've already paid for tools, agencies, courses, and other coaches. <strong>They are not coming to you to be sold to.</strong> They are coming to you to be diagnosed.</p>
<p>Your job on this call is identical to a doctor's: ask precise questions, gather data, run tests (the calculator), identify the root cause, and prescribe the cure. If you skip the diagnostic and jump to the prescription \u2014 you sound like every other coach who's tried to sell them on a "system" before. The pitch fails because they've heard it. The diagnostic is what makes you different.</p>
<div class="train-callout"><strong>The mental shift:</strong> stop trying to convince them they need help. Their presence on the call already says they need help. Your job is to find out <em>where</em> the leak is with surgical precision, show it to them in their own numbers, and let the math do the closing work.</div>
<p><strong>What this looks like in practice:</strong></p>
<ul>
<li>You ask about offer + pricing + ICA \u2014 not because you're nosy, but to triage between Constraint 1 (positioning) and a downstream issue.</li>
<li>You ask about lead source + ad spend + CPL \u2014 to triage between Constraint 2 (traffic) and a pipeline issue.</li>
<li>You ask about calls booked + showed + closed \u2014 to triage between Constraints 3 (pipeline) and 4 (sales).</li>
<li>You ask about retention + back-end \u2014 to triage Constraint 5 (LTV).</li>
</ul>
<p>By the time you finish discovery, the calculator has already told you which of the five constraints is the Silver Bullet. The pitch from that point on is just walking them through the cure for the specific disease you diagnosed.</p>`},
    {t:"train",title:"The 5 Constraints \u2014 Memorize These",c:`<p>Every stuck online fitness coaching business has one of five primary structural leaks. Internalize these so you can hear which one a prospect has within the first 5 minutes of discovery.</p>
<table class="train-table"><thead><tr><th>#</th><th>Constraint</th><th>Verbal Signals on Calls</th><th>KPI Signature</th></tr></thead><tbody>
<tr><td>1</td><td><strong>Offer / Positioning</strong></td><td>"I keep attracting the wrong people" \u00b7 "My offer used to convert" \u00b7 "I'm getting price-shoppers"</td><td>Live Close Rate low + CPA high + cash collection low</td></tr>
<tr><td>2</td><td><strong>Lead Generation</strong></td><td>"My CPL is climbing" \u00b7 "I got burned by an agency" \u00b7 "I rely on referrals" \u00b7 "I'm not getting enough calls"</td><td>CPL above funnel benchmark + Cost/Live Call critical</td></tr>
<tr><td>3</td><td><strong>Pipeline / Show Rate</strong></td><td>"Leads don't book" \u00b7 "Calls ghost me" \u00b7 "Leads slip through the cracks" \u00b7 "I'm drowning in apps"</td><td>Lead\u2192Book below 25% OR Show Rate below 70%</td></tr>
<tr><td>4</td><td><strong>Sales Conversion</strong></td><td>"I'm good on calls but can't close" \u00b7 "I keep hearing 'I need to think about it'" \u00b7 "Close rate is 15-20%"</td><td>Live Close Rate below 30%</td></tr>
<tr><td>5</td><td><strong>Back-End / LTV</strong></td><td>"Clients leave after a few months" \u00b7 "I'm always starting over" \u00b7 "I don't have a back-end"</td><td>LTV:CAC below 3:1 + low FE\u2192BE conversion</td></tr>
</tbody></table>
<div class="train-callout"><strong>The funnel-priority rule:</strong> fix upstream constraints before downstream ones. A coach with broken Lead\u2192Book AND broken Live Close Rate gets the Pipeline fix first \u2014 because no amount of close rate improvement helps if the leads never made it to a call. The calculator follows this logic automatically when identifying the Silver Bullet.</div>`}
  ]},
  {id:1,name:"Open",sub:"\u2264 2 MIN",color:"#0d9488",blocks:[
    {t:"coach",c:"Keep this tight. Your only goal here is to establish you're a professional who's done their homework, then transition immediately to frame setting. Read the application before the call. Know their revenue range, what they're selling, and what problem they listed. They should feel like you're already prepared. Never go past 2 minutes."},
    {t:"say",c:`"Hey [Name] \u2014 [Your Name] here. Nice to finally connect. Whereabouts are you located?"\n[prospect responds]\n\n"Have you ever come across Jordan or Erin before, or did someone refer you over?"\n[prospect responds]`}
  ]},
  {id:2,name:"Frame Setting",sub:"",color:"#7c3aed",blocks:[
    {t:"coach",c:"This is the most important 30 seconds of the call. The 'I'll tell you if we CAN'T help you' line drops the guard. It repositions you from salesperson to trusted advisor. Do NOT rush. Wait for a genuine yes before continuing."},
    {t:"say",c:`"Awesome. So before we dive in \u2014 I did pull up your application and got a quick overview of where you're at and what you're working on."\n\n"Just so you know how these calls typically go \u2014 I'm going to ask you some questions about what's working, what's not, what your numbers look like, and what your goals are."\n\n"And if I feel like we're a fit and I can actually help you move the needle, I'll let you know. But if at any point I don't think we're the right solution, I'll tell you that too and point you in the right direction."\n\n"Does that sound fair?"\n[Wait for yes \u2014 then move forward]`}
  ]},
  {id:3,name:"Discovery",sub:"Problem Syntax \u2014 5 Blocks",color:"#1d4ed8",blocks:[
    {t:"coach",c:"In Problem Syntax, the prospect already HAS a business. The problem is a broken piece of an existing one \u2014 not the absence of a business. Discovery job: (1) understand their current offer + numbers, (2) find the specific constraint causing the revenue problem, (3) expose the gap, (4) build the cost of inaction so staying stuck feels worse than investing. Build all 7 Beliefs here. Don't rush."},
    {t:"opening",c:`"Okay \u2014 so a good place to start: what's the main challenge you've been running into with the business right now, or what's the main thing that motivated you to book this call today?"\n[prospect responds \u2014 let them talk fully before you say anything]\n\n[If vague:] "What do you mean by that \u2014 tell me more." / "How long has that been going on?" / "Give me a specific example \u2014 like what happened last week?"`},
    {t:"block",num:1,label:"OFFER & BACKGROUND",belief:"BELIEF #1: PAIN",bc:"#dc2626",
      coach:"Understand what they're selling, who they're selling it to, and how they've priced it. This diagnoses whether the constraint is an offer/positioning problem or a distribution problem. Key signals: Low price point = Pillar 1 problem. Wrong leads = offer/messaging problem. No back-end = LTV problem. Weak sales process = Pillar 4 problem. Ask these conversationally \u2014 not like a checklist.",
      c:`"Got it. So let's back up a second \u2014 what exactly are you selling right now, and who specifically are you selling it to?"\n[prospect responds]\n\n"And what's the price point on that?"\n[prospect responds]\n\n"How did you land on that number \u2014 who taught you that pricing?"\n[prospect responds]\n\n"And who's your ideal client \u2014 if you paint a picture of the perfect person you want to work with, what does that look like?"\n[prospect responds]\n\n"Are the people you're actually attracting right now matching that picture, or are you getting a different type of person showing up?"\n[prospect responds]\n\n"Walk me through your sales process \u2014 how does someone go from finding you to becoming a paying client?"\n[prospect responds]\n\n"And do you have a back-end offer \u2014 once someone finishes with you, is there a next step you're offering them?"\n[prospect responds]`},
    {t:"block",num:2,label:"CHUNK DOWN TO NUMBERS",belief:"BELIEFS #1 & #3: PAIN, COST",bc:"#dc2626",
      coach:"This is where you identify the constraint with precision. Vague problems don't create urgency \u2014 specific numbers do. As they give you numbers, enter them in the Problem Syntax Calculator silently. First set the <strong>Funnel Type</strong> dropdown (DM / Follower / VSL / Masterclass) \u2014 this calibrates the CPL benchmark to their reality. Then Lead\u2192Book, Show Rate, and Live Close Rate tell you exactly which pillar to lead with. Benchmarks: CPL varies by funnel · Lead\u2192Book \u2265 25% · Show Rate \u2265 70% · Live Close Rate \u2265 30%.",
      c:`"How are you generating most of your leads right now \u2014 primarily paid ads, organic content, referrals, or a mix?"\n[prospect responds]\n\n[IF RUNNING PAID ADS:]\n"What platform are you running on?"\n"What's your monthly ad spend right now?"\n"And roughly what are you paying per lead \u2014 do you know your CPL?"\n"What's your ROAS looking like \u2014 for every dollar you put in, how much are you getting back?"\n"Are you running those yourself or through an agency?"\n[If agency:] "And what's your experience been \u2014 are you happy with what they're delivering?"\n\n[IF ORGANIC ONLY:]\n"How often are you posting right now?"\n"Are you seeing actual results from it \u2014 DMs coming in, calls booked? Or more just likes and followers?"\n"What's your follower count on your main platform?"\n\n"Okay \u2014 and in terms of actual sales calls, how many are you getting per week right now?"\n[prospect responds]\n\n"And out of those calls, what percentage are actually your ideal client?"\n[prospect responds]\n\n"And what's your rough close rate \u2014 out of every 10 calls you take, how many are you closing?"\n[prospect responds]\n\n"When calls don't close \u2014 what's the most common reason you're hearing?"\n[prospect responds]`},
    {t:"calc",tab:"Problem Syntax Calculator \u00b7 Inputs Panel",quickAction:"Open <strong>Problem Syntax Calculator</strong> tab. Set <strong>Funnel Type</strong> dropdown to match (DM / Follower / VSL / Masterclass). Silently fill inputs as they answer: FE Rate \u00d7 FE Length, Ad Spend, Paid Leads, Organic Leads, Calls Booked, Calls Showed, Closes, Cash Collected, BE Rate, BE Length, Resign %.",action:"Open the <strong>Problem Syntax Calculator</strong> tab in the calculator. <strong>Step 1:</strong> Set the <strong>Funnel Type</strong> dropdown in Section 1 (Their Offer) \u2014 DM Funnel / Follower Funnel / VSL Funnel / Masterclass Funnel. This single field changes the CPL benchmark and the \"lead\" label across the calculator so the numbers match their reality. <strong>Step 2:</strong> Fill the inputs across all 5 sections as they talk: Their Offer (FE Rate, FE Length), Lead Generation (Ad Spend, Paid Leads, Organic Leads), Pipeline (Calls Booked, Calls Showed), Sales Conversion (Closes, Cash Collected), Back-End/LTV (BE Rate, BE Length, Resign %). The auto-readouts under each section give you live KPIs as you type \u2014 CPL, Lead\u2192Book, Show, Live Close Rate, CPA, LTV, LTV:CAC. <strong>Do NOT click Share View yet</strong> \u2014 you're building the diagnostic privately while they keep talking.",
      note:"You don't need every input. The minimum viable diagnostic is: Funnel Type + Ad Spend + Paid Leads + Calls Booked + Calls Showed + Closes + FE Rate + FE Length. That alone gives you 7 of the 9 KPIs and surfaces the Silver Bullet. The BE/LTV fields are bonus depth for Constraint 5 diagnosis (back-end / retention). If they don't know a number cold, skip it \u2014 don't break flow asking for precision they don't have."},
    {t:"train",title:"Why the Funnel Type Dropdown Matters",c:`<p>A $25 CPL means three completely different things depending on the funnel. The calculator handles this for you via the funnel-type dropdown \u2014 but you need to understand <strong>why</strong> so you can talk about it confidently when prospects ask.</p>
<table class="train-table"><thead><tr><th>Funnel</th><th>What "Lead" Means</th><th>CPL Target</th></tr></thead><tbody>
<tr><td><strong>DM Funnel</strong></td><td>DM conversation started / opt-in via DM automation</td><td>&lt;$10 healthy · $10-18 warn · &gt;$18 fail</td></tr>
<tr><td><strong>Follower Funnel</strong></td><td>New follower from boosted post / awareness ad</td><td>&lt;$2 healthy · $2-4 warn · &gt;$5 fail</td></tr>
<tr><td><strong>VSL / Landing Page</strong></td><td>Form fill / direct calendar booking</td><td>Derived from CAC chain (often $50-100 healthy on a $6K offer)</td></tr>
<tr><td><strong>Masterclass / Webinar</strong></td><td>Webinar registrant</td><td>&lt;$15 healthy · $15-25 warn · &gt;$25 fail</td></tr>
</tbody></table>
<p>The reason this matters on a call: when a prospect says <em>"my CPL is $40"</em> \u2014 that's a disaster for a DM funnel but probably healthy for a VSL funnel on a $6K offer. If you don't ask funnel type first, you'll diagnose the wrong constraint.</p>
<div class="train-callout"><strong>The deeper truth:</strong> CPL alone is never the decision metric. It only means something when benchmarked against (a) offer price, (b) close chain conversion, and (c) funnel type. The calculator's CAC Chain readout shows you all four numbers \u2014 Max CAC, Max Cost per Qualified Call, Max Cost per Booked Call, Max CPL \u2014 derived live from their inputs. Always cross-reference.</div>`},
    {t:"block",num:3,label:"COST OF INACTION",belief:"BELIEFS #2 & #3: DOUBT, COST",bc:"#9f1239",
      coach:"This is where you make the cost of staying stuck feel more real than the cost of investing. Don't rush. The Knife Turn is the most powerful moment of the call \u2014 ask it once, cleanly, then sit in silence. Let them feel the weight of their own answer.",
      c:`"How long have you been dealing with this?"\n[prospect responds]\n\n"And in that time \u2014 what have you tried to fix it? Like what have you already done to try to solve this?"\n[prospect responds]\n\n"And none of it got you where you wanted to go?"\n[prospect responds]\n\n"Can I ask you something a little more personal? You've been at this [X months/years], you've tried [recap what they mentioned]... what's kept you going instead of just throwing in the towel?"\n[prospect responds \u2014 let them articulate why it matters. This builds Belief #4: Desire.]`},
    {t:"rule",c:"THE KNIFE TURN \u2014 Do NOT rush this. Ask it. Then sit in complete silence. After they answer, run the amplification beat \u2014 don't move on with just 'yeah.' The follow-up makes them feel the cost in their own voice. That feeling is what closes the call later."},
    {t:"say",c:`"I hate to ask this, but I have to \u2014 what's your plan if nothing changes?"\n\n"If the next 12 months look exactly like the last 12... what does that actually cost you? Like financially, but also personally."\n[Long pause. Let them answer. Let them feel it.]\n\n"And how does that hit you when you actually say it out loud?"\n[Pause again. Let them sit with their own words. Don't rescue them.]\n\n"Yeah. That's exactly why you booked this call."`},
    {t:"calc",tab:"Problem Syntax Calculator \u2192 View 1: KPI Health (Closer-Side Only)",quickAction:"Click <strong>View 1: KPI Health</strong>. <strong>DO NOT share screen.</strong> Read the <strong>\ud83c\udfaf Silver Bullet</strong> callout at the top \u2014 that's the constraint to lead Full on. Note any P2/P3 constraints for secondary pillar emphasis.",action:"Click <strong>View 1: KPI Health</strong> in the calculator. <strong>This is your private diagnostic \u2014 DO NOT click Share View yet.</strong> Look at the top of the view: the <strong>\ud83c\udfaf Silver Bullet callout</strong> names the primary constraint, gives you their number vs. the benchmark in plain English, and tells you which pillar to lead Full on. Below it is the CAC Chain readout (Max CAC \u2192 Max Cost/Qualified Call \u2192 Max Cost/Booked Call \u2192 Max CPL) anchored to their offer price \u2014 useful if they ask you to defend the math later. Below that are 9 KPIs in three sections (Funnel Flow / Acquisition Economics / Offer & LTV Economics) each with a color-coded severity badge: <span class=\"sev-mini crit\">CRITICAL</span> <span class=\"sev-mini brk\">BROKEN</span> <span class=\"sev-mini gap\">GAP</span> <span class=\"sev-mini ok\">OK</span>. The Silver Bullet is the first <span class=\"sev-mini crit\">CRITICAL</span> or <span class=\"sev-mini brk\">BROKEN</span> KPI in funnel-priority order. Secondary constraints are visually demoted \u2014 hover them to see full detail. Stay private. The share moment is View 2 next.",
      note:"The Silver Bullet routing follows funnel-priority order: Lead\u2192Book \u2192 Book\u2192Show \u2192 Live Close Rate \u2192 CPL \u2192 Cost/Live Call \u2192 CPA \u2192 Cash Coll % \u2192 LTV \u2192 LTV:CAC. Upstream constraints have to be fixed before downstream ones \u2014 fixing Live Close Rate on bad-fit leads doesn't help if Lead\u2192Book is broken. The calculator does this routing for you. If Cost Per Live Call is failing, the calculator shows a yellow diagnosis box naming which of three causes is most likely (pricing / lead\u2192book / Live Close Rate). Read that before deciding which pillar to lead."},
    {t:"train",title:"How to Read the Silver Bullet \u2014 The 5 Constraints Framework",c:`<p>Every stuck online fitness coaching business has <strong>one primary structural leak</strong>. Fix it and the next level unlocks. Try to fix everything at once and nothing changes. The job of the Problem Syntax Calculator is to surface that one leak \u2014 the <strong>Silver Bullet</strong> \u2014 so the pitch can lead with the pillar that directly fixes it.</p>
<p>The five constraints, ranked in funnel-priority order (upstream first):</p>
<table class="train-table"><thead><tr><th>Constraint</th><th>What's Broken</th><th>Pillar That Fixes It</th></tr></thead><tbody>
<tr><td><strong>1. Offer / Positioning</strong></td><td>Wrong leads, ghosters, price-shoppers, low cash collection</td><td>Pillar 1 \u2014 AI Offer Optimization</td></tr>
<tr><td><strong>2. Lead Generation</strong></td><td>CPL too high, low volume, agency-burned, referral-dependent</td><td>Pillar 2 \u2014 Lead Generation Engine</td></tr>
<tr><td><strong>3. Pipeline / Show Rate</strong></td><td>Leads don't book, booked calls ghost, ops chaos with 5+ apps</td><td>Pillar 3 \u2014 Impact AI Business Manager</td></tr>
<tr><td><strong>4. Sales Conversion</strong></td><td>Live Close Rate below 30%, losing winnable calls</td><td>Pillar 4 \u2014 Conversion + Retention</td></tr>
<tr><td><strong>5. Back-End / LTV</strong></td><td>No back-end, low resign rate, churn within first 12 months</td><td>Pillar 4 \u2014 LTV Retention Method</td></tr>
</tbody></table>
<div class="train-callout"><strong>Why upstream-first matters:</strong> If Lead\u2192Book is broken and you sell them on a sales-call closing pillar (P4), you're putting more effort into converting fewer opportunities. The math doesn't compound. Always fix the first leak in funnel order \u2014 the one above the next leak.</div>
<p><strong>Severity tiers \u2014 what each means in pitch terms:</strong></p>
<ul>
<li><span class="sev-mini crit">CRITICAL</span> \u2014 40%+ below benchmark (or 75%+ above for cost metrics). This is the bleeding wound. Lead the pitch on the matching pillar. Spend 2-3 minutes on Full mode.</li>
<li><span class="sev-mini brk">BROKEN</span> \u2014 15-40% below benchmark. Meaningful leak but not life-threatening. If no Critical exists, this becomes the Silver Bullet. If a Critical exists upstream, mention this briefly in Quick mode.</li>
<li><span class="sev-mini gap">GAP</span> \u2014 within 15% of benchmark. Worth noting but doesn't move pillar lead choice.</li>
<li><span class="sev-mini ok">OK</span> \u2014 at or above benchmark. Acknowledge it to build momentum \u2014 <em>"your show rate is actually really strong"</em> before you transition to what's broken.</li>
</ul>`},
    {t:"block",num:4,label:"SUPPORT CHECK",belief:"BELIEF #6: SUPPORT",bc:"#d97706",
      coach:"Surface the spouse/partner situation NOW \u2014 before the pitch, before the price. If you don't, you'll hit the 'I need to talk to my partner' objection at price drop with zero ammunition. Keep this casual \u2014 15 to 20 seconds.",
      c:`"Quick question before we talk about what's possible \u2014 is this a decision you'd be able to make on your own, or would your partner be involved in something like this?"\n[prospect responds]\n\n[If partner involved:] "And if this made complete sense for you and you felt like it was the right move \u2014 would they generally trust your judgment on a business investment like this?"\n[prospect responds]`},
    {t:"block",num:5,label:"GOALS & DESIRE",belief:"BELIEFS #4 & #5: DESIRE, MONEY",bc:"#16a34a",
      coach:"Get them to build the vision in their OWN words. 'Why that number?' is the question most closers skip \u2014 it's where the real emotional driver lives. You'll use their exact language in the Hamburger Transition.",
      c:`"Okay \u2014 so let's flip to the other side. If we could fix [their stated constraint] and build out the full system... what does your business look like in the next 90 days?"\n[prospect responds]\n\n"And if we zoom out to 12 months from now \u2014 what's the revenue number you're going after?"\n[prospect responds]\n\n"Why that number specifically \u2014 what does hitting that actually change for you?"\n[Let them go deeper. Don't rush this. Their answer becomes your desire anchor and your Hamburger Transition language.]\n\n"Beyond the revenue \u2014 like personally, what's different when the business is where you want it?"\n[prospect responds]`}
  ]},
  {id:4,name:"Constraint ID",sub:"Find the Silver Bullet",color:"#b45309",blocks:[
    {t:"coach",c:"This phase is internal \u2014 you don't announce it to the prospect. Before entering the pitch, silently confirm the primary constraint (\ud83c\udfaf Silver Bullet) you identified in discovery. This determines which pillar you lead with, how you frame the Problem Linking, and where you put the most emotional emphasis. Problem Syntax rule: every single pillar gets problem-linked back to their specific constraint. You are not delivering a generic pitch \u2014 you are showing them how each piece solves their exact problem. The Silver Bullet pillar gets Full mode + the most emotional weight + the Calculator View 3 reveal afterward. Everything else runs Quick."},
    {t:"constraint",rows:[
      {type:"Traffic / Lead Gen",looks:"CPL above funnel benchmark, low lead volume, no paid lead engine",pillar:"Lead with Pillar 2 \u2014 Lead Engine"},
      {type:"Pipeline / Show Rate",looks:"Leads not booking calls (Lead\u2192Book broken) or booked calls ghosting (Show Rate broken)",pillar:"Lead with Pillar 3 \u2014 Impact AI Business Manager"},
      {type:"Sales Conversion",looks:"Live Close Rate below 30%, losing winnable calls, can't structure pitch",pillar:"Lead with Pillar 4 \u2014 Conversion System"},
      {type:"Offer / Positioning",looks:"Wrong leads, price shoppers, ghosting after calls, low cash collection",pillar:"Lead with Pillar 1 \u2014 AI Offer Optimization"},
      {type:"Back-End / LTV",looks:"No retention system, clients leave after first offer, LTV:CAC below 3:1",pillar:"Lead with Pillar 4 \u2014 LTV Retention Method"}
    ]},
    {t:"calc",tab:"Problem Syntax Calculator \u2192 View 2: The Constraint (First Share Moment)",quickAction:"Click <strong>View 2: The Constraint</strong> \u2192 Click <strong>\u2b9a Share View</strong> \u2192 Share screen \u2192 <em>\u201cI noticed something while we were talking \u2014 let me show you the silver bullet.\u201d</em> \u2192 5 sec silence \u2192 <em>\u201cThat's the leak. That one number is what's pulling the entire business off-track.\u201d</em>",action:"Click <strong>View 2: The Constraint</strong> in the calculator. Click <strong>\u2b9a Share View</strong> in the header to hide the inputs panel (this is what makes the calculator look clean to the prospect \u2014 just the constraint card). Share your screen. Say: <em>\"I noticed something while we were talking \u2014 let me show you the silver bullet.\"</em> Then <strong>go silent for 5 full seconds.</strong> The constraint card shows them three things at once: the constraint name (\"Live Close Rate is the leak\"), their number (red) vs. industry benchmark (green), and a <strong>visual gap bar</strong> showing how far below benchmark they are. Below that is a plain-English narrative like <em>\"You need to 2.3\u00d7 this metric to hit benchmark.\"</em> Let it sit. Then deliver: <em>\"That's the leak. And that one number is what's pulling the entire business off-track.\"</em> Builds Belief #1 (Pain) by making the gap visceral and Belief #3 (Cost) by making it undeniable. If they have secondary constraints, the <strong>\"Show secondary constraints\"</strong> toggle reveals them \u2014 only expand it if they ask about other numbers or you want to flag what's coming next in the pitch.",
      note:"Don't narrate the math. Just show the constraint card and stay quiet. If they ask 'what's the benchmark from?' \u2014 'IFCA students hitting their goal numbers + industry data across thousands of calls.' Don't get defensive about the data \u2014 the math is the math. <strong>Resist the urge to fix the awkward silence.</strong> Five seconds will feel like thirty. That's the work. They have to feel it before they'll commit to fixing it."},
    {t:"train",title:"View 2 \u2014 Why the Visual Gap Bar Closes Calls",c:`<p>The Constraint card in View 2 is built specifically to bypass intellectual resistance. Here's the mechanic:</p>
<ul>
<li><strong>The number alone is too abstract.</strong> "15% close rate" sounds technical. They can rationalize it.</li>
<li><strong>The benchmark comparison side-by-side</strong> creates an immediate gap perception. "Mine is 15%, healthy is 35%" \u2014 now there's a delta.</li>
<li><strong>The visual gap bar</strong> turns that delta into a felt experience. Their red marker on the left, the green benchmark marker on the right, daylight in between. The eye does the math the prospect won't admit out loud.</li>
<li><strong>The plain-English narrative</strong> ("You need to 2.3\u00d7 this metric to hit benchmark") makes the size of the gap impossible to dismiss.</li>
</ul>
<div class="train-callout"><strong>Why we share at this moment specifically:</strong> we just ran the Knife Turn ("what's your plan if nothing changes?"). They're emotionally open. The Constraint card validates everything they just felt \u2014 their pain has a name now, and it's not their fault, it's a structural leak. That validation is what makes the pitch land. Show it any earlier and it feels like a sales pitch. Show it any later and the emotional charge has dissipated.</div>
<p><strong>If they're a tough customer who pushes back on the data:</strong> the secondary constraint toggle is your ally. Open it and say: <em>"This isn't the only thing \u2014 here's what else surfaced. But the one above is the bleeding wound. Everything else gets easier once it's fixed."</em> Most prospects soften when they see you're not selling them on one cherry-picked metric.</p>`},
  ]},
  {id:5,name:"Hamburger Transition",sub:"",color:"#15803d",blocks:[
    {t:"coach",c:"The bridge from diagnostic mode to pitch mode \u2014 without it feeling like a sales pitch. Three parts: (1) recap their pain in their exact words, (2) position IFCA's process as the precise answer, (3) invite them to walk through it. They will always say yes. If they said 'I feel like I've been doing everything right but nothing is working' \u2014 say that back. Not a cleaned-up version. Their words are more powerful than yours."},
    {t:"say",c:`"Look \u2014 I feel like we've covered a lot of ground here. Is there anything else you feel like we haven't touched on that I need to know about your situation?"\n[prospect responds \u2014 usually 'No, I think that covers it']\n\n"Well, [Name], based on everything you've told me, I think what I have going on over here might actually be a really good fit for you."\n\n"...because you know how earlier you mentioned [RECAP THEIR #1 PAIN IN THEIR EXACT WORDS]..."\n[prospect: yeah, exactly]\n\n"Our entire system at IFCA is built specifically for the problem you just described \u2014 it's a proven, four-step process that helps online fitness coaches [reach their stated goal] without [their stated frustration]."\n\n"This way, instead of spending months \u2014 or years \u2014 trying to piece this together through trial and error, we help you build it right from the beginning. Make sense?"\n[prospect: yes]\n\n"Cool \u2014 where do you want to go from here? I can walk you through exactly how we make that happen from A to Z. But you tell me."\n[They will say: walk me through it]\n\n"Perfect. Do you have a pen and paper? Great \u2014 write down 1 through 4 with some space between each."`}
  ]},
  {id:6,name:"The Pitch",sub:"4 Client Engine Pillars",color:"#4338ca",blocks:[
    {t:"pitch-sop",c:"In Problem Syntax, your Problem Syntax Calculator already told you which pillar is the \ud83c\udfaf Silver Bullet. That pillar gets Full \u2014 go deep, link directly to their number. All other pillars run Quick unless they surfaced a secondary concern in discovery. Discovery mode is most powerful here when the prospect used specific emotional language about why their current approach isn't working \u2014 mirror that language back in the pillar that matches. <strong>Reminder on flow:</strong> after your Silver Bullet pillar runs Full, click into Calculator View 3 (Cost of the Leak) before moving to the next pillar \u2014 that's where the monthly + annual cost lands. The pillars that come after it should run Quick to preserve momentum into the close."},
    {t:"sec",label:"HIGH LEVEL PROMISE",
      c:`"Before I walk you through the four things \u2014 let me just preface this."\n\n"The moment you enroll, the first thing we do is pair you with a 1-on-1 Success Coach who has already built a six or seven-figure fitness coaching business themselves. They are your guide through everything. Every piece of what I'm about to walk you through gets shaped and personalized by them, starting from day one."\n\n"So this might look slightly different once we map out your specific situation \u2014 but based on everything you've shared, here's what I think it looks like for you..."`},
    {t:"pillar",num:1,label:"AI OFFER OPTIMIZATION",
      sop_hint:"Lead here if wrong leads, price shoppers, ghosting, or ICA mismatch is the \ud83c\udfaf Silver Bullet. Your calculator dashboard told you this is the root problem \u2014 use Full and link directly to their specific messaging issue. Quick if offer/ICA is solid and the constraint is downstream (traffic, pipeline, sales). Use the Discovery Hook in Full mode if they used specific emotional language about attracting the wrong person.",
      hook:[
        "\"Remember when you said you keep attracting the wrong type of leads or getting ghosted after calls?\"",
        "\"You mentioned your offer used to convert at [X%] and now it doesn't \u2014 that's exactly what step one solves.\"",
        "\"Earlier you said you keep getting price-shoppers \u2014 that's almost always positioning, not pricing.\""
      ],
      when:"\ud83c\udfaf Silver Bullet is Offer / Positioning \u2014 wrong-fit leads, ghosting, ICA mismatch, or low cash collection. Run Quick if offer/ICA is solid and the constraint is clearly downstream.",
      quick:`"Number one \u2014 AI Offer Optimization. {{r}}Established coaches whose offer USED to convert often have a positioning problem they don't know they have \u2014 markets shift, language gets stale, the buyer gets more sophisticated. So suddenly the same offer that closed at 30\u201340% is now attracting price-shoppers and ghosters. Most coaches blame the leads, the market, or the algorithm \u2014 it's almost always positioning.{{/r}} {{g}}In your first 48 hours, your Success Coach pressure-tests your existing offer 1-on-1 using our AI Offer Optimizer. We sharpen the ICA, modernize the messaging, and rebuild the positioning so the right buyers self-qualify before they ever book a call. Most established coaches see a 30 to 50% lift in close rate just from this.{{/g}} {{tie}}Does it make sense to start there before we touch your lead engine \u2014 so we're not pouring more spend into a leaky offer?{{/tie}}"`,
      full:`"Number one \u2014 and this is where we start on day one \u2014 is AI Offer Optimization."\n\n"Here's what's almost always happening when an established coach starts getting wrong leads, price shoppers, or ghosting after calls: it's a positioning problem, not a marketing problem. Markets shift. Buyers get more sophisticated. Language that worked 18 months ago feels generic now. The offer that USED to close at 30\u201340% is now attracting people who shop on price or never book the second call. Most coaches blame the leads, the market, or the algorithm \u2014 but it's the offer that's drifted out of sync."\n\n"Now \u2014 compare that to what most established coaches do when their pipeline starts to slow. Option one: spend more on ads to get more of the same wrong-fit leads. Option two: drop their price and compete in the commodity bucket they were trying to escape. Option three: hire an agency that doesn't understand their offer and just pumps cold traffic in. None of those work because they all skip the positioning fix."\n\n"What we do instead: in your first 48 hours, your Success Coach sits with you 1-on-1 using our AI Offer Optimizer. We pressure-test your current offer, sharpen your ICA, modernize the messaging, and rebuild the positioning so the right buyers are pre-qualified before they ever book a call. Most established coaches we work with see a 30 to 50% lift in close rate just from this fix \u2014 because the people booking calls are the right people."\n\n"For most coaches trying to figure this out alone, this takes months of A/B testing and trial-and-error. You get it done in 48 hours."\n\n{{tie}}"When the right buyer is self-qualifying before they book \u2014 instead of you spending the call trying to convince a price-shopper \u2014 does that change what your close rate looks like?"{{/tie}}\n[Wait for response before moving to Pillar 2]`},
    {t:"pillar",num:2,label:"LEAD GENERATION ENGINE",
      sop_hint:"Lead here if CPL is above funnel benchmark, Cost Per Live Call is critical, lead volume is the constraint, or they got burned by an agency. Go Full and make clear the difference is we BUILD with them \u2014 not a playbook handoff. Quick if traffic is healthy and the constraint is pipeline or close rate. Use the Discovery Hook in Full mode if they specifically mentioned agency burn or rising CPL.",
      hook:[
        "\"Remember when you said your CPL has been climbing or your ad spend stopped converting?\"",
        "\"You mentioned you got burned by an agency \u2014 I want to walk you through exactly why that happens and why this is structurally different.\"",
        "\"Earlier you said your referral flow has dried up and you're one quiet month from a revenue cliff \u2014 this is the structural fix.\""
      ],
      when:"\ud83c\udfaf Silver Bullet is Lead Generation \u2014 CPL above funnel benchmark, Cost Per Live Call critical, low lead volume, agency burn, or referral-dependent. Run Quick if traffic is healthy.",
      quick:`"Number two \u2014 your Lead Engine. {{r}}Most established coaches whose ad performance has slipped end up in one of three traps. They keep spending into a stale offer and watch CPL climb. They hire an agency \u2014 most coaches we talk to spent $5K-$10K with one and got zero clients because agencies don't understand fitness offers and run cold ads to a market that doesn't trust them yet. Or they go back to relying on referrals \u2014 great until referrals dry up, and now you're one quiet month from a revenue cliff.{{/r}} {{g}}What makes this different: we don't hand you a playbook. We build campaigns with you \u2014 your voice, your offer, your audience \u2014 step by step until creative is converting. We cover your first month of ad spend. Goal: 150 to 500 qualified leads per month, with a stable predictable CPL inside the first 60 days.{{/g}} {{tie}}Does the difference between an agency running cold ads and us building campaigns specifically around your offer feel meaningful?{{/tie}}"`,
      full:`"Number two \u2014 the Lead Engine. And this is the one I want to spend time on, because it's where most established coaches I talk to have already been burned at least once."\n\n"Here's what most coaches at your level have already tried. Option one: keep spending into ads themselves and watch CPL climb because the messaging is stale or generic. Option two: hire an agency \u2014 and I'll be honest, most coaches we talk to spent $5,000 to $10,000 with an agency and got close to zero clients out of it. Why? Because agencies don't understand coaching offers. They're messaging specialists, not fitness specialists. They run cold ads to a market that doesn't trust you yet, the leads come in generic, and your close rate craters. Option three: go back to relying on referrals \u2014 great when they're flowing, but referrals dry up, and suddenly you're one quiet month from a revenue cliff."\n\n"Now \u2014 compare that to what we actually do. We don't hand you a playbook. We don't take over your ad account and run cold campaigns at you. We build the campaigns WITH you \u2014 your voice, your specific offer, your exact audience \u2014 step by step until the creative is actually converting. We dial in the targeting, refine the copy, test the hooks. We even cover your first month of ad spend so we have skin in the game."\n\n"And critically: we don't run ads until we know the offer is converting. Either through reactivating dormant network for warm clients first, or content that's already working organically. By the time we turn ads on, we know exactly what message lands \u2014 not 'we hope something works.'"\n\n"The goal is 150 to 500 qualified leads per month with a stable, predictable CPL inside 60 days. Most established coaches we work with hit that. No more revenue cliffs. No more referral droughts."\n\n{{tie}}"When you compare the agency model \u2014 cold ads, generic leads, no understanding of your offer \u2014 to building campaigns specifically around your voice and proven creative: does that change how you'd feel about scaling spend on this?"{{/tie}}\n[Wait for response]`},
    {t:"calc",tab:"Problem Syntax Calculator \u2192 View 3: Cost of the Leak (After Silver Bullet Pillar)",quickAction:"Click <strong>View 3: Cost of the Leak</strong> \u2192 <em>\u201cLook at what fixing just this one thing does to your numbers.\u201d</em> \u2192 5 sec silence \u2192 <em>\u201cThat's $X every month you're leaving on the table while we wait.\u201d</em>",action:"Click <strong>View 3: Cost of the Leak</strong>. You're already in Share View from earlier \u2014 the inputs are hidden, the prospect sees the clean reveal. Two big hero cards on screen: <strong>Current Monthly Contracted</strong> (red, big) on the left, showing where they are right now, with their failing metric named underneath. <strong>Lost Every Month to the Leak</strong> (amber, big) on the right, showing what they're leaving on the table monthly while the constraint stays broken. Below both: a footer line showing the <strong>12-month annual cost</strong>. Say: <em>\"Look at what fixing just this one thing does to your numbers.\"</em> Then <strong>go silent for 5 full seconds.</strong> Let them do the math themselves. Then deliver the cost: <em>\"That's [annual cost number] in contracted revenue you're leaving on the table every year this stays broken. And that's just from fixing the one thing \u2014 we haven't even talked about what stacking the other pillars does on top.\"</em> Builds Belief #3 (Cost of Inaction) and Belief #7 (Trust the methodology).",
      note:"Don't narrate the math. Don't explain the projection. Just point to the gap between red and amber. If they ask 'is that realistic?' \u2014 'These are <em>your</em> inputs. The only thing that changes is the Silver Bullet metric hitting the average we see across IFCA students.' Don't oversell. <strong>The annual number under the cards is the kicker</strong> \u2014 it converts abstract monthly leak into a 12-month figure that's much harder to dismiss. If they go quiet after seeing it, do not fill the silence. Their internal math is doing the closing work."},
    {t:"train",title:"View 3 \u2014 What the Projection Actually Calculates",c:`<p>View 3 isn't a hypothetical \u2014 it's a math projection using <strong>their inputs</strong>. Here's exactly what changes between current and projected:</p>
<ul>
<li><strong>If Lead\u2192Book is the Silver Bullet:</strong> calculator assumes their leads stay the same, but Lead\u2192Book hits 25% benchmark. The downstream show rate and Live Close Rate stay at their current numbers. Projected closes = leads \u00d7 25% \u00d7 their current show rate \u00d7 their current close rate. Revenue = projected closes \u00d7 their package price.</li>
<li><strong>If Live Close Rate is the Silver Bullet:</strong> shows stay the same, but Live Close Rate moves from their actual to 35% benchmark. Projected closes = their actual showed calls \u00d7 35%.</li>
<li><strong>If CPL is the Silver Bullet:</strong> ad spend stays the same, but CPL moves to the funnel-specific benchmark. More leads at the same spend \u2192 more bookings \u2192 more shows \u2192 more closes. The full downstream cascade.</li>
</ul>
<p>The point: every projection holds everything else constant and shows what changing ONLY the Silver Bullet does. That's why the math is defensible \u2014 you're not stacking improvements, you're showing the ROI on fixing one thing.</p>
<div class="train-callout"><strong>The "monthly leak" framing is intentional.</strong> Most coaches think about revenue annually or by launch. Reframing it as "you're losing $12K every month this stays broken" makes inaction feel daily and expensive. The annual number underneath ($144K) is the macro version. Both numbers together force the prospect to compute: <em>"the investment is $X. The leak is $144K/year. The math is obvious."</em> That's how the calculator does the closing work without you having to argue.</div>
<p><strong>Edge case \u2014 if the Silver Bullet is LTV or Cash Coll %:</strong> the calculator can't project a "new monthly contracted" cleanly because those metrics don't directly affect close count. In those cases, View 3 still shows current contracted vs. lost-leak, but the projection logic treats the Silver Bullet as a multiplier on LTV stacking or upfront cash position rather than new closes. If View 3 shows minimal change for these cases, that's by design \u2014 the real ROI shows up in View 4 (12-month reveal) where the LTV/cash math compounds over time.</p>`},
    {t:"pillar",num:3,label:"IMPACT AI BUSINESS MANAGER",
      sop_hint:"Lead here if Lead\u2192Book or Book\u2192Show is the \ud83c\udfaf Silver Bullet \u2014 leads are coming in but not converting to booked calls, OR booked calls aren't showing. Also lead here if operational chaos is causing leak (5+ disconnected apps). Quick if pipeline is healthy. Use the Discovery Hook in Full mode if they specifically mentioned losing leads in follow-up or operational chaos.",
      hook:[
        "\"Remember when you said leads keep slipping through the cracks or your show rate's been dropping?\"",
        "\"You mentioned your team's spending too many hours on operational stuff that should be automated \u2014 this is exactly that fix.\"",
        "\"Earlier you said your follow-up has been inconsistent because you're running too many tools \u2014 this is the consolidation.\""
      ],
      when:"\ud83c\udfaf Silver Bullet is Pipeline \u2014 Lead\u2192Book broken, Book\u2192Show below 70%, or they explicitly said \"leads are slipping\" / \"team's drowning in ops.\" Run Quick otherwise.",
      quick:`"Number three \u2014 Impact AI Business Manager. {{r}}Most established coaches at your level have 5 to 10 different apps duct-taped together \u2014 CRM here, payments there, scheduling separate, follow-up automation on yet another platform. Each one's $30 to $300 a month. None of them talk to each other cleanly. Leads slip through the cracks between apps. A lead comes in Monday and by Wednesday they've gone cold because the follow-up failed. Your team spends hours per week reconciling data across systems instead of moving the business forward.{{/r}} {{g}}One AI-powered platform replaces all of it. CRM, payments, scheduling, email, SMS, automation, course delivery \u2014 all integrated. $1 a month while you're enrolled. Most established coaches save $500 to $2,000 a month in tool costs alone and reclaim 10+ hours of team time per week.{{/g}} {{tie}}Does that simplification feel like it would unlock more capacity for the parts of the business you actually want to be working on?{{/tie}}"`,
      full:`"Number three \u2014 Impact AI Business Manager. And this is the one most established coaches don't think about until it's already costing them deals."\n\n"Best way to describe it: think of it like MyFitnessPal \u2014 but for your business. MyFitnessPal puts everything about your health in one place. Impact AI Business Manager does the same for your coaching business. CRM, payments, scheduling, client management, DM automations, email follow-up, course delivery \u2014 all integrated, all talking to each other."\n\n"Now \u2014 compare that to what most coaches at your level are running. They've got 5 to 10 different apps duct-taped together. Calendly, Stripe, Kajabi, ActiveCampaign, Trainerized, Slack, separate landing page tool, separate funnel builder. Each one $30 to $300 a month \u2014 you're paying $500 to $2,000 a month just in tool costs. Worse than the cost: nothing talks to each other cleanly. So a lead comes in on Monday from your ad \u2014 lands in one tool. Tries to book \u2014 different tool. Pays \u2014 third tool. Gets onboarded \u2014 fourth tool. By Wednesday, the data is fragmented across five systems and your team is spending hours per week reconciling it. Worse, leads slip through the cracks because the follow-up sequence didn't fire when it was supposed to. That's not a hustle problem \u2014 that's an infrastructure problem. And it's a hidden ceiling on growth that most coaches don't even see."\n\n"Impact AI Business Manager replaces all of it. One platform, one source of truth, automation that actually fires when it's supposed to. $1 a month while you're with us. Most established coaches save $500 to $2,000 a month in tool costs alone, and reclaim 10+ hours of team time per week."\n\n"And critically: we set it up FOR you. Dedicated 1-on-1 tech onboarding call within your first 7 days. You're not figuring this out alone."\n\n{{tie}}"When you picture every lead landing in one place, automatically nurtured, with your team focused on revenue work instead of reconciling spreadsheets \u2014 does that feel like a meaningful unlock?"{{/tie}}\n[Wait for response]`},
    {t:"pillar",num:4,label:"CONVERSION + RETENTION",
      sop_hint:"Lead here if <strong>Live Close Rate</strong> below 30% is the \ud83c\udfaf Silver Bullet (lead Part 1 \u2014 closing on call) and go Full. Or lead here if no back-end / clients leave fast / LTV:CAC below 3:1 is the \ud83c\udfaf Silver Bullet (lead Part 2 \u2014 retention) and go Full. Quick if both close rate and retention are healthy. Use the Discovery Hook in Full mode if they specifically mentioned losing winnable calls or no back-end.",
      hook:[
        "\"Remember when you said you know you're losing people somewhere on calls but you can't see exactly where?\"",
        "\"You mentioned your clients finish your program and just leave \u2014 there's no obvious next step. This is exactly that fix.\"",
        "\"Earlier you said you feel like you're always running just to stand still \u2014 acquiring just to replace what's leaving. That's the retention piece.\""
      ],
      when:"\ud83c\udfaf Silver Bullet is Live Close Rate below 30% (lead Part 1) OR retention/LTV:CAC below 3:1 / no back-end (lead Part 2). Run Quick if both are healthy.",
      quick:`"Number four \u2014 Conversion and Retention. {{r}}Industry close rate is 10\u201320% and industry retention is 9 months. So even when leads come in, established coaches are losing more than half of them on calls AND losing the ones they close before they're profitable. That's why most coaches plateau \u2014 they're acquiring at the same speed as they're losing, running just to stand still. Both problems are usually invisible: you know your close rate is 'low' but you don't know exactly where on the call you're losing people, and you assume retention is 'normal' until you do the math.{{/r}} {{g}}Two parts. Part one: unlimited 1-on-1 call reviews \u2014 we listen to your actual recorded calls and tell you exactly where you're losing people. Our coaches close 30\u201350%, doubling income off the same call volume. Part two: LTV Retention System extends average client tenure to 17+ months. 10 clients at $2K/month over 17 months = $34K each in lifetime value, not $6K. That changes the entire business math.{{/g}} {{tie}}When you compare 10\u201320% close + 9-month retention to 30\u201350% close + 17-month retention \u2014 what does that do to the size of the business you're actually building?{{/tie}}"`,
      full:`"And number four \u2014 the Conversion and Retention System. This last piece is the difference between a coaching business that compounds and one that always feels like it's about to fall apart."\n\n"Two parts."\n\n"Part one: closing more of your calls. Industry average for established coaches is 10 to 20%. Our coaches close 30 to 50%. The difference isn't talent \u2014 it's a proven sales process and the reps to make it feel completely natural. You get our DM and sales call scripts built specifically for fitness coaches. And then we do unlimited 1-on-1 call reviews \u2014 our coaches listen to your actual recorded calls and tell you exactly what to say, where you're losing people, and how to handle objections without ever feeling pushy."\n\n"Now \u2014 compare that to what most established coaches do alone. They wing every call. They freeze when objections come up. They assume 'people aren't ready' instead of seeing they're losing winnable calls every single week. They get on 10 calls and close 2. They blame the leads. The leads were fine. The conversation wasn't. Without an outside ear on the tape, you genuinely cannot see where you're losing people \u2014 because you're inside the moment when it happens. The call reviews are the fix."\n\n"Part two: keeping clients longer. Most established coaches are so focused on closing the next call that they never built a back-end. Industry average retention is 9 months. So you spend month 1\u20133 onboarding, month 4\u20136 they get results, month 7\u20139 they leave. You're starting over every quarter. That's not a business \u2014 that's a treadmill."\n\n"Compare that to what we install: our LTV Retention System helps you design a back-end offer so clients don't just finish their program and leave \u2014 they resign into the next phase. Our students keep clients for an average of 17+ months. Think about what that means for your math: 10 clients at $2,000 a month, 17-month average retention \u2014 each client is worth $34K in lifetime value, not $6K from a short program. That's a real, compounding business."\n\n{{tie}}"When you compare what most established coaches get going at it alone \u2014 10\u201320% close, 9-month retention, plateau at $20\u201330K/mo \u2014 to 30\u201350% close and 17-month retention with a coached system: does that change the size of the business you can actually build?"{{/tie}}\n[Wait for response]`},
    {t:"sec",label:"DELIVERY + RECAP",
      c:`"One quick thing \u2014 do you currently have an app where you can deliver your coaching programs, track your clients' progress, and communicate with them all in one place?"\n[If no:] "Perfect \u2014 we'll get you set up on Trainerize. It's pre-built for fitness coaches, we have a partnership so you get it at a significant discount, and we onboard you onto it alongside your Success Coach."\n[If yes:] "Great \u2014 we can work with what you've got."\n\n"So to recap: offer dialed in so every piece of marketing lands. Your first campaigns built and launched with our coaching \u2014 first month of ad spend covered. One AI platform replacing all your tools and catching every lead automatically. And a sales and retention system that gets you closing 30 to 50% of calls and keeping clients 17-plus months."\n\n"Everything is completely customized to your situation. Once you enroll, we'll book your onboarding call with your Success Coach. We map out your entire 90-day game plan \u2014 what we do for you, what we need from you, how often we meet, and what happens first. Zero guesswork."\n\n"Does that sound good?"\n[Wait for yes \u2014 if they hesitate, surface the concern NOW before moving to price]`}
  ]},
  {id:7,name:"Committing Phase",sub:"Price Drop",color:"#b91c1c",blocks:[
    {t:"sec",label:"TEMP CHECK \u00b7 ALWAYS",
      c:`"Before I share the investment \u2014 quick gut check on where you're at."\n\n"On a scale of 1 to 10 \u2014 where do you fall in terms of alignment with what we do?"\n[ALWAYS ask this. Do not skip even if they seem enthusiastic. This is the gate before price \u2014 running it prevents 80% of post-price objections.]\n\n[If 8+] "Good \u2014 let's get into next steps."\n[If less than 8:] "What would make it a 10 for you?"\n[Surface the hidden objection NOW \u2014 before the price.]`},
    {t:"calc",tab:"Problem Syntax Calculator \u2192 View 4: Silver Bullet ROI (Pre-Price Reveal)",quickAction:"Click <strong>View 4: Silver Bullet ROI</strong> \u2192 <em>\u201cBefore we talk about next steps \u2014 let me leave you with two numbers.\u201d</em> \u2192 5 sec silence \u2192 <em>\u201cThat's the cost of leaving it. And that's the path to closing it.\u201d</em> \u2192 Drop price.",action:"Click <strong>View 4: Silver Bullet ROI</strong>. Already in Share View. Two big hero cards on screen: <strong>12-Month Cost of Leaving the Leak In</strong> (red, big) on the left \u2014 the full annual cost of staying broken. <strong>12-Month Path to Closing It</strong> (green, big) on the right \u2014 contracted revenue if the Silver Bullet is fixed, with two sub-cards underneath: <strong>New Monthly</strong> and <strong>Net Swing</strong>. Say: <em>\"Before we talk about next steps \u2014 let me leave you with two numbers.\"</em> Then <strong>go silent for 5 full seconds.</strong> The numbers do all the work \u2014 don't narrate them. Then deliver the bridge: <em>\"That's the cost of leaving the leak in. And that's the path to closing it.\"</em> Pause one beat. Then drop price. Builds final urgency right before commitment by anchoring the investment against the swing.",
      note:"Do not narrate the numbers a second time \u2014 they did the work in View 3 already. The closer cue is silence \u2192 one bridge sentence \u2192 price drop. If they push back on price, point to the red number: <em>'How much does that gap cost you every month it stays unfixed?'</em> Let the data do the arguing. The Net Swing sub-card (the +$X/mo number) is your secondary anchor \u2014 if they say 'I don't have the cash,' that's the number you point to: <em>'You're swinging that every month within 90 days. That's the cash plan.'</em>"},
    {t:"train",title:"View 4 \u2014 The 12-Month Reveal as the Final Trust Anchor",c:`<p>View 4 is the most powerful moment of the calculator because it does two things simultaneously:</p>
<ul>
<li><strong>Anchors the cost of inaction at the annual level</strong> (red number) \u2014 not "you're losing $12K a month" but "you're losing $144K this year if nothing changes."</li>
<li><strong>Anchors the upside of action at the annual level</strong> (green number) \u2014 showing what the same business looks like with the Silver Bullet fixed.</li>
</ul>
<p>The Net Swing sub-card under the green number quantifies the monthly delta. That's the number that makes the investment feel obviously survivable. <em>"You're swinging $12K extra per month. The investment is $X. Net positive within month one."</em> You don't have to say that out loud \u2014 they're already doing the math.</p>
<div class="train-callout"><strong>Why this specifically pre-price:</strong> the price drop is the highest-tension moment of the call. The prospect's natural reaction is contraction \u2014 they're about to commit money. View 4 pre-emptively reframes the price <em>before</em> they hear it. By the time you say the number, they're not comparing it to nothing \u2014 they're comparing it to a 12-month swing they just visualized. That math always wins.</div>
<p><strong>What to do if View 4 doesn't show big enough numbers:</strong> two checks. (1) Are their inputs realistic? Sometimes prospects under-report ad spend or close rate \u2014 ask, gently. (2) Is the package price set correctly in the calculator? A low package price compresses the swing. Confirm before the reveal. If both are right and the math just isn't big, you have a low-ticket prospect \u2014 the Silver Bullet pitch isn't the right frame for them, and that may be a non-fit you flag honestly.</p>`},
    {t:"rule",c:"After you drop the price \u2014 STOP. Complete silence. The first person to speak loses the momentum. Every single time, no exceptions."},
    {t:"sec",label:"PRICE DROP",
      c:`"So basically next steps \u2014 you'll process the investment with me today, we'll get your onboarding call scheduled, and you'll have complete clarity on everything that happens over the next six months. Does that sound good?"\n[wait for yes]\n\n"And the investment is just [PRICE]."\n[STOP. SILENCE. Let them speak first.]\n\n[When they agree but go quiet:] "Can I just welcome you to the family?"\n[If yes:] "Perfect. What's a good email to send the receipt to? And what card do you want to put down?"`}
  ]},
  {id:8,name:"Objection Handling",sub:"",color:"#374151",blocks:[
    {t:"coach",c:"Before running any specific objection playbook, ALWAYS run the Master Sequence first. It confirms they want the result and positions the objection as a problem to solve together \u2014 not a wall between you. Every real objection is one of four types: Fear, Money, Spouse/Partner, or Ego. Identify which one you're dealing with, then run the right playbook."},
    {t:"rule",c:"NEVER book a follow-up for a fear-based objection. A follow-up doesn't fix fear \u2014 it gives fear more time to solidify. Handle it on the call or lose the deal."},
    {t:"sec",label:"MASTER SEQUENCE \u2014 RUN FIRST ON EVERY OBJECTION",
      c:`"[Objection] aside \u2014 do you feel this is exactly what you need to solve [their constraint] and hit [their goal]?"\n"So you're 100% in on the process... it's just a matter of solving [objection], and then you're ready to move forward. Is that right?"\n[Now you're problem-solving together \u2014 not fighting]`},
    {t:"obj",label:"'I NEED TO THINK ABOUT IT' \u2014 Fear Objection",
      c:`Phase 1 \u2014 Clarify:\n"I completely understand. Out of curiosity \u2014 what specifically is it that you'd like to think about?"\n[Let them answer]\n\nPhase 2 \u2014 Isolate:\n"Got it. So outside of [what they said] \u2014 is there anything else holding you back?"\n\nPhase 3 \u2014 Reframe:\n"Here's what I've noticed \u2014 people who say they need to think about it are usually asking one of two questions: 'Will this actually work for me?' Or: 'Can I actually afford this right now?' Which one is it for you?"\n\nPhase 4 \u2014 The Cost Flip:\n"Here's what I've found: the coaches who keep saying 'let me think about it' are usually the same ones still figuring this out 12 months from now. What's another year of staying where you are actually cost you?"`},
    {t:"obj",label:"MONEY \u2014 TRIPLE TIE-DOWN",
      c:`Step 1 \u2014 Isolate: "Investment aside \u2014 is there anything else that would keep you less than 100% certain that you'd want to work with us to help you get to [their goal]? Or is it just a cash flow thing?"\n\nStep 2 \u2014 Tie Down: "I'm curious \u2014 if you had $[PRICE] completely liquid to you right now... would you do it? Would you say you're 10/10 on the process specifically?"\n\nPermission Bridge: "Got it. The last thing we want is for finances to be the thing that holds you back from getting the help you need. I do have some flexibility here to create something custom for you to make it more digestible. I don't have an option A or option B or anything set in stone... so do you mind if I ask you a personal question?"\n\nOpen Wallet: "Just so I can see if I can help \u2014 what would you have available to you today in terms of cash on hand? Checking, savings, or even credit via credit cards?"\n[Probe 3 buckets: checking / savings / credit]\n\nStep 3 \u2014 Close: "I appreciate you being open and honest. If I was able to break this up and allow you in today \u2014 we'll still treat you like you paid in full. If I can make this more digestible based on what you have, would you be ready to get started today?"`},
    {t:"obj",label:"SPOUSE OBJECTION",
      c:`[Path A \u2014 Haven't talked yet:]\n"Totally get it. Can I ask \u2014 is it more that you need to loop them in out of respect, or is it that they would actually have concerns you'd need to address?"\n[If it's respect:] "Understood. So it's more of a formality \u2014 you just want them in the loop. Is that fair? Let's make sure this makes complete sense for YOU first. What's holding you back personally?"\n\n[Path B \u2014 They have concerns:]\n"What do you think their biggest concern would be? Let's talk through that now so you're completely prepared."`},
    {t:"obj",label:"EGO OBJECTION \u2014 'I Can Figure This Out Myself'",
      c:`"I love that confidence \u2014 honestly. And you probably could figure parts of it out. Can I ask you something honestly?"\n\n"How long have you been working on this specific problem? And how far along are you?"\n[Let them answer]\n\n"So what makes you think the next 6 months are going to be different from the last [X months]?"\n[Pause]\n\n"The issue isn't your ability. It's that you're solving a systems problem with hustle. The system is what's missing \u2014 not your work ethic."`}
  ]}
];

function fmt(t){if(!t)return '';return t.split('\n\n').map(p=>{const h=p.split('\n').map(l=>l.replace(/\[([^\]]+)\]/g,'<span class="cue">[$1]</span>')).join('<br>');return`<p>${h}</p>`;}).join('');}
function fmtDisc(t){if(!t)return '';return t.split('\n\n').map(p=>{const h=p.split('\n').map(l=>l.replace(/\[([^\]]+)\]/g,'<span class="disc-bracket">[$1]</span>')).join('<br>');return`<p>${h}</p>`;}).join('');}
function fmtPitch(t){if(!t)return '';return t.split('\n\n').map(p=>{const h=p.split('\n').map(l=>l.replace(/\{\{r\}\}/g,'<span class="contrast">').replace(/\{\{\/r\}\}/g,'</span>').replace(/\{\{g\}\}/g,'<span class="new-way">').replace(/\{\{\/g\}\}/g,'</span>').replace(/\{\{tie\}\}/g,'<span class="tie-line">').replace(/\{\{\/tie\}\}/g,'</span>').replace(/\[([^\]]+)\]/g,'<span class="cue">[$1]</span>')).join('<br>');return`<p>${h}</p>`;}).join('');}

let globalPM='quick';const pillarModes={};
function getPM(n){return pillarModes[n]||globalPM;}
function setGlobalPM(m){
  globalPM=m;
  ['quick','full'].forEach(x=>{const b=document.getElementById('ptgl-'+x);if(b)b.classList.toggle('active',x===m);});
  for(let i=1;i<=4;i++){if(!pillarModes[i])updatePD(i);}
}
function setPM(n,m){if(m===null){delete pillarModes[n];}else{pillarModes[n]=m;}updatePD(n);updatePOB(n);}
function updatePD(n){const m=getPM(n);const el=document.getElementById('pillar-p'+n);if(!el)return;el.querySelectorAll('.pm-block').forEach(b=>b.classList.remove('pm-visible'));const a=el.querySelector('.pm-'+m+'-block');if(a)a.classList.add('pm-visible');}
function updatePOB(n){const ov=pillarModes[n]||null;const el=document.getElementById('pillar-p'+n);if(!el)return;el.querySelectorAll('.pmo-btn[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===ov));}
function initPMs(){for(let i=1;i<=4;i++){updatePD(i);updatePOB(i);}}

function renderBlock(b,pc){
  switch(b.t){
    case 'say': return`<div class="block-say"><div class="say-label">SAY THIS</div><div class="say-text">${fmt(b.c)}</div></div>`;
    case 'coach': return`<div class="block-coach coach-only"><div class="coach-head"><span class="coach-lbl">📝 Coaching Note</span></div><div class="coach-body">${b.c}</div></div>`;
    case 'pitch-sop': return`<div class="block-coach coach-only"><div class="coach-head"><span class="coach-lbl">📝 Pitch Mode Guide — Problem Syntax</span></div><div class="coach-body">${b.c}</div></div>`;
    case 'rule': return`<div class="block-rule"><div class="rule-lbl">⚠ RULE</div><div class="rule-body">${b.c}</div></div>`;
    case 'calc': return`<div class="block-calc"><div class="calc-head"><span class="calc-icon">📊</span><div class="calc-info"><div class="calc-tab">Open: ${b.tab}</div><div class="calc-action calc-action-quick">${b.quickAction||b.action}</div><div class="calc-action calc-action-full">${b.action}</div></div></div>${b.note?`<div class="calc-note">${b.note}</div>`:''}</div>`;
    case 'opening': return`<div class="block-opening"><div class="opening-head"><div class="opening-lbl">Opening Question</div></div><div class="opening-body"><div class="block-say" style="background:transparent;border:none;padding:0"><div class="say-text">${fmt(b.c)}</div></div></div></div>`;
    case 'block':{const cs=`background:${b.bc}18;color:${b.bc}`;return`<div class="block-disc"><div class="disc-head"><div class="disc-num" style="background:${pc}">${b.num}</div><div class="disc-lbl">${b.label}</div><span class="belief-chip" style="${cs}">${b.belief}</span></div><div class="disc-body">${b.coach?`<div class="block-coach coach-only"><div class="coach-head"><span class="coach-lbl">📝 Coaching Note</span></div><div class="coach-body">${b.coach}</div></div>`:''}<div class="block-say" style="background:transparent;border:none;padding:0"><div class="say-text">${fmt(b.c)}</div></div></div></div>`;}
    case 'support': return`<div class="block-support"><div class="support-lbl">Support Check</div><div class="btext">${fmt(b.c)}</div></div>`;
    case 'sec': return`<div class="block-sec"><div class="sec-head"><div class="sec-lbl">${b.label}</div></div><div class="sec-body"><div class="block-say" style="background:transparent;border:none;padding:0"><div class="say-text">${fmt(b.c)}</div></div></div></div>`;
    case 'pillar': {const hookHtml=b.hook?`<div class="hook-box"><div class="hook-lbl">Optional Discovery Hook \u00b7 Pick one if it matches</div><div class="hook-intro">Mirror their exact words from discovery. Skip if none of these came up.</div><ul class="hook-list">${b.hook.map(h=>`<li>${h}</li>`).join('')}</ul></div>`:'';const whenHtml=b.when?`<div class="when-bar"><strong>Run Full If</strong><span>${b.when}</span></div>`:'';return`<div class="block-pillar" id="pillar-p${b.num}"><div class="pillar-head"><div class="pillar-num">${b.num}</div><div class="pillar-lbl">${b.label}</div><div class="pillar-mode-btns"><button class="pmo-btn" data-mode="quick" title="Quick" onclick="setPM(${b.num},'quick')">\u26a1</button><button class="pmo-btn" data-mode="full" title="Full" onclick="setPM(${b.num},'full')">\ud83d\udccb</button><button class="pmo-btn pmo-reset" title="Reset to global" onclick="setPM(${b.num},null)">\u21ba</button></div></div>${b.sop_hint?`<div class="pillar-sop-hint"><div class="coach-lbl">\ud83d\udcdd When to Use Each Mode</div><div class="coach-body">${b.sop_hint}</div></div>`:''}<div class="pm-block pm-quick-block"><div class="pm-tag pm-quick-tag">\u26a1 Quick</div><div class="pm-text">${fmtPitch(b.quick)}</div></div><div class="pm-block pm-full-block"><div class="pm-tag pm-full-tag">\ud83d\udccb Full</div>${hookHtml}<div class="pm-text">${fmtPitch(b.full)}</div></div>${whenHtml}</div>`;}
    case 'obj': return`<div class="block-obj"><div class="obj-head"><div class="obj-lbl">${b.label}</div></div><div class="obj-body"><div class="block-say" style="background:transparent;border:none;padding:0"><div class="say-text">${fmt(b.c)}</div></div></div></div>`;
    case 'list': return`<div class="block-list"><div class="list-title">${b.label}</div><ul class="closer-beliefs">${b.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
    case 'beliefs': return`<div class="block-beliefs"><div class="beliefs-label">${b.label}</div>${b.coach?`<div class="block-coach coach-only"><div class="coach-head"><span class="coach-lbl">📝 Coaching Note</span></div><div class="coach-body">${b.coach}</div></div>`:''}<table class="beliefs-table"><thead><tr><th>#</th><th>Belief</th><th>What It Means</th><th>✓</th></tr></thead><tbody>${b.rows.map(r=>`<tr><td class="b-num">${r.n}</td><td class="b-name">${r.name}</td><td class="b-desc">${r.desc}</td><td class="b-check" onclick="this.textContent=this.textContent==='☐'?'✅':'☐'">☐</td></tr>`).join('')}</tbody></table></div>`;
    case 'constraint': return`<div class="block-constraint"><div class="constraint-header"><div class="constraint-title">Constraint → Lead Pillar Matrix</div></div><table class="constraint-table"><thead><tr><th>Constraint Type</th><th>What It Looks Like</th><th>Lead With</th></tr></thead><tbody>${b.rows.map(r=>`<tr><td class="ct-type">${r.type}</td><td class="ct-looks">${r.looks}</td><td class="ct-pillar">${r.pillar}</td></tr>`).join('')}</tbody></table></div>`;
    case 'train': return`<div class="block-train"><div class="train-head"><span class="train-icon">📚</span><span class="train-lbl">Closer Training</span><span class="train-title">${b.title||''}</span></div><div class="train-body">${b.c}</div></div>`;
    default: return '';
  }
}

function pitchGuideHtml(){
  return`<div class="phase" id="phase-guide"><div class="phase-head" style="background:#7c3aed"><div class="phase-badge">\ud83d\udccb</div><div class="phase-info"><div class="phase-name">Pitch Guide</div><div class="phase-sub">Mode Reference \u00b7 Problem Syntax \u00b7 Silver Bullet Framework</div></div></div><div class="phase-body">
  <div class="guide-section"><div class="guide-section-title">When to Use Each Mode</div><table class="guide-table"><thead><tr><th>Situation</th><th>Use</th></tr></thead><tbody>
  <tr><td>Pillar IS the diagnosed \ud83c\udfaf Silver Bullet</td><td><span class="guide-mode-chip chip-f">\ud83d\udccb Full</span> + Discovery Hook</td></tr>
  <tr><td>Pillar is relevant but not the core constraint</td><td><span class="guide-mode-chip chip-q">\u26a1 Quick</span></td></tr>
  <tr><td>Discovery surfaced their exact words for that pillar</td><td><span class="guide-mode-chip chip-f">\ud83d\udccb Full</span> + matching Discovery Hook</td></tr>
  <tr><td>Running long on time or call momentum slowing</td><td><span class="guide-mode-chip chip-q">\u26a1 Quick</span> on 3 pillars + <span class="guide-mode-chip chip-f">\ud83d\udccb Full</span> on Silver Bullet only</td></tr>
  </tbody></table></div>
  <div class="guide-section"><div class="guide-section-title">Constraint \u2192 Pillar Matrix (\ud83c\udfaf Silver Bullet Routing)</div><table class="guide-table"><thead><tr><th>Diagnosed Silver Bullet</th><th>Lead Full On</th><th>Why</th></tr></thead><tbody>
  <tr><td>Wrong leads / price shoppers / ICA mismatch</td><td><strong>P1 \u2014 Offer Optimization</strong></td><td>It's positioning, not marketing</td></tr>
  <tr><td>CPL above funnel benchmark / Cost Per Live Call critical / agency burn</td><td><strong>P2 \u2014 Lead Engine</strong></td><td>Build campaigns with them, not for them</td></tr>
  <tr><td>Lead\u2192Book below 25% or Show Rate below 70% / ops chaos</td><td><strong>P3 \u2014 Business Manager</strong></td><td>One platform vs. 5\u201310 duct-taped</td></tr>
  <tr><td>Live Close Rate below 30%</td><td><strong>P4 \u2014 Conversion</strong></td><td>Call reviews patch the leak in the conversation</td></tr>
  <tr><td>No back-end / LTV:CAC below 3:1</td><td><strong>P4 \u2014 LTV Retention</strong></td><td>17-month LTV system stops the treadmill</td></tr>
  </tbody></table></div>
  <div class="guide-section"><div class="guide-section-title">High Level Promise Formula</div><div class="guide-formula">"This is going to be <strong>[# pillars] steps</strong> to fix <strong>[their Silver Bullet]</strong> and get you from <strong>[current state]</strong> to <strong>[desired state]</strong> in <strong>[approximate timeframe]</strong>."</div></div>
  <div class="guide-section"><div class="guide-section-title">The Three Dialogue Principles (Apply to Every Pillar)</div><table class="guide-table"><thead><tr><th>#</th><th>Principle</th><th>Why</th></tr></thead><tbody>
  <tr><td>1</td><td>Open with their words \u2014 or a question</td><td>Either mirror their language from discovery (use Discovery Hook in Full mode) or ask a question that surfaces the gap. Builds buy-in before content lands.</td></tr>
  <tr><td>2</td><td>Compare and contrast \u2014 cost of DIY vs. our way</td><td>Without contrast, "done in 48 hours" is a feature. With contrast ("most coaches spent $5K-$10K with an agency and got zero clients"), it's a meaningful advantage.</td></tr>
  <tr><td>3</td><td>Tie down with a belief-specific question</td><td>Never "Make sense?" \u2014 anyone mumbles yes. Ask a question that requires a real answer about the belief that pillar is supposed to build.</td></tr>
  </tbody></table></div>
  <div class="guide-section"><div class="guide-section-title">Tie-Down Rule \u2014 No "Make Sense?"</div><div class="guide-rule">Every pillar ends with a belief-specific question. Examples for Problem Syntax: P1 \u2192 "When the right buyer self-qualifies before they book, does that change what your Live Close Rate looks like?" \u00b7 P2 \u2192 "Does the difference between an agency running cold ads and us building campaigns specifically around your offer feel meaningful?" \u00b7 P3 \u2192 "When every lead lands in one place, automatically nurtured, does that feel like a meaningful unlock?" \u00b7 P4 \u2192 "Does that change the size of the business you can actually build?" If they can't give a confident yes, that's a real objection \u2014 surface it now, not at price drop.</div></div>
  <div class="guide-section"><div class="guide-section-title">Discovery Hook \u2014 How to Use the Amber Callout</div><div class="guide-formula">In Full mode, the amber Discovery Hook callout shows 2\u20133 ready-made openers based on common discovery answers. <strong>Pick one if it matches what they actually said. Skip it entirely if it doesn't.</strong> The hook replaces the old Discovery mode \u2014 cleaner, less toggling, same belief-locking effect.</div></div>
  <div class="guide-section"><div class="guide-section-title">The Problem Syntax Calculator \u2014 5 Pulls Per Call</div><div class="guide-formula"><strong>Pull #1 (Discovery Block 2):</strong> Inputs Panel \u2014 set Funnel Type + silently fill inputs as prospect talks. <strong>Pull #2 (Post-Knife Turn):</strong> View 1 KPI Health \u2014 closer-side only, identifies the \ud83c\udfaf Silver Bullet. Don't share. <strong>Pull #3 (Constraint ID phase):</strong> View 2 The Constraint \u2014 first share moment, visual gap reveal. <strong>Pull #4 (Mid-Pitch, after Silver Bullet pillar):</strong> View 3 Cost of the Leak \u2014 monthly + annual cost of inaction. <strong>Pull #5 (Pre-Price Drop):</strong> View 4 Silver Bullet ROI \u2014 12-month cost vs. path. Anchor before commitment.</div></div>
  </div></div>`;
}

function renderNav(){document.getElementById('phase-nav').innerHTML=PHASES.map(p=>`<div class="nav-item" id="nav-${p.id}" style="--nc:${p.color}" onclick="jumpTo(${p.id})"><div class="nav-dot" style="background:${p.color}">${p.id}</div><div class="nav-text"><div class="nav-name">${p.name}</div>${p.sub?`<div class="nav-sub">${p.sub}</div>`:''}</div></div>`).join('');}

function renderContent(){
  document.getElementById('content').innerHTML=pitchGuideHtml()+PHASES.map(p=>{
    const isPitch=p.id===6;
    return`<div class="phase" id="phase-${p.id}"><div class="phase-head" style="background:${p.color}"><div class="phase-badge">${p.id}</div><div class="phase-info"><div class="phase-name">${p.name}</div>${p.sub?`<div class="phase-sub">${p.sub}</div>`:''}</div>${isPitch?`<div class="pitch-toggle-bar"><button class="ptgl-btn active" id="ptgl-quick" onclick="setGlobalPM('quick')">\u26a1 Quick</button><button class="ptgl-btn" id="ptgl-full" onclick="setGlobalPM('full')">\ud83d\udccb Full</button></div>`:''}</div><div class="phase-body">${p.blocks.map(b=>renderBlock(b,p.color)).join('')}</div></div>`;
  }).join('')+'<div class="calc-footer">IFCA · Impact Fitness Coaching Academy · impactcoachacademy.com</div>';
}

let mode='quick',coaching=false;
function applyClasses(){document.body.classList.toggle('sop-mode',mode==='sop');document.body.classList.toggle('notes-on',coaching);}
function setMode(m){mode=m;document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='quick')||(i===1&&m==='sop')));if(m==='quick'){coaching=false;document.getElementById('coach-btn').classList.remove('on');}applyClasses();}
function toggleCoaching(){if(mode==='quick'){setMode('sop');return;}coaching=!coaching;document.getElementById('coach-btn').classList.toggle('on',coaching);applyClasses();}
function jumpTo(id){const el=document.getElementById(`phase-${id}`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));const an=document.getElementById(`nav-${id}`);if(an)an.classList.add('active');}
function jumpToGuide(){const el=document.getElementById('phase-guide');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById('nav-guide').classList.add('active');}
document.addEventListener('DOMContentLoaded',()=>{
  const content=document.getElementById('content');
  content.addEventListener('scroll',()=>{
    const ge=document.getElementById('phase-guide');
    const phase0=document.getElementById('phase-0');
    const clear=()=>document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    if(phase0&&content.scrollTop<phase0.offsetTop-40){clear();if(ge)document.getElementById('nav-guide').classList.add('active');return;}
    let active=0;
    PHASES.forEach(p=>{const el=document.getElementById(`phase-${p.id}`);if(el&&el.offsetTop-40<=content.scrollTop)active=p.id;});
    clear();
    const an=document.getElementById(`nav-${active}`);
    if(an){an.classList.add('active');an.scrollIntoView({block:'nearest'});}
  });
});
renderNav();renderContent();initPMs();document.getElementById('nav-guide').classList.add('active');
</script>
