function tcSetMath(n){
  document.querySelectorAll('.tc-math-btn').forEach(b=>b.classList.toggle('active',+b.dataset.tcm===n));
  const inp=document.getElementById('tc-custom-input');if(inp)inp.value='';
  tcRenderMath(n);
}
function tcCustomMath(v){
  const n=parseInt(v,10);if(!n||n<1)return;
  document.querySelectorAll('.tc-math-btn').forEach(b=>b.classList.remove('active'));
  tcRenderMath(n);
}
function tcRenderMath(n){
  const dLow=Math.round(n*0.03),dHigh=Math.round(n*0.07);
  const rLow=Math.round(n*0.01),rHigh=Math.round(n*0.03);
  const tLow=dLow+rLow,tHigh=dHigh+rHigh;
  const fmt=v=>v>=1000?'$'+(v/1000).toFixed(v%1000?1:0)+'K':'$'+v;
  document.getElementById('tc-math-num').textContent=n;
  document.getElementById('tc-direct').textContent=`${dLow}\u2013${dHigh} clients`;
  document.getElementById('tc-referral').textContent=`${rLow}\u2013${rHigh} clients`;
  document.getElementById('tc-total').textContent=`${tLow}\u2013${tHigh} clients`;
  document.getElementById('tc-rev3k').textContent=`${fmt(tLow*3000)}\u2013${fmt(tHigh*3000)}`;
  document.getElementById('tc-rev5k').textContent=`${fmt(tLow*5000)}\u2013${fmt(tHigh*5000)}`;
}

  <tr><td>Pillar directly addresses their #1 stated fear from discovery</td><td><span class="guide-mode-chip chip-f">\ud83d\udccb Full</span> + Discovery Hook</td></tr>
  <tr><td>Pillar is relevant but not the primary fear</td><td><span class="guide-mode-chip chip-q">\u26a1 Quick</span></td></tr>
  <tr><td>Discovery surfaced their exact words for that pillar</td><td><span class="guide-mode-chip chip-f">\ud83d\udccb Full</span> + open with the matching Discovery Hook</td></tr>
  <tr><td>Running long on time or call momentum slowing</td><td><span class="guide-mode-chip chip-q">\u26a1 Quick</span> on 3 pillars + <span class="guide-mode-chip chip-f">\ud83d\udccb Full</span> on P2 only</td></tr>
  </tbody></table></div>
  <div class="guide-section"><div class="guide-section-title">PT Pivot \u2014 Default Mode by Pillar</div><table class="guide-table"><thead><tr><th>Pillar</th><th>Default</th><th>Override When</th></tr></thead><tbody>
  <tr><td>P1 \u2014 AI Offer Optimization</td><td><span class="guide-mode-chip chip-q">\u26a1 Quick</span></td><td>Unsure how to position online or what to charge \u2192 Full + Hook</td></tr>
  <tr><td>P2 \u2014 Lead Generation Engine</td><td><span class="guide-mode-chip chip-f">\ud83d\udccb Full</span></td><td>Almost always Full \u2014 the Affinity Launch is the universal PT belief break</td></tr>
  <tr><td>P3 \u2014 Impact AI Business Manager</td><td><span class="guide-mode-chip chip-q">\u26a1 Quick</span></td><td>Delivery anxiety, fear of Zoom workouts, or \"I'm not techy\" \u2192 Full + Hook</td></tr>
  <tr><td>P4 \u2014 Conversion + Retention</td><td><span class="guide-mode-chip chip-q">\u26a1 Quick</span></td><td>Nervous about selling online or losing in-person clients \u2192 Full + Hook</td></tr>
  </tbody></table></div>
  <div class="guide-section"><div class="guide-section-title">High Level Promise Formula</div><div class="guide-formula">"This is going to be <strong>[# pillars] steps</strong> to get you from <strong>[current situation]</strong> to <strong>[desired situation]</strong> in <strong>[approximate timeframe]</strong>."</div></div>
  <div class="guide-section"><div class="guide-section-title">The Three Dialogue Principles (Apply to Every Pillar)</div><table class="guide-table"><thead><tr><th>#</th><th>Principle</th><th>Why</th></tr></thead><tbody>
  <tr><td>1</td><td>Open with their words \u2014 or a question</td><td>Either mirror their language from discovery (use Discovery Hook in Full mode) or ask a question that surfaces the gap. Builds buy-in before content lands.</td></tr>
  <tr><td>2</td><td>Compare and contrast \u2014 cost of DIY vs. our way</td><td>Without contrast, \"done in 48 hours\" is a feature. With contrast (\"most trainers spend 6\u201312 months alone\"), it's a meaningful advantage.</td></tr>
  <tr><td>3</td><td>Tie down with a belief-specific question</td><td>Never \"Make sense?\" \u2014 anyone mumbles yes. Ask a question that requires a real answer about the belief that pillar is supposed to build.</td></tr>
  </tbody></table></div>
  <div class="guide-section"><div class="guide-section-title">Tie-Down Rule \u2014 No \"Make Sense?\"</div><div class="guide-rule">Every pillar ends with a belief-specific question. Examples for PT Pivot: P1 \u2192 \"Does the '$99-a-month commodity' fear go away?\" \u00b7 P2 \u2192 \"Does the 'no audience' fear feel solvable?\" \u00b7 P3 \u2192 \"Does that feel like a real online business or still feel like a side hustle?\" \u00b7 P4 \u2192 \"Does that change the size of the business you can actually build?\" If they can't give a confident yes, that's a real objection \u2014 surface it now, not at price drop.</div></div>
  <div class="guide-section"><div class="guide-section-title">Discovery Hook \u2014 How to Use the Amber Callout</div><div class="guide-formula">In Full mode, the amber Discovery Hook callout shows 2\u20133 ready-made openers based on common discovery answers. <strong>Pick one if it matches what they actually said. Skip it entirely if it doesn't.</strong> The hook replaces the old Discovery mode \u2014 cleaner, less toggling, same belief-locking effect.</div></div>
  </div></div>`;
}

function renderNav(){document.getElementById('phase-nav').innerHTML=PHASES.map(p=>`<div class="nav-item" id="nav-${p.id}" style="--nc:${p.color}" onclick="jumpTo(${p.id})"><div class="nav-dot" style="background:${p.color}">${p.id}</div><div class="nav-text"><div class="nav-name">${p.name}</div>${p.sub?`<div class="nav-sub">${p.sub}</div>`:''}</div></div>`).join('');}

function renderContent(){
  document.getElementById('content').innerHTML=pitchGuideHtml()+PHASES.map(p=>{
    const isPitch=p.id===6;
    return`<div class="phase" id="phase-${p.id}"><div class="phase-head" style="background:${p.color}"><div class="phase-badge">${p.id}</div><div class="phase-info"><div class="phase-name">${p.name}</div>${p.sub?`<div class="phase-sub">${p.sub}</div>`:''}</div>${isPitch?`<div class="pitch-toggle-bar"><button class="ptgl-btn active" id="ptgl-quick" onclick="setGlobalPM('quick')">\u26a1 Quick</button><button class="ptgl-btn" id="ptgl-full" onclick="setGlobalPM('full')">\ud83d\udccb Full</button></div>`:''}</div><div class="phase-body">${p.blocks.map(b=>renderBlock(b,p.color)).join('')}</div></div>`;
  }).join('')+threeCurrenciesHtml()+'<div class="calc-footer">IFCA \u00b7 Impact Fitness Coaching Academy \u00b7 impactcoachacademy.com</div>';
}

let mode='quick',coaching=false;
function applyClasses(){document.body.classList.toggle('sop-mode',mode==='sop');document.body.classList.toggle('notes-on',coaching);}
function setMode(m){mode=m;document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='quick')||(i===1&&m==='sop')));if(m==='quick'){coaching=false;document.getElementById('coach-btn').classList.remove('on');}applyClasses();}
function toggleCoaching(){if(mode==='quick'){setMode('sop');return;}coaching=!coaching;document.getElementById('coach-btn').classList.toggle('on',coaching);applyClasses();}
function jumpTo(id){const el=document.getElementById(`phase-${id}`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));const an=document.getElementById(`nav-${id}`);if(an)an.classList.add('active');}
function jumpToGuide(){const el=document.getElementById('phase-guide');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById('nav-guide').classList.add('active');}
function jumpToCurrencies(){const el=document.getElementById('phase-currencies');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById('nav-currencies').classList.add('active');}
document.addEventListener('DOMContentLoaded',()=>{
  const content=document.getElementById('content');
  content.addEventListener('scroll',()=>{
    const ge=document.getElementById('phase-guide');
    const ce=document.getElementById('phase-currencies');
    const phase0=document.getElementById('phase-0');
    const clear=()=>document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    // Currencies is at the bottom — if scrolled into it, it wins
    if(ce&&ce.offsetTop-40<=content.scrollTop){clear();document.getElementById('nav-currencies').classList.add('active');return;}
    // Guide is at the top — if we're above phase 0, guide is active
    if(phase0&&content.scrollTop<phase0.offsetTop-40){clear();if(ge)document.getElementById('nav-guide').classList.add('active');return;}
    // Otherwise: track phases
    let active=0;
    PHASES.forEach(p=>{const el=document.getElementById(`phase-${p.id}`);if(el&&el.offsetTop-40<=content.scrollTop)active=p.id;});
    clear();
    const an=document.getElementById(`nav-${active}`);
    if(an){an.classList.add('active');an.scrollIntoView({block:'nearest'});}
  });
});
renderNav();renderContent();initPMs();tcRenderMath(100);document.getElementById('nav-guide').classList.add('active');
</script>
