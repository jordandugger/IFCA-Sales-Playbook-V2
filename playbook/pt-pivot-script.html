<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT Pivot Script v6 — IFCA</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f172a;--bg:#f1f5f9;--white:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--say-bg:#eff6ff;--say-border:#3b82f6;--say-label:#1d4ed8;--coach-bg:#fefce8;--coach-border:#fbbf24;--coach-label:#92400e;--coach-text:#78350f;--rule-bg:#fff1f2;--rule-border:#f43f5e;--rule-text:#9f1239;--calc-bg:#f0fdfa;--calc-border:#0d9488;--calc-text:#134e4a;}
*{box-sizing:border-box;margin:0;padding:0;}html,body{height:100%;overflow:hidden;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
#app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:200px;min-width:200px;background:var(--navy);display:flex;flex-direction:column;overflow-y:auto;}
.sidebar-brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.brand-eyebrow{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#475569;margin-bottom:5px;}
.brand-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#f8fafc;line-height:1.2;letter-spacing:-.3px;}
.brand-sub{font-size:10px;color:#64748b;margin-top:3px;line-height:1.4;}
.nav-label{font-size:9px;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:#374151;padding:14px 16px 6px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px 8px 16px;cursor:pointer;border-left:3px solid transparent;transition:background .12s,border-color .12s;}
.nav-item:hover{background:rgba(255,255,255,.04);}
.nav-item.active{background:rgba(255,255,255,.06);border-left-color:var(--nc,#3b82f6);}
.nav-dot{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;background:var(--nc,#3b82f6);}
.nav-ref-dot{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:rgba(255,255,255,.08);}
.nav-text{flex:1;overflow:hidden;}.nav-name{font-size:12px;font-weight:500;color:#cbd5e1;white-space:nowrap;}.nav-sub{font-size:10px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;}
.topbar-left{display:flex;align-items:center;gap:14px;}.doc-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.2px;}.doc-meta{font-size:11px;color:var(--muted);}
.tabs{display:flex;background:var(--bg);border-radius:7px;padding:3px;gap:2px;}.tab-btn{padding:5px 14px;border:none;background:transparent;border-radius:5px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;}.tab-btn.active{background:var(--white);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1);}
.topbar-right{display:flex;align-items:center;gap:8px;}.coach-toggle{display:flex;align-items:center;gap:6px;padding:5px 12px;border:1px solid var(--border);background:var(--white);border-radius:6px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}.coach-toggle.on{background:var(--coach-bg);border-color:var(--coach-border);color:var(--coach-label);}
.content{flex:1;overflow-y:auto;padding:20px 24px 60px;}
.phase{margin-bottom:22px;scroll-margin-top:12px;}.phase-head{display:flex;align-items:center;gap:12px;padding:11px 18px;border-radius:9px 9px 0 0;color:white;}.phase-badge{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.2);border-radius:8px;flex-shrink:0;}.phase-info{flex:1;}.phase-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:-.3px;}.phase-sub{font-size:10.5px;opacity:.75;margin-top:2px;}.phase-body{background:var(--white);border:1px solid var(--border);border-top:none;border-radius:0 0 9px 9px;padding:14px 16px;display:flex;flex-direction:column;gap:11px;}
.block-say{background:var(--say-bg);border-left:4px solid var(--say-border);border-radius:0 7px 7px 0;padding:11px 15px;}.say-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--say-label);margin-bottom:8px;}.say-text{font-size:14.5px;line-height:1.8;color:#1e293b;}.say-text p{margin-bottom:9px;}.say-text p:last-child{margin-bottom:0;}.cue{color:#94a3b8;font-style:italic;font-size:13px;}
.block-coach{background:var(--coach-bg);border-left:4px solid var(--coach-border);border-radius:0 7px 7px 0;padding:10px 15px;display:none;}.block-coach.always{display:block;}.coach-head{display:flex;align-items:center;justify-content:space-between;}.coach-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--coach-label);}.coach-body{font-size:12.5px;line-height:1.65;color:var(--coach-text);margin-top:8px;}
.block-rule{background:var(--rule-bg);border-left:4px solid var(--rule-border);border-radius:0 7px 7px 0;padding:10px 15px;}.rule-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#be123c;margin-bottom:6px;}.rule-body{font-size:13.5px;line-height:1.6;color:var(--rule-text);font-weight:600;}
.block-calc{background:var(--calc-bg);border-left:4px solid var(--calc-border);border-radius:0 7px 7px 0;padding:11px 14px;}.calc-head{display:flex;align-items:flex-start;gap:10px;}.calc-icon{font-size:18px;flex-shrink:0;line-height:1;}.calc-info{flex:1;}.calc-tab{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--calc-border);margin-bottom:3px;}.calc-action{font-size:13.5px;font-weight:500;color:var(--calc-text);line-height:1.55;}.calc-action-quick{display:block;}.calc-action-full{display:none;}.sop-mode .calc-action-quick{display:none;}.sop-mode .calc-action-full{display:block;}.calc-note{font-size:12px;color:#115e59;margin-top:8px;padding-top:8px;border-top:1px solid #99f6e4;line-height:1.5;display:none;}
.block-disc{border:1px solid var(--border);border-radius:8px;overflow:hidden;}.disc-head{display:flex;align-items:center;gap:9px;padding:8px 13px;background:#f8fafc;border-bottom:1px solid var(--border);}.disc-num{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;}.disc-lbl{font-size:12px;font-weight:600;color:var(--text);flex:1;}.belief-chip{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}.disc-body{padding:12px 13px;display:flex;flex-direction:column;gap:10px;}
.block-sec{border:1px solid var(--border);border-radius:8px;overflow:hidden;}.sec-head{padding:8px 13px;background:#f8fafc;border-bottom:1px solid var(--border);}.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}.sec-body{padding:12px 13px;}
.block-obj{border:1px solid #fee2e2;border-radius:8px;overflow:hidden;}.obj-head{padding:8px 13px;background:#fff1f2;border-bottom:1px solid #fee2e2;}.obj-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#be123c;}.obj-body{padding:12px 13px;background:white;}
.block-support{border:1px dashed var(--border);border-radius:8px;padding:11px 13px;background:#fafafa;}.support-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.block-opening{border:1px solid var(--border);border-radius:8px;overflow:hidden;}.opening-head{padding:8px 13px;background:#f8fafc;border-bottom:1px solid var(--border);}.opening-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}.opening-body{padding:12px 13px;}
.block-beliefs{}.beliefs-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}.beliefs-table{width:100%;border-collapse:collapse;font-size:12.5px;}.beliefs-table th{background:#f8fafc;padding:7px 10px;text-align:left;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}.beliefs-table td{padding:8px 10px;border-bottom:1px solid #f1f5f9;vertical-align:top;}.beliefs-table tr:last-child td{border-bottom:none;}.b-num{font-family:'Syne',sans-serif;font-weight:800;color:#2563eb;width:24px;font-size:13px;}.b-name{font-weight:600;width:140px;}.b-desc{color:var(--muted);}.b-check{width:36px;text-align:center;font-size:15px;cursor:pointer;user-select:none;}
.block-list{}.list-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}.closer-beliefs{padding-left:0;list-style:none;display:flex;flex-direction:column;gap:8px;}.closer-beliefs li{font-size:13.5px;line-height:1.6;color:var(--text);padding:9px 13px;background:#f8fafc;border-radius:6px;border-left:3px solid #3b82f6;display:flex;align-items:flex-start;gap:8px;}.closer-beliefs li::before{content:'\2713';color:#3b82f6;font-weight:700;font-size:13px;flex-shrink:0;margin-top:1px;}
.btext{font-size:14.5px;line-height:1.8;color:var(--text);}.btext p{margin-bottom:9px;}.btext p:last-child{margin-bottom:0;}.btext .cue{color:#94a3b8;font-style:italic;font-size:13px;}
.coach-only{display:none!important;}.notes-on .coach-only{display:flex!important;}.block-coach.coach-only{display:none!important;}.notes-on .block-coach.coach-only{display:block!important;}.sop-mode .block-coach{display:block!important;}.sop-mode .coach-only{display:flex!important;}.sop-mode .calc-note{display:block!important;}.notes-on .calc-note{display:block!important;}
.calc-footer{font-size:10px;color:#94a3b8;text-align:center;padding:12px 0 4px;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px;}
/* PITCH MODE SYSTEM */
.pitch-toggle-bar{display:flex;gap:4px;margin-left:auto;flex-shrink:0;}
.ptgl-btn{padding:4px 9px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.1);color:rgba(255,255,255,.65);border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap;}
.ptgl-btn:hover{background:rgba(255,255,255,.18);color:rgba(255,255,255,.9);}.ptgl-btn.active{background:rgba(255,255,255,.25);color:#fff;border-color:rgba(255,255,255,.5);}
.block-pillar{border:1px solid #ddd6fe;border-radius:8px;overflow:hidden;}
.pillar-head{display:flex;align-items:center;gap:11px;padding:10px 13px;background:#f5f3ff;border-bottom:1px solid #ddd6fe;}
.pillar-num{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff;background:#4338ca;flex-shrink:0;}
.pillar-lbl{font-family:'Syne',sans-serif;font-size:12.5px;font-weight:700;color:#3730a3;letter-spacing:-.1px;flex:1;}
.pillar-mode-btns{display:flex;gap:3px;flex-shrink:0;}.pmo-btn{width:24px;height:24px;border:1px solid #c4b5fd;background:rgba(255,255,255,.7);border-radius:4px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;line-height:1;}.pmo-btn:hover{background:white;border-color:#7c3aed;}.pmo-btn.active{background:#4338ca;border-color:#3730a3;}.pmo-reset{opacity:.5;font-size:12px;}.pmo-reset:hover{opacity:1;}
.pillar-sop-hint{background:var(--coach-bg);border-left:4px solid var(--coach-border);padding:9px 15px;display:none;}.sop-mode .pillar-sop-hint{display:block;}.pillar-sop-hint .coach-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--coach-label);}.pillar-sop-hint .coach-body{font-size:12px;line-height:1.6;color:var(--coach-text);margin-top:6px;}
.pm-block{padding:12px 15px;display:none;}.pm-block.pm-visible{display:block;}
.pm-quick-block{background:#f0fdf4;border-left:4px solid #22c55e;}
.pm-full-block{background:#eff6ff;border-left:4px solid #3b82f6;}
.pm-disc-block{background:#fffbeb;border-left:4px solid #f59e0b;}
.pm-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:5px;}.pm-quick-tag{color:#15803d;}.pm-full-tag{color:#1d4ed8;}.pm-disc-tag{color:#92400e;}
.pm-text{font-size:14.5px;line-height:1.8;color:#1e293b;}.pm-text p{margin-bottom:9px;}.pm-text p:last-child{margin-bottom:0;}
.disc-bracket{background:#fde68a;color:#78350f;padding:1px 5px;border-radius:3px;font-weight:600;font-style:normal;}
/* V2 PITCH UPGRADES */
.pm-text .contrast{color:#b91c1c;font-weight:500;}
.pm-text .new-way{color:#15803d;font-weight:600;}
.pm-text .tie-line{display:block;margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0;color:#6d28d9;font-weight:600;}
.hook-box{background:#fffbeb;border:1px solid #fcd34d;border-left:3px solid #f59e0b;border-radius:6px;padding:9px 13px;margin-bottom:12px;}
.hook-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#92400e;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.hook-lbl::before{content:"\1F4A1";font-size:11px;}
.hook-intro{font-size:11.5px;color:#78350f;margin-bottom:7px;font-style:italic;line-height:1.4;}
.hook-list{list-style:none;padding:0;margin:0;}
.hook-list li{font-size:13px;color:#1e293b;padding:4px 0 4px 14px;position:relative;line-height:1.5;}
.hook-list li::before{content:"\203A";position:absolute;left:0;color:#f59e0b;font-weight:700;}
.when-bar{margin-top:12px;padding:8px 13px;background:#f0fdf4;border:1px solid #86efac;border-radius:6px;font-size:12px;color:#14532d;display:flex;gap:8px;align-items:flex-start;line-height:1.5;}
.when-bar strong{color:#15803d;font-weight:700;flex-shrink:0;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding-top:1px;}
/* THREE CURRENCIES TAB */
.tc-section{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:16px 20px;margin-bottom:14px;}
.tc-section-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#7c3aed;letter-spacing:.04em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.tc-section-title::before{content:"";display:block;width:4px;height:16px;background:#7c3aed;border-radius:2px;}
.tc-deploy-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px;}
.tc-deploy-list li{font-size:13px;line-height:1.55;padding:9px 13px 9px 32px;background:#faf5ff;border-radius:6px;border-left:3px solid #a78bfa;position:relative;color:var(--text);}
.tc-deploy-list li::before{content:"\2192";position:absolute;left:11px;top:9px;color:#7c3aed;font-weight:700;}
.tc-currency-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
.tc-currency-card{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center;position:relative;}
.tc-currency-card.lit{background:linear-gradient(180deg,#ecfdf5 0%,#f0fdf4 100%);border-color:#86efac;}
.tc-currency-card.lit::after{content:"YOUR STARTING CURRENCY";position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:#15803d;color:#fff;font-size:8.5px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.tc-currency-icon{width:42px;height:42px;border-radius:50%;background:#fff;border:2px solid #cbd5e1;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#475569;}
.tc-currency-card.lit .tc-currency-icon{border-color:#15803d;color:#15803d;}
.tc-currency-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:5px;}
.tc-currency-card.lit .tc-currency-name{color:#15803d;}
.tc-currency-desc{font-size:11.5px;line-height:1.5;color:var(--muted);}
.tc-currency-card.lit .tc-currency-desc{color:#166534;}
.tc-currency-note{font-size:12px;color:var(--muted);text-align:center;font-style:italic;padding:8px 12px;background:#faf5ff;border-radius:6px;border:1px dashed #c4b5fd;}
.tc-branch-tree{display:flex;flex-direction:column;gap:0;align-items:center;}
.tc-branch-parent{background:#1e293b;color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:600;text-align:center;max-width:480px;line-height:1.5;position:relative;}
.tc-branch-parent .quote{color:#fbbf24;font-style:italic;font-weight:500;}
.tc-branch-connector{width:2px;height:18px;background:#cbd5e1;}
.tc-branch-fork{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;}
.tc-branch-card{background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;}
.tc-branch-head{padding:9px 13px;color:#fff;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:7px;}
.tc-branch-head .tc-letter{width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
.tc-branch-a .tc-branch-head{background:#15803d;}
.tc-branch-b .tc-branch-head{background:#b45309;}
.tc-branch-c .tc-branch-head{background:#1d4ed8;}
.tc-branch-body{padding:11px 13px;display:flex;flex-direction:column;gap:8px;font-size:12px;line-height:1.5;}
.tc-branch-row{display:flex;flex-direction:column;gap:2px;}
.tc-branch-rowlbl{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.tc-branch-rowtxt{color:var(--text);}
.tc-branch-action{margin-top:4px;padding:8px 10px;background:#f8fafc;border-radius:5px;border-left:3px solid #cbd5e1;font-size:11.5px;color:var(--text);font-weight:500;}
.tc-branch-a .tc-branch-action{background:#f0fdf4;border-left-color:#15803d;}
.tc-branch-b .tc-branch-action{background:#fffbeb;border-left-color:#b45309;}
.tc-branch-c .tc-branch-action{background:#eff6ff;border-left-color:#1d4ed8;}
.tc-math-controls{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.tc-math-btn{padding:9px 18px;background:#f8fafc;border:1px solid var(--border);border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;}
.tc-math-btn:hover{border-color:#a78bfa;background:#faf5ff;}
.tc-math-btn.active{background:#7c3aed;color:#fff;border-color:#7c3aed;}
.tc-math-custom{display:flex;align-items:center;gap:6px;padding:0 6px 0 12px;background:#f8fafc;border:1px solid var(--border);border-radius:7px;}
.tc-math-custom label{font-size:12px;color:var(--muted);font-weight:600;}
.tc-math-custom input{width:60px;padding:7px 8px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:var(--text);outline:none;}
.tc-math-card{background:linear-gradient(180deg,#1e1b4b 0%,#312e81 100%);color:#fff;border-radius:9px;padding:18px 22px;}
.tc-math-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,.15);}
.tc-math-header-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#c4b5fd;}
.tc-math-header-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;}
.tc-math-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13.5px;}
.tc-math-row .lbl{color:#c4b5fd;font-weight:500;}
.tc-math-row .lbl small{display:block;font-size:10.5px;color:#a5b4fc;font-weight:400;margin-top:1px;}
.tc-math-row .val{font-family:'Syne',sans-serif;font-weight:700;color:#fff;}

<script>
const PHASES=[
  {id:0,name:"Before You Dial",sub:"Mindset & Foundations",color:"#374151",blocks:[
    {t:"coach",c:"Internalize these before every PT call. PTs are skeptical buyers \u2014 they've heard pitches on the gym floor their entire career and can smell a closer from a mile away. Your certainty in the outcome has to be unshakeable before you dial. If you're not 100% bought in, they won't be either. Review these out loud."},
    {t:"list",label:"THE 4 CLOSER BELIEFS",items:[
      "We've helped over 1,300 in-person trainers make this exact transition. It works.",
      "Every trainer we work with genuinely wants and needs what we offer \u2014 the model they're in is already breaking.",
      "I am doing them a favor. The cost of NOT having this conversation is their health, their family time, and their ceiling.",
      "If they say no \u2014 it's their loss. My job is to diagnose honestly, not to sell at any cost."
    ]},
    {t:"coach",c:"You are a doctor, not a salesperson. A doctor diagnoses before prescribing. For PTs specifically: don't assume they want to go fully online. They might want hybrid. Don't assume they hate in-person. They might love their morning clients. Your job is to find out what their life is costing them and show them a better path \u2014 not to push them toward something that doesn't fit. If they ask about price early: 'Everything we do is customized to your situation \u2014 I honestly don't even know yet what the right path looks like for you. Let me ask you a few questions first.'"},
    {t:"beliefs",label:"THE 7 BELIEFS \u2014 PT-SPECIFIC CHECKLIST",coach:"For PT Syntax, Beliefs #1 (Pain), #4 (Desire), and #2 (Doubt) are the most critical. PTs have vivid, concrete pain \u2014 use it. Discovery blocks 1\u20133 build Pain. Block 4 builds Desire. Block 6 builds Doubt. The Knife Turn lands all three dimensions simultaneously. Every PT-specific objection (no audience, can't charge online, don't know how to deliver) traces back to Belief #7 \u2014 trust the methodology. Your pitch kills all three proactively.",rows:[
      {n:1,name:"Pain (The Ceiling)",desc:"They believe the in-person model has a hard ceiling \u2014 financial, physical, and time-based"},
      {n:2,name:"Doubt",desc:"They believe they cannot build the online side alone \u2014 they've tried or know they'd make expensive mistakes"},
      {n:3,name:"Cost",desc:"They believe staying put costs more than investing \u2014 financially, physically, and for their family"},
      {n:4,name:"Desire",desc:"They are emotionally connected to what freedom looks like \u2014 mornings free, done by 9:30, present for family"},
      {n:5,name:"Money",desc:"They have resources and are willing to invest in the right system"},
      {n:6,name:"Support",desc:"Their partner will support the decision \u2014 or is already frustrated with the current model"},
      {n:7,name:"Trust (Methodology)",desc:"IFCA's specific 3-stage path \u2014 Affinity Launch \u2192 Content \u2192 Ads \u2014 is the only logical sequence for a trainer starting from a network"}
    ]}
  ]},
  {id:1,name:"Open",sub:"\u2264 2 MIN",color:"#0d9488",blocks:[
    {t:"coach",c:"Keep this tight. Your only goal is to establish you're a normal human, then transition immediately to frame setting. PTs are skeptical buyers \u2014 establish warmth fast, then shift to authority. Never go past 2 minutes."},
    {t:"say",c:`"Hey [Name] \u2014 nice to meet you! Whereabouts are you located?"\n[prospect responds]\n\n"Awesome \u2014 and have you come across Jordan or Erin before, or did someone refer you over?"\n[prospect responds]`}
  ]},
  {id:2,name:"Frame Setting",sub:"",color:"#7c3aed",blocks:[
    {t:"coach",c:"This is the most important 30 seconds of the call. The 'I'll tell you if we CAN'T help you' line drops the guard and repositions you from salesperson to trusted advisor. Wait for a genuine yes before continuing. PTs are skeptical buyers. This frame earns you the call."},
    {t:"say",c:`"Awesome. Well, I pulled up your application and got a 30,000-foot view of where you're at and where you want to go."\n\n"Just so you know how these calls typically work \u2014 I'm going to ask you some questions about what's working, what's not, what your current setup looks like, and what your goals are. And if I feel like we can genuinely help you, I'll definitely let you know."\n\n"But if at any point I don't think we're the right fit, I'll tell you that too and point you in the right direction."\n\n"Does that sound fair?"\n[Wait for yes \u2014 then move forward]`}
  ]},
  {id:3,name:"Discovery",sub:"Transition Syntax \u2014 7 Blocks",color:"#1d4ed8",blocks:[
    {t:"coach",c:"This is Transition Syntax \u2014 not pure Goal or Problem. The PT has an existing in-person business but is trying to BUILD a new online or hybrid model. Pain = the ceiling of the current model, not the absence of a business. Your job: (1) surface the cost of staying trapped, (2) build desire for time and income freedom, and (3) pre-empt all three PT belief breaks \u2014 'no audience,' 'can't charge online,' 'don't know how to deliver' \u2014 BEFORE they ever become objections."},
    {t:"opening",c:`"What's the main thing that motivated you to book this call today?"\n[If vague:] "What do you mean by that?" / "Tell me more..."`},
    {t:"block",num:1,label:"SITUATION \u2014 In-Person Reality",belief:"BELIEF #1: PAIN",bc:"#dc2626",
      coach:"Ground them in their current in-person reality. The question about evenings almost always surfaces real emotion \u2014 trainers have a deep relationship with how the model owns their time. Let them talk. Their exact words here become your Hamburger Transition language. Write them down.",
      c:`"Walk me through what a typical week looks like right now \u2014 how many sessions are you doing, what does your schedule look like?"\n[prospect responds]\n\n"Morning vs. evenings \u2014 what does that split look like for you?"\n[prospect responds]\n\n"And ballpark \u2014 what does a good month look like income-wise from in-person right now?"\n[prospect responds]`},
    {t:"block",num:2,label:"WHY NOW / URGENCY",belief:"BELIEF #4: DESIRE",bc:"#16a34a",
      coach:"Something triggered this call. Common PT triggers: new baby or pregnancy, spouse lost job, business going slow, physical wear starting to show, or just seeing the writing on the wall. Find the trigger. This becomes your desire anchor \u2014 you'll reference it throughout.",
      c:`"Has anything changed recently that's making this feel more urgent right now? Like, what's the trigger?"\n[prospect responds]\n\n"Tell me more about that..."\n[Dig deeper. Let them feel it.]`},
    {t:"block",num:3,label:"THE PHYSICAL / TIME CEILING",belief:"BELIEF #1: PAIN (Deeper)",bc:"#dc2626",
      coach:"Unique to PT Syntax \u2014 no equivalent in Goal or Problem scripts. Trainers know their body has a shelf life. The cancellation question hits hard because every trainer has felt that zero-income gap. The vacation question shows the model owns their freedom. Don't skip this block.",
      c:`"Let me ask you something \u2014 if you maxed out your in-person schedule and ran at full speed for the next 2\u20133 years... what's the ceiling? What's the best-case scenario income-wise?"\n[prospect responds]\n\n"And to get there \u2014 what does your body have to do?"\n[Let them answer]\n\n"What happens when a client cancels? Or you get sick? Or you want to take a week off with your family?"\n[Let them answer]`},
    {t:"block",num:4,label:"PAINT THE DREAM",belief:"BELIEF #4: DESIRE",bc:"#16a34a",
      coach:"Get them to describe freedom in their own words. Most PTs want: done by 9:30am, check clients from the couch, vacations without guilt, say no to evening clients, be present for family. Write these down word-for-word \u2014 this is your Hamburger Transition fuel.",
      c:`"Flip it for me \u2014 if you built the online side exactly the way you'd want it... what does a great week actually look like? Walk me through it."\n[prospect responds]\n\n"And beyond the schedule \u2014 what does that actually change for you personally?"\n[Get the emotional picture: family, freedom, not leaving home, being present, saying no]`},
    {t:"block",num:5,label:"FINANCIAL QUALIFIER",belief:"BELIEF #5: MONEY + BELIEF #3: COST OF INACTION (SEED)",bc:"#d97706",
      coach:"This block does double duty now \u2014 capture the goal AND seed the Cost of Inaction belief before the Knife Turn. Trainers anchor low ('$2\u20133K to start'). That's fine \u2014 push it during pre-pitch. The two added questions are critical: (1) the no-show capture surfaces money they\u2019re ALREADY losing every month, and (2) the forward-projection question gets them to verbalize the cost of staying in their own words. When you drop View 1 after the Knife Turn, the math becomes confirmation of what they already said, not a surprise reveal. Silently enter all five numbers (sessions, rate, no-show %, goal, current take-home) into the PT Pivot Calculator while they talk.",
      c:`"What would the online piece need to produce monthly for it to feel real \u2014 like it's actually changing your life? What's the number that makes you go 'okay, this matters'?"\n[prospect responds \u2014 anchor: their goal number]\n\n"Why that number \u2014 like what specifically does that change for you?"\n[Let them go deeper. This becomes your desire anchor for the Hamburger Transition.]\n\n"And right now, what's your monthly take-home from in-person, roughly?"\n[prospect responds]\n\n"Quick one \u2014 of those [X] sessions a week, how many typically cancel or no-show? The real number, not the polished one."\n[prospect responds. Most will say 4\u20137/wk. If they say 'not many,' anchor to industry: 'Yeah \u2014 industry runs 25 to 35%. We'll use 30% to be conservative.']\n\n"Got it. So at that no-show rate, you're already eating around [calculator shows $X/mo] every month in lost sessions \u2014 and that's a number that's never going to change as long as you're in-person. Make sense?"\n[Brief acknowledgment. Don't belabor it \u2014 the calculator will confirm later.]\n\n"And here's the one I want you to sit with for a second \u2014 if nothing changes from where you are right now... same sessions, same rate, same no-shows... what's that gap between where you are and where you want to be cost you over the next 12 months? Back of envelope."\n[Let them do the math out loud. Most will land at a number between $15K\u2013$30K. This is the seed \u2014 they're verbalizing the Cost of Inaction in their own words before you ever drop the calculator. Stay quiet while they think.]`},
    {t:"calc",tab:"PT Pivot Calculator \u00b7 Inputs Panel",quickAction:"Fill inputs as they answer Block 5. Defaults: 20 sess/wk @ $75, <strong>30% no-show</strong>, $500/$375 offer, 50% resign, 40% PIF, 2/mo sign rate. Don't share screen yet.",action:"Silently fill in the inputs panel as they answer Block 5: <strong>Sessions/Week</strong>, <strong>Rate/Session</strong>, <strong>No-Show / Cancellation Rate</strong> (default 30%, override to their actual number if they gave one), <strong>Replace Income Goal</strong>. Then fold in offer assumptions \u2014 default to the IFCA beginner offer: <strong>FE Rate $500/mo, FE Length 6 mo, BE Rate $375/mo, BE Length 12 mo, Resign 50%, PIF 40%, Sign Rate 2/mo</strong>. That builds a $3K FE / $4.5K BE offer with $5,250 LTV per client. All four views (In-Person Ceiling + Cost of Inaction, Clients Needed, 6-Month Path, Combined Reveal) auto-calculate \u2014 ready to share after the Knife Turn.",
      note:"Don't announce it. Fill it in while they talk. Critical: the no-show field defaults to 30% (industry mid). If the prospect gave you a real number (e.g., '5 cancels a week out of 20' = 25%), override. The Real (after no-shows) readout in the inputs panel updates live \u2014 reference that figure verbally during the COI seed question. By the time you hit the Knife Turn, the In-Person Ceiling card AND both Cost of Inaction cards (6 mo + 12 mo) are sitting on screen waiting. Do NOT click Share View yet \u2014 stay private until post-Knife-Turn."},
    {t:"block",num:6,label:"SURFACE FEAR & DOUBT",belief:"BELIEF #2: DOUBT",bc:"#7c3aed",
      coach:"This block surfaces the three PT belief breaks: (1) 'I have no audience,' (2) 'I don't know how to deliver without Zoom workouts,' (3) 'I can't charge what I charge in-person online.' Listen carefully \u2014 the ones that come up here get addressed directly by name in your pitch.",
      c:`"Have you made any attempts to get the online side going before? What happened?"\n[prospect responds]\n\n"What's your biggest concern about actually making this work?"\n[Let them voice the fear \u2014 no audience, tech issues, delivery, pricing, what people will think]`},
    {t:"block",num:7,label:"THE KNIFE TURN",belief:"BELIEF #3: COST",bc:"#9f1239",
      coach:"Most powerful moment in PT Syntax. Hit all three dimensions at once: financial ceiling + physical toll + family cost. Ask it, then sit completely silent. After they answer, run the amplification beat \u2014 don\u2019t move on with just 'yeah.' This is where Janie\u2019s pain-amplification gap showed up: hearing pain, reflecting it, and moving on. The follow-up question makes them feel the cost in their own voice. That feeling is what closes the call later.",
      c:`"I hate to even ask this \u2014 but I have to. If you're still doing the same sessions, same hours, same ceiling... two years from now, what does that cost you? Financially. Physically. And for the people waiting for you at home?"\n[Long pause. Let them answer. Let them feel it.]\n\n"And how does that hit you when you actually say it out loud?"\n[Pause again. Let them sit with their own words. Don't rescue them.]\n\n"Yeah. That's exactly why you booked this call."`},
    {t:"calc",tab:"PT Pivot Calculator \u2192 View 1: In-Person Ceiling + Cost of Inaction",quickAction:"Click <strong>View 1</strong> \u2192 <strong>\u2b9a Share View</strong> \u2192 5 sec silence \u2192 <em>\u201cYou just said the cost was [their number]. This is what the math says \u2014 [$X] over 6 months, [$Y] over 12.\u201d</em>",action:"Click <strong>View 1: In-Person Ceiling + Cost of Inaction</strong>. Click <strong>\u2b9a Share View</strong> to hide inputs. Share screen. Say: <em>\"I was filling this in while we were talking \u2014 here's exactly what the math says.\"</em> Then go silent for 5 full seconds. Six cards on screen: Ceiling \u00b7 Goal \u00b7 Hours \u00b7 No-Show Loss \u00b7 Cost of Inaction (6 mo) \u00b7 Cost of Inaction (12 mo). The two red Cost of Inaction cards are the closer \u2014 they confirm the number the prospect ALREADY verbalized in Block 5. Reference their exact words: <em>\"You said earlier the gap probably costs you around [their estimate] over the next year. The math says [$Y]. That's the wall \u2014 not just income, but body, time, and what staying is actually costing you in real dollars.\"</em> Pause. Then: <em>\"That's exactly why you booked this call.\"</em> Builds Belief #1 (Pain) + Belief #3 (Cost of Inaction) simultaneously.",
      note:"The COI numbers land hardest when they CONFIRM what the prospect just said \u2014 not when they introduce a new figure. If their Block 5 estimate was higher than the calculator (e.g., they guessed $25K but math says $17K), lean toward their number: 'And honestly, your gut number was probably closer \u2014 this doesn't even factor in burnout cost or what you give up at home.' If their estimate was lower than the calculator, lean toward the math: 'And honestly the math is worse than what you guessed \u2014 because we haven't counted what no-shows have already eaten this year.' Either way, the prospect feels the cost in their own voice, then sees it on screen. That double-hit is what makes Belief #3 stick."},
    {t:"support",c:`"Quick question before we talk about what's possible \u2014 is this a decision you'd be able to make on your own, or would your partner be involved in something like this?"\n[prospect responds]`}
  ]},
  {id:4,name:"Pre-Pitch Coaching",sub:"The Two Keys + Math Moment",color:"#b45309",blocks:[
    {t:"coach",c:"Pre-pitch is now lean. One job: install the Two Keys frame (offer + system to get clients) and use the math moment to make their goal feel achievable BEFORE the pitch starts. The Three Currencies model is a separate tab \u2014 deploy it ONLY if they push back on the Affinity Launch in Pillar 2 with 'I don't have a network' or seem confused about where their first clients come from. Don't run it by default \u2014 it adds 3\u20135 minutes most prospects don't need."},
    {t:"sec",label:"THE TWO KEYS + MATH MOMENT",
      c:`"It really comes down to two things. A desirable, scalable offer \u2014 not 'I sell online personal training,' but a specific result for a specific person with a specific method. And a system to get clients for that offer consistently. That's it."\n\n"In terms of your offer \u2014 do you have an idea of what that looks like? Like, who it's for, what problem it specifically solves, and how you'd deliver it without just doing Zoom sessions all day?"\n[prospect responds]\n\n"And what are you thinking of charging for it?"\n[If low or no offer:] "Most of our trainers start at $3,000 for a 6-month package \u2014 that's $500 a month. To hit [their stated goal], you'd only need [X] clients. Does that math change how you're thinking about this?"`},
    {t:"calc",tab:"PT Pivot Calculator \u2192 View 2: Clients Needed",quickAction:"Click <strong>View 2: Clients Needed</strong> \u2192 <em>\u201cAt $3K/pkg, here\u2019s how many online clients you need to replace your in-person income.\u201d</em> \u2192 <em>\u201cTell me what you think.\u201d</em>",action:"Click <strong>View 2: Clients Needed</strong>. Already in Share View. Say: <em>\"At $3,000 per package, here's exactly how many online clients you need to replace your in-person income.\"</em> Let the active-clients number sit. The caption below shows <strong>Total New Client Revenue</strong> over their first 6 months \u2014 ~$48K at default offer. Reference it lightly: <em>\"And the way our offer compounds with backend resigns, that's around $48K in new client revenue contracted over your first 6 months.\"</em> Then: <em>\"Tell me what you think when you look at that number.\"</em> Stay silent. The goal is for them to say it themselves: <em>\"that's actually doable.\"</em> Builds Belief #4 (Desire).",
      note:"If their goal was low, challenge it: 'To hit $8K instead of $6K, you only need [X+1] clients. Want to use $8K as the real target?' Update the goal field live in the input panel. Let them watch the number barely move. The LTV caption underneath (FE + BE \u00d7 resign) is your tee-up for Pillar 4 \u2014 don\u2019t explain it here, just leave it visible."}
  ]},
  {id:5,name:"Hamburger Transition",sub:"",color:"#15803d",blocks:[
    {t:"coach",c:"Use their EXACT words from discovery \u2014 not paraphrases. If they said 'I just want to be done by 9:30,' say that back verbatim. If they said 'I can't keep doing evenings,' say that. This is the moment they feel genuinely understood \u2014 don't generalize it away. Also note: reference the 1,300+ PT-specific success stories here \u2014 it builds instant credibility with this avatar."},
    {t:"say",c:`"Well [Name], based on everything you've shared \u2014 I think what I have going on here could be a really good fit for you..."\n\n"...because you know how earlier you mentioned [recap their #1 pain/desire in their EXACT words]..."\n[prospect: yeah, exactly]\n\n"Our whole thing at IFCA is a proven four-step process to get you from where you are right now \u2014 trading time for money in-person \u2014 to a hybrid or fully online business running $5K, $10K, even $15K months, in about six months. We've done this specifically with over 1,300 in-person trainers who were exactly where you are."\n\n"Instead of spending months trying to piece this together alone and making every mistake in the book \u2014 we just help you build it right from day one. Make sense?"\n[prospect: yes]\n\n"Cool \u2014 where do you want to go from here? I can walk you through exactly how we do that, A to Z. But you tell me."\n[They will say: walk me through it]\n\n"Perfect. Grab a pen and write down 1 through 4 with some space between each."`}
  ]},
  {id:6,name:"The Pitch",sub:"4 Client Engine Pillars",color:"#4338ca",blocks:[
    {t:"pitch-sop",c:"PT Pivot prospects almost always have two dominant fears: 'I'll lose my current clients' and 'I don't know how to get online clients.' P2 (Lead Engine) almost always runs Full because the Affinity Launch is the core hook \u2014 it resolves both fears simultaneously. P3 (Business Manager) runs Quick unless they expressed delivery anxiety. P1 and P4 follow the constraint \u2014 if they're confident in their offer, Quick P1; if they're nervous about selling online, Full P4. <strong>Default to Quick on every pillar except the one that maps to their #1 stated fear.</strong> Use the optional Discovery Hook in Full mode to mirror their exact words from discovery."},
    {t:"sec",label:"HIGH LEVEL PROMISE",
      c:`"Before I walk you through the four things \u2014 the moment you enroll, the first thing we do is pair you with a 1-on-1 Success Coach who's already built a six or seven-figure fitness coaching business themselves. Half our coaching team has gone through this exact in-person to online transition \u2014 so you'll be paired with someone who's been exactly where you are."\n\n"Everything I'm about to walk you through gets shaped and personalized by them. Here's what I think it looks like for you specifically..."`},
    {t:"pillar",num:1,label:"AI OFFER OPTIMIZATION",
      sop_hint:"Quick if they're confident in their niche and what they'd charge online. Full if they're unsure how to position online, what to charge, or how to differentiate from $99-app competitors. Use the Discovery Hook in Full mode if they used specific language about feeling like a commodity or not knowing how to stand out.",
      hook:[
        "\"Remember earlier when you said you're worried you have nothing to offer online?\"",
        "\"You mentioned you don't even know what you'd charge online \u2014 that's exactly what step one solves.\"",
        "\"Earlier you said you're not sure how to translate your in-person work to online \u2014 this is that.\""
      ],
      when:"They flagged \"I don't know what I'd offer online,\" \"I'd just be like every other online trainer,\" or didn't have a clear specialty. Run Quick if they already know exactly who they help and what they'd charge.",
      quick:`"Number one \u2014 AI Offer Optimization. {{r}}Most trainers going online become 'an online personal trainer' \u2014 same thing they've been selling, just delivered through Zoom. They blend in with thousands of coaches at $99 a month through fitness apps, end up competing on price, and quit within a year. The ones who try to figure out their niche, pricing, and positioning alone burn 6 to 12 months in trial-and-error \u2014 and most never land it.{{/r}} {{g}}In 48 hours, your Success Coach uses our AI Offer Optimizer to take your in-person expertise and position it as a premium offer \u2014 specific result, specific person, $2,500 to $3,500 a package instead of $99 a month. You stop being a commodity and become the only logical choice for your ideal client.{{/g}} {{tie}}When you have that level of clarity from day one \u2014 does the 'I'll just be another online trainer competing on price' fear go away?{{/tie}}"`,
      full:`"Number one \u2014 AI Offer Optimization. And I want to start here because every PT going online makes the same mistake at the start, and it's the reason most of them fail."\n\n"They become 'an online personal trainer.' Which puts you in a market with thousands of others at $99 a month through fitness apps. You blend in completely. And worse \u2014 you've taken the part of your job you're best at, coaching humans in real time, and turned it into the thing you don't even want to do \u2014 Zoom workouts at 6am. That's literally a worse version of the in-person business you already have."\n\n"Now \u2014 compare that to what most trainers do when they try to figure the offer side out alone. Option one: Google 'fitness niches' for six months and never land. Option two: copy whatever guru they're following and end up sounding like everyone else. Option three: price too low because they think 'online has to be cheaper than in-person' \u2014 now they're working harder for less. We see trainers spend a year on this and never get it right."\n\n"What we do instead: your Success Coach sits with you 1-on-1 inside the first 48 hours using our AI Offer Optimizer. We take your [X] years of expertise, the specific clients you do your best work with, the result you reliably deliver \u2014 and we build a $3,000 premium offer around that. Same expertise. Completely different market position. You're not 'an online trainer.' You're the person who helps [specific person] achieve [specific result] through your named method."\n\n"Think about it: '$149 a month for online personal training' versus '$3,000 for a 6-month transformation system that gets [specific person] [specific result].' Same service. Completely different category. And you get there in 48 hours instead of 12 months of guessing."\n\n{{tie}}"When your offer takes you out of the '$99-a-month commodity' bucket completely \u2014 does that change what kind of clients you'd attract and what you'd charge from day one?"{{/tie}}\n[Wait for response before moving to Pillar 2]`},
    {t:"pillar",num:2,label:"LEAD GENERATION ENGINE",
      sop_hint:"Almost always runs Full \u2014 the Affinity Launch is the core hook and resolves both dominant PT fears at once: 'I have no audience' and 'I don't want to cold-message strangers.' Use the Discovery Hook in Full mode if they used emotional language about cold messaging or 'I can't pitch to my clients.' Quick only if they're already comfortable with their network.",
      hook:[
        "\"Remember when you said you don't have any following AND you'd feel weird messaging people?\"",
        "\"You mentioned you have no idea how you'd actually get online clients \u2014 this is exactly that.\"",
        "\"Earlier you said posting on Instagram has been hit-or-miss \u2014 this is the structural alternative.\""
      ],
      when:"This is the universal PT Pivot belief break. Run Full unless their stated constraint is clearly elsewhere (e.g., they already have inbound leads coming in but can't close them \u2014 then run P4 Full instead).",
      quick:`"Number two \u2014 the Lead Generation Engine. {{r}}Most trainers going online end up in one of three traps. They burn 6 months trying to grow Instagram from zero and never land a client because they have no warm audience. They burn $5K to $20K trying to figure out paid ads alone and quit. Or they hire an agency \u2014 and most of the trainers we talk to spent $5K-$10K with an agency and got zero clients, because agencies don't understand fitness offers and run cold ads to a market that doesn't trust you yet.{{/r}} {{g}}Three stages, in order. Stage one: Affinity Launch \u2014 structured warm outreach to people already in your network who trust you. Out of every 100 contacts, 3 to 7 typically become $3K paying clients. That's $9K to $21K from people in your phone before a dollar in ads. Stage two: AI content runs in parallel. Stage three: paid ads only after your offer's proven \u2014 and we cover your first month of ad spend.{{/g}} {{tie}}Knowing your first 3 to 7 clients come from people who already trust you \u2014 does the 'I have no audience' fear feel solvable now?{{/tie}}"`,
      full:`"Number two \u2014 the Lead Generation Engine. And this is the one I want to walk you through carefully, because it's where most trainers get this completely wrong."\n\n"There are three stages. We go in this order \u2014 and the order is what makes it work."\n\n"Stage one: The Affinity Launch. Before we run a single ad, we run a structured warm outreach campaign to the people who already trust you. NOT cold messaging \u2014 I want to be completely clear on that. A specific conversation framework that feels completely natural. You're not pitching anyone. You're reconnecting, asking good questions, and when the time is right, mentioning what you've built. Out of every 100 people you reach out to, typically 3 to 7 become $3,000 paying clients. That's $9,000 to $21,000 from contacts already sitting in your phone \u2014 before you've spent a dollar on ads. Those first clients prove your offer works, fund the next stage, and become the social proof that makes everything else work better."\n\n"Now \u2014 compare that to what most trainers do. Option one: try to grow Instagram from zero. We see trainers post daily for 6 to 12 months, get to 800 followers, and never land a single client because they have no warm audience. Option two: figure out paid ads alone. Burn $5K to $20K guessing at messaging, audiences, and offer copy before they ever know what works. Option three: hire an agency. They run cold ads to people who don't trust you yet, your CPL climbs, and most of the trainers we talk to spent $5K to $10K with an agency and got zero clients. None of those work because they all skip the trust step."\n\n"Stage two: AI Content System. While the Affinity Launch is running, we install your AI content system \u2014 we call her Lexi. She plugs in your exact offer, analyzes what's already working in your market, and gives you ready-to-execute content creatives. You're not staring at a blank screen. You're not guessing what to post. Now one of two things happens \u2014 either your content starts converting and you're getting inbound leads without a dollar in ad spend, or it's warming your audience while the Affinity Launch is closing clients. You're winning either way."\n\n"Stage three: Paid Amplification. Once your offer is proven \u2014 you have clients, you have results, you have content that converts \u2014 that's when we layer in ads. Not before. Because by then we know exactly what message lands with your exact client. And we cover your first month of ad spend."\n\n"Network first. Content to test what converts. Ads to amplify what's proven. That's the order \u2014 and that's why this works when going at it alone fails."\n\n{{tie}}"When you compare what we just walked through \u2014 starting with people who already trust you, then layering content, then ads with a proven offer \u2014 to growing Instagram from zero or burning ad spend trying to figure it out: does the 'no audience, don't want to message strangers' fear get fully resolved by this approach?"{{/tie}}\n[Wait for response]`},
    {t:"coach",c:"Preempt the 'I don't want to cold message people' objection proactively \u2014 don't wait for it. If they seem hesitant during this pillar, say: 'I want to be clear \u2014 this isn't cold messaging. These are people who already know your face, know your work, trust your expertise. We're not asking you to pitch strangers. We're giving you a conversation framework that turns existing trust into a natural conversation \u2014 and in some cases they'll just say they've been waiting to work with you.' <strong>Deploy lever:</strong> If they push back with 'I don't have a network' or 'I don't really know that many people' or seem genuinely confused why we'd start with their phone contacts \u2014 jump to the <strong>Three Currencies</strong> tab in the sidebar. Walk them through the three branches and the math at their contact count, then return to Stage 2 of Pillar 2. Don't deploy proactively \u2014 only when resistance surfaces."},
    {t:"calc",tab:"PT Pivot Calculator \u2192 View 3: 6-Month Path",quickAction:"Click <strong>View 3: 6-Month Path</strong> \u2192 Confirm sign rate (default 2/mo for PT) \u2192 <em>\u201c$40K contracted, $25K cash, $15K still in pipeline \u2014 and you haven\u2019t touched your in-person book.\u201d</em> \u2192 <em>\u201cTell me what you think.\u201d</em>",action:"Click <strong>View 3: 6-Month Path</strong>. Already in Share View. Confirm Sign Rate Plan in inputs (default 2/mo for PT \u2014 raise if they have a strong warm network or ambition; lower to 1 if they signal limited capacity). Three big cards appear: <strong>Total New Client Revenue</strong> (hero, green) \u2014 full FE + BE-resign value over 6 months; <strong>Collected as Cash by Month 6</strong> \u2014 what they actually deposit; <strong>Still in Pipeline</strong> \u2014 paying in after month 6. Say: <em>\"At 2 new clients per month over your first 6 months \u2014 most of those coming from your network in the early weeks \u2014 here\u2019s what you\u2019ve actually built: $40K in new client revenue contracted, $25K already in the bank by month 6, $15K still paying in over the months after. And you haven\u2019t touched your in-person book.\"</em> Pause. Then: <em>\"Tell me what you think.\"</em> Builds Belief #2 (DIY doubt) + Belief #7 (Trust the methodology).",
      note:"Affinity Launch lives in your Pillar 2 dialogue (first 3 to 7 clients from their phone), not on the calculator screen. The 2/mo sign rate already absorbs that \u2014 early months come from warm network, later months from ads. If they push back on the 2/mo number, lower it to 1 and watch totals drop. Don't argue \u2014 adjust and let the math do the work. <strong>Optional reverse-funnel reveal (solution-aware PTs only):</strong> If they\u2019ve run ads before \u2014 click the small <em>\u25B6 Show the lead engine math</em> chip below the cards. Four cells appear: ~4 live calls, ~5 booked, ~97 leads, ~$194 ad spend per month at IFCA benchmarks (55% close, 75% show, 5% L\u2192B, $2/lead). Skip for trainers with no ad experience \u2014 the cash card ($25K) is what closes them, not the ad spend math."},
    {t:"pillar",num:3,label:"IMPACT AI BUSINESS MANAGER",
      sop_hint:"Quick unless they expressed delivery anxiety or said 'I don't know how to deliver online.' Full if they specifically fear Zoom workouts all day or don't know how to set up tech. Use the Discovery Hook in Full mode if they used specific language about being overwhelmed by tools or 'I can't figure out how to run programs online.'",
      hook:[
        "\"Remember when you said the tech side of going online is what scares you most?\"",
        "\"You mentioned you didn't want to be on Zoom calls all day \u2014 this is exactly why you don't have to be.\"",
        "\"Earlier you said you have no idea what tools you'd even need online \u2014 this is what we install.\""
      ],
      when:"They expressed delivery anxiety, \"I'm not techy,\" or didn't understand structurally how online coaching delivery works. Run Quick if they're tech-comfortable.",
      quick:`"Number three \u2014 Impact AI Business Manager. {{r}}Most trainers going online think it means doing Zoom workouts all day \u2014 which is just a worse version of in-person. Or they end up duct-taping 5 to 7 different apps together \u2014 CRM, payments, scheduling, follow-up \u2014 that don't talk to each other. They spend 30 to 60 days fighting tech instead of getting clients, and it costs them $300 to $1,000 a month in software fees alone.{{/r}} {{g}}One platform replaces all of it. Your client gets a professional app with their personalized program and video demos. You respond to weekly check-ins via short Loom videos \u2014 from your couch. No Zoom workouts. $1 a month while you're enrolled, fully set up in your first week.{{/g}} {{tie}}Does that change the picture from 'trapped on Zoom calls all day' to 'a real online business you'd actually want to run'?{{/tie}}"`,
      full:`"Number three \u2014 Impact AI Business Manager. And I want to spend a second on this, because most trainers worry online means a worse version of what they already do."\n\n"Most trainers think going online means doing Zoom workouts all day. Here's the truth: the best online coaching is NOT Zoom workouts. It's actually more accountable than in-person \u2014 because your client has you in their pocket 24/7, not just for an hour three times a week."\n\n"Here's how delivery actually works: your client gets a professional app with their personalized program, video demos for every exercise, and a weekly check-in system. You respond to their check-ins via short Loom videos \u2014 from your couch. No more showing someone a Romanian deadlift for the 400th time. One Loom video, done."\n\n"Now \u2014 compare that to trainers who try to figure this out alone. They Google 'what tools do I need for online coaching' and end up duct-taping 5 to 7 different apps together \u2014 CRM here, payments there, scheduling separate, email on another tool, funnels on yet another. Each one's $30 to $100 a month. Each has its own learning curve. None of them talk to each other cleanly. We see trainers spend the first 30 to 60 days fighting their tech stack instead of getting clients. Some never recover \u2014 they get so bogged down in the operational mess they quit before getting any traction."\n\n"Impact AI Business Manager replaces all of it. One platform \u2014 program delivery, CRM, scheduling, payments, follow-up, automated text sequences when someone applies \u2014 all integrated. $1 a month while you're with us. Most trainers save $300 to $1,000 a month from day one in tool costs alone. We set it up for you. You launch with a real, professional system in place from day one."\n\n{{tie}}"When you picture Loom check-ins from your couch versus duct-taping 5 apps together for the first 60 days \u2014 does that feel like a real online business or still feel like a side hustle?"{{/tie}}\n[Wait for response]`},
    {t:"pillar",num:4,label:"CONVERSION + RETENTION",
      sop_hint:"Quick if they're comfortable with the sales conversation. Full if they expressed nervousness about 'selling online' or 'I've never had to close someone before.' Always highlight the in-person client transition angle \u2014 their current clients are their easiest first online clients. Use the Discovery Hook in Full mode if they said specific things about being uncomfortable closing or worried about losing existing clients.",
      hook:[
        "\"Remember when you said you're not sure how to sell online vs. in person?\"",
        "\"You mentioned you've never done a sales call before \u2014 this is exactly that training.\"",
        "\"Earlier you said you're worried about losing your in-person clients \u2014 this is the system that turns them into your best online clients.\""
      ],
      when:"They expressed nervousness about online sales, said \"I've never closed anyone before,\" or worried about losing in-person clients. Run Quick if they're sales-comfortable.",
      quick:`"Number four \u2014 Conversion and Retention. {{r}}In person, trust builds over weeks \u2014 clients see you on the floor, watch you coach, eventually walk up. Online you have ONE conversation. Without a framework, most trainers freeze on calls and lose people who would've become clients in person. Industry close rate is 10 to 20% \u2014 meaning you need 3x the leads to hit your number. Industry retention is 9 months \u2014 meaning you're constantly running just to stand still.{{/r}} {{g}}Proven scripts plus unlimited 1-on-1 call reviews \u2014 our students close 30 to 50%. Your existing in-person clients become your easiest first online clients \u2014 trust's already there. Our LTV system keeps clients 17+ months. 10 to 15 online clients on this model = predictable income.{{/g}} {{tie}}When you picture closing half your calls AND keeping clients twice as long \u2014 does that feel like the version of this business you actually want to build?{{/tie}}"`,
      full:`"Number four \u2014 the Conversion and Retention System. And this last piece is the difference between an online business that compounds and one that always feels like it's about to fall apart."\n\n"Online sales calls are different from how trust gets built in person. In person, trust builds over weeks \u2014 clients see you on the floor, watch you coach, eventually walk up and ask to work with you. Slow close, built on physical presence. Online, you have ONE conversation. Without a framework, most trainers freeze on calls and lose people who would've become clients in person. Industry average close rate is 10 to 20%. Industry average retention is 9 months. So even when leads come in, you're losing more than half of them, and the ones you do close leave before they're profitable."\n\n"Now \u2014 compare that to what trainers do going at it alone. They wing every call, freeze when objections come up, and assume 'people aren't ready' instead of seeing they're losing winnable calls. Same thing on retention \u2014 they don't have a system to keep clients past month 3 because they've never had to. In person, retention is mostly automatic \u2014 clients show up, see results, refer their friends. Online, without a system, retention craters and you're stuck on the new-client treadmill forever."\n\n"Two parts to what we install. Part one: closing. Average coaches starting out close 10 to 20% of calls. Our coaches close 30 to 50%. You get proven DM and sales call scripts built specifically for fitness coaches, plus unlimited 1-on-1 call reviews \u2014 our coaches listen to your actual recorded calls and tell you exactly what to say and where you're losing people."\n\n"Part two: retention. Here's something most trainers don't think about \u2014 your current in-person clients who transition online become some of your most loyal long-term online clients because the trust is already there. With the right conversation, a $400/month in-person client becomes a $350/month online client that takes 20 minutes a week instead of 4 hours. Our LTV Retention System keeps clients for an average of 17+ months. Ten clients at $3K a package \u2014 at 17-month retention, each is worth $8K+ in lifetime value. That's a predictable, compounding business."\n\n{{tie}}"When you compare 10\u201320% close rate and 9-month retention \u2014 what most trainers get going at it alone \u2014 to 30\u201350% close rate and 17-month retention with a coached system: does that change the size of the business you can actually build?"{{/tie}}\n[Wait for response]`},
    {t:"sec",label:"DELIVERY RECAP",
      c:`"One quick thing \u2014 do you have any system right now to deliver programs and track clients online?"\n[If no:] "Perfect \u2014 we'll get you set up on Trainerize. It's pre-built for fitness coaches, we have a partnership so you get it at a significant discount, and we onboard you onto it alongside your Success Coach."\n\n"So to recap: your offer positioned so you stand out and charge premium. First clients from your Affinity Launch \u2014 the people who already trust you, zero ad spend. Then content that tests what converts. Then ads to amplify what's proven, and we cover month one. One platform that replaces all your apps and delivers programs professionally. And a sales and retention system that closes 30 to 50% of calls and keeps clients 17-plus months."\n\n"Everything is customized to your situation. Your onboarding call with your Success Coach maps out your complete 6-month plan \u2014 what we do for you, what we need from you, and in what order. Zero guesswork."\n\n"Does that sound good?"\n[If they hesitate, surface the concern NOW before moving to price]`}
  ]},
  {id:7,name:"Committing Phase",sub:"Price Drop",color:"#b91c1c",blocks:[
    {t:"sec",label:"TEMP CHECK \u00b7 ALWAYS",
      c:`"Before I share the investment \u2014 quick gut check on where you're at."\n\n"On a scale of 1 to 10 \u2014 where do you fall in terms of alignment with what we do?"\n[ALWAYS ask this. Do not skip even if they seem enthusiastic. This is the gate before price \u2014 running it prevents 80% of post-price objections.]\n\n[If 8+] "Good \u2014 let's get into next steps."\n[If less than 8:] "What would make it a 10 for you?"\n[Surface the hidden objection NOW \u2014 before the price.]`},
    {t:"calc",tab:"PT Pivot Calculator \u2192 View 4: Combined Reveal",quickAction:"Click <strong>View 4: Combined Reveal</strong> \u2192 <em>\u201cLet me leave you with this.\u201d</em> \u2192 5 sec silence \u2192 <em>\u201cThat on the left is two years of staying capped. That on the right is six months of executing. Which one\u2019s worth more?\u201d</em> \u2192 Drop price.",action:"Click <strong>View 4: Combined Reveal</strong>. Already in Share View. Say: <em>\"Before we talk about next steps \u2014 let me leave you with this.\"</em> Stay silent for 5 full seconds. Two cards on screen: <strong>Left (red)</strong> \u2014 cost of staying capped (your stated goal \u00d7 12 months you\u2019re not earning it). <strong>Right (green)</strong> \u2014 Total New Client Revenue from your first 6 months online, with Collected as Cash and Still in Pipeline stacked underneath. Then: <em>\"That on the left is two years of staying where you are. That on the right is six months of executing. So the real question is \u2014 which one\u2019s worth more to you?\"</em> Drop price. Builds urgency before commitment.",
      note:"Don't narrate the numbers a second time \u2014 they did the work earlier. The closer cue is silence + one bridge sentence + price. If they speak first \u2014 even just 'huh' \u2014 let them. Don\u2019t fill silence with explanation."},
    {t:"rule",c:"After you drop the price \u2014 STOP. Complete silence. The first person to speak loses the momentum. Every single time, no exceptions. Do not fill the silence."},
    {t:"sec",label:"PRICE DROP",
      c:`"So basically next steps \u2014 you process the investment with me today, we get your onboarding call scheduled, and you'll have complete clarity on everything that happens over the next six months. Does that sound good?"\n[wait for yes]\n\n"And the investment is just [PRICE]."\n[STOP. Silence. Let them speak first.]\n\n[When they agree but go quiet:] "Can I just welcome you to the family?"\n[If yes:] "Perfect. What's a good email to send the receipt to? And what card do you want to put down?"`}
  ]},
  {id:8,name:"Objection Handling",sub:"",color:"#374151",blocks:[
    {t:"rule",c:"Run the Master Sequence FIRST on every objection before going to a specific handle. Never book a follow-up for a fear-based objection \u2014 close it on the call. Complaints \u2260 objections. Don't handle complaints."},
    {t:"sec",label:"MASTER SEQUENCE \u2014 RUN FIRST ON EVERY OBJECTION",
      c:`"[Objection] aside \u2014 do you feel this is exactly what you need to make this transition?"\n"So you're 100% in on the process... it's just a matter of solving [objection], and then you're ready to move forward. Is that right?"\n[Now you're problem-solving together \u2014 not fighting]`},
    {t:"obj",label:"PT-SPECIFIC: 'I DON'T HAVE AN AUDIENCE'",
      c:`"Good \u2014 you don't need one to start. And I mean that literally."\n\n"Your first clients don't come from an audience. They come from your network \u2014 the people who've trained with you, worked out near you, watched you coach for years. Those people already trust you. We call it the Affinity Launch \u2014 it's a structured outreach campaign to your existing contacts using a conversation framework that feels completely natural. Not pitching. Not cold DMs. Just reconnecting with people who already respect your work."\n\n"Out of every 100 contacts, we typically see 3 to 7 clients sign. At $3,000 a package, that's up to $21,000 from people already in your phone \u2014 before we've touched ads."\n\n"The audience is the last thing we build. The network is where we start. You've already got the most important currency."`},
    {t:"obj",label:"PT-SPECIFIC: 'I DON'T KNOW HOW TO DELIVER ONLINE'",
      c:`"That's exactly why Pillar 3 exists. The Impact Business Manager is set up for you in your first week \u2014 you get a dedicated 1-on-1 tech onboarding call. No Zoom workouts. Your clients get a professional app. You respond to check-ins from your phone. You don't figure out a single thing alone."\n\n"How tech-savvy do you need to be to use an app on your phone?"`},
    {t:"obj",label:"PT-SPECIFIC: 'I DON'T WANT TO LOSE MY IN-PERSON CLIENTS'",
      c:`"Nobody's asking you to \u2014 that's the whole point of the hybrid model. You keep the in-person clients you love, especially your morning people. What we're building is the online side that replaces the evenings and adds a second income stream.\n\n"At worst, you end up with both. At best, the online grows to where you have real choices. Either way, you win."`},
    {t:"obj",label:"PT-SPECIFIC: 'I DON'T HAVE TIME TO BUILD THIS'",
      c:`"Our most successful students were the busiest when they started \u2014 not because they had spare time, but because they had momentum and a real reason to get it done."\n\n"The lead gen, content system, and tech setup \u2014 we build all of that alongside you. We're not asking you to figure this out between clients. We're building it alongside you."`},
    {t:"obj",label:"'I NEED TO THINK ABOUT IT'",
      c:`1. Clarify: "What specifically is it that you'd like to think about?"\n2. Isolate: "Outside of [what they said] \u2014 is there anything else holding you back?"\n3. Reframe: "People who say 'think about it' are usually asking one of two things: 'Will this actually work for me?' or 'Can I afford this right now?' Which one is it for you?"\n4. Cost Flip: "Trainers who keep saying 'let me think about it' are the same ones still doing evening sessions 12 months from now. What does another year at the same ceiling actually cost you?"`},
    {t:"obj",label:"MONEY \u2014 TRIPLE TIE-DOWN",
      c:`Step 1 \u2014 Isolate: "Investment aside \u2014 is there anything else that would keep you less than 100% certain you'd want to work with us? Or is it just a cash flow thing?"\n\nStep 2 \u2014 Tie Down: "If you had $[PRICE] completely liquid right now... would you do it? Are you 10/10 on the process specifically?"\n\nPermission Bridge: "Got it. The last thing I want is for finances to hold you back from getting the help you need. I do have some flexibility here. Do you mind if I ask you a personal question?"\n\nOpen Wallet: "Just so I can see if I can help \u2014 what would you have available today? Checking, savings, or credit?"\n[Probe 3 buckets: checking / savings / credit]\n\nStep 3 \u2014 Close: "If I was able to break this up and allow you in today \u2014 we'd still treat you like you paid in full. If I can make this more digestible based on what you have, would you be ready to get started today?"`},
    {t:"obj",label:"SPOUSE OBJECTION",
      c:`[Path A \u2014 Haven't talked yet:]\n"Are they generally supportive of you building something for yourself, or is that a conversation you need to have?"\n[If supportive:] "So it's more of a formality \u2014 you just want them in the loop. Is that fair? Let's make sure this makes sense for YOU first. What's holding you back personally?"\n\n[Path B \u2014 They have concerns:]\n"What do you think their biggest concern would be? Let's talk through that now so you're completely prepared."`},
    {t:"obj",label:"EGO \u2014 'I CAN FIGURE THIS OUT MYSELF'",
      c:`"I love that confidence \u2014 and you probably could figure parts of it out. How long have you been thinking about building the online side? And how far along are you right now?"\n[Let them answer]\n\n"So what makes you think the next 6 months are going to look different from the last [X months]?"\n[Pause]\n\n"The issue isn't your ability \u2014 you clearly know your craft. It's that you're trying to solve a systems problem with hustle. The system is what's missing, not your work ethic."`}
  ]}
];

function fmt(t){if(!t)return '';return t.split('\n\n').map(p=>{const h=p.split('\n').map(l=>l.replace(/\[([^\]]+)\]/g,'<span class="cue">[$1]</span>')).join('<br>');return`<p>${h}</p>`;}).join('');}
function fmtDisc(t){if(!t)return '';return t.split('\n\n').map(p=>{const h=p.split('\n').map(l=>l.replace(/\[([^\]]+)\]/g,'<span class="disc-bracket">[$1]</span>')).join('<br>');return`<p>${h}</p>`;}).join('');}
function fmtPitch(t){if(!t)return '';return t.split('\n\n').map(p=>{const h=p.split('\n').map(l=>l.replace(/\{\{r\}\}/g,'<span class="contrast">').replace(/\{\{\/r\}\}/g,'</span>').replace(/\{\{g\}\}/g,'<span class="new-way">').replace(/\{\{\/g\}\}/g,'</span>').replace(/\{\{tie\}\}/g,'<span class="tie-line">').replace(/\{\{\/tie\}\}/g,'</span>').replace(/\[([^\]]+)\]/g,'<span class="cue">[$1]</span>')).join('<br>');return`<p>${h}</p>`;}).join('');}

let globalPM='quick';const pillarModes={};
function getPM(n){return pillarModes[n]||globalPM;}
function setGlobalPM(m){
  globalPM=m;
  ['quick','full'].forEach(x=>{const b=document.getElementById('ptgl-'+x);if(b)b.classList.toggle('active',x===m);});
  for(let i=1;i<=4;i++){if(!pillarModes[i])updatePD(i);}
}
function setPM(n,m){if(m===null){delete pillarModes[n];}else{pillarModes[n]=m;}updatePD(n);updatePOB(n);}
function updatePD(n){const m=getPM(n);const el=document.getElementById('pillar-p'+n);if(!el)return;el.querySelectorAll('.pm-block').forEach(b=>b.classList.remove('pm-visible'));const a=el.querySelector('.pm-'+m+'-block');if(a)a.classList.add('pm-visible');}
function updatePOB(n){const ov=pillarModes[n]||null;const el=document.getElementById('pillar-p'+n);if(!el)return;el.querySelectorAll('.pmo-btn[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===ov));}
function initPMs(){for(let i=1;i<=4;i++){updatePD(i);updatePOB(i);}}

function renderBlock(b,pc){
  switch(b.t){
    case 'say': return`<div class="block-say"><div class="say-label">SAY THIS</div><div class="say-text">${fmt(b.c)}</div></div>`;
    case 'coach': return`<div class="block-coach coach-only"><div class="coach-head"><span class="coach-lbl">\ud83d\udcdd Coaching Note</span></div><div class="coach-body">${b.c}</div></div>`;
    case 'pitch-sop': return`<div class="block-coach coach-only"><div class="coach-head"><span class="coach-lbl">\ud83d\udcdd Pitch Mode Guide \u2014 PT Pivot</span></div><div class="coach-body">${b.c}</div></div>`;
    case 'rule': return`<div class="block-rule"><div class="rule-lbl">\u26a0 RULE</div><div class="rule-body">${b.c}</div></div>`;
    case 'calc': return`<div class="block-calc"><div class="calc-head"><span class="calc-icon">\ud83d\udcca</span><div class="calc-info"><div class="calc-tab">Open: ${b.tab}</div><div class="calc-action calc-action-quick">${b.quickAction||b.action}</div><div class="calc-action calc-action-full">${b.action}</div></div></div>${b.note?`<div class="calc-note">${b.note}</div>`:''}</div>`;
    case 'opening': return`<div class="block-opening"><div class="opening-head"><div class="opening-lbl">Opening Question</div></div><div class="opening-body"><div class="block-say" style="background:transparent;border:none;padding:0"><div class="say-text">${fmt(b.c)}</div></div></div></div>`;
    case 'block':{const cs=`background:${b.bc}18;color:${b.bc}`;return`<div class="block-disc"><div class="disc-head"><div class="disc-num" style="background:${pc}">${b.num}</div><div class="disc-lbl">${b.label}</div><span class="belief-chip" style="${cs}">${b.belief}</span></div><div class="disc-body">${b.coach?`<div class="block-coach coach-only"><div class="coach-head"><span class="coach-lbl">\ud83d\udcdd Coaching Note</span></div><div class="coach-body">${b.coach}</div></div>`:''}<div class="block-say" style="background:transparent;border:none;padding:0"><div class="say-text">${fmt(b.c)}</div></div></div></div>`;}
    case 'support': return`<div class="block-support"><div class="support-lbl">Support Check</div><div class="btext">${fmt(b.c)}</div></div>`;
    case 'sec': return`<div class="block-sec"><div class="sec-head"><div class="sec-lbl">${b.label}</div></div><div class="sec-body"><div class="block-say" style="background:transparent;border:none;padding:0"><div class="say-text">${fmt(b.c)}</div></div></div></div>`;
    case 'pillar': {const hookHtml=b.hook?`<div class="hook-box"><div class="hook-lbl">Optional Discovery Hook \u00b7 Pick one if it matches</div><div class="hook-intro">Mirror their exact words from discovery. Skip if none of these came up.</div><ul class="hook-list">${b.hook.map(h=>`<li>${h}</li>`).join('')}</ul></div>`:'';const whenHtml=b.when?`<div class="when-bar"><strong>Run Full If</strong><span>${b.when}</span></div>`:'';return`<div class="block-pillar" id="pillar-p${b.num}"><div class="pillar-head"><div class="pillar-num">${b.num}</div><div class="pillar-lbl">${b.label}</div><div class="pillar-mode-btns"><button class="pmo-btn" data-mode="quick" title="Quick" onclick="setPM(${b.num},'quick')">\u26a1</button><button class="pmo-btn" data-mode="full" title="Full" onclick="setPM(${b.num},'full')">\ud83d\udccb</button><button class="pmo-btn pmo-reset" title="Reset to global" onclick="setPM(${b.num},null)">\u21ba</button></div></div>${b.sop_hint?`<div class="pillar-sop-hint"><div class="coach-lbl">\ud83d\udcdd When to Use Each Mode</div><div class="coach-body">${b.sop_hint}</div></div>`:''}<div class="pm-block pm-quick-block"><div class="pm-tag pm-quick-tag">\u26a1 Quick</div><div class="pm-text">${fmtPitch(b.quick)}</div></div><div class="pm-block pm-full-block"><div class="pm-tag pm-full-tag">\ud83d\udccb Full</div>${hookHtml}<div class="pm-text">${fmtPitch(b.full)}</div></div>${whenHtml}</div>`;}
    case 'obj': return`<div class="block-obj"><div class="obj-head"><div class="obj-lbl">${b.label}</div></div><div class="obj-body"><div class="block-say" style="background:transparent;border:none;padding:0"><div class="say-text">${fmt(b.c)}</div></div></div></div>`;
    case 'list': return`<div class="block-list"><div class="list-title">${b.label}</div><ul class="closer-beliefs">${b.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
    case 'beliefs': return`<div class="block-beliefs"><div class="beliefs-label">${b.label}</div>${b.coach?`<div class="block-coach coach-only"><div class="coach-head"><span class="coach-lbl">\ud83d\udcdd Coaching Note</span></div><div class="coach-body">${b.coach}</div></div>`:''}<table class="beliefs-table"><thead><tr><th>#</th><th>Belief</th><th>What It Means</th><th>\u2713</th></tr></thead><tbody>${b.rows.map(r=>`<tr><td class="b-num">${r.n}</td><td class="b-name">${r.name}</td><td class="b-desc">${r.desc}</td><td class="b-check" onclick="this.textContent=this.textContent==='\u2610'?'\u2705':'\u2610'">\u2610</td></tr>`).join('')}</tbody></table></div>`;
    default: return '';
  }
}
