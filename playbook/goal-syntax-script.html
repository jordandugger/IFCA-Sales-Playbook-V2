<script>
const PHASES=[
  {id:0,name:"Before You Dial",sub:"Mindset & Foundations",color:"#374151",blocks:[
    {t:"coach",c:"Internalize these before every single call. Your certainty and belief in the offer transfers directly to the prospect. If you're not 100% bought in, they won't be either. Review these out loud before you dial."},
    {t:"list",label:"THE 4 CLOSER BELIEFS",items:["We are the best in the world at what we do.","People truly want and need what we offer.","I am doing them a favor by providing a solution to their problem.","If they say \"No\" — it's their loss."]},
    {t:"coach",c:"You are a doctor, not a salesperson. A doctor diagnoses before prescribing. Never answer 'how much?' or 'what's included?' before you've completed discovery. If they ask early: \"Everything we do is customized to your situation — so honestly, I'm not even sure we can help until I understand where you're at. Let me ask you a few more questions.\""},
    {t:"beliefs",label:"THE 7 BELIEFS — PRE-CALL CHECKLIST",coach:"Every objection you receive traces back to one of these 7 beliefs not being fully built in discovery. Your job during discovery is to build all 7 BEFORE the pitch — so the prospect essentially closes themselves. Use this as a mental checklist. If you hit an objection, look here first.",rows:[
      {n:1,name:"Pain (The Gap)",desc:"They believe there is a severe gap between where they are and where they want to be"},
      {n:2,name:"Doubt",desc:"They believe they cannot fix this alone — DIY wastes time, money, and energy"},
      {n:3,name:"Cost",desc:"They believe inaction is MORE expensive than the investment"},
      {n:4,name:"Desire",desc:"They are emotionally connected to the payoff of making this work"},
      {n:5,name:"Money",desc:"They have resources and are willing to invest"},
      {n:6,name:"Support",desc:"Spouse or stakeholders will support the decision"},
      {n:7,name:"Trust (Methodology)",desc:"They believe IFCA's specific method is the only logical path forward"}
    ]}
  ]},
  {id:1,name:"Open",sub:"≤ 2 MIN",color:"#0d9488",blocks:[
    {t:"coach",c:"Keep this tight. Your only goal is to establish you're a normal human, then transition immediately to frame setting. Never go past 2 minutes. Lingering here feels comfortable but kills your authority."},
    {t:"say",c:`"Hey [Name] — nice to meet you! Whereabouts are you located?"\n[prospect responds]\n\n"Have you ever met Jordan and Erin before, or did someone refer you over?"\n[prospect responds]`}
  ]},
  {id:2,name:"Frame Setting",sub:"",color:"#7c3aed",blocks:[
    {t:"coach",c:"This is the most important 30 seconds of the call. The line 'I'll tell you if we CAN'T help you' drops the guard and repositions you from salesperson to trusted advisor. Do NOT rush. Wait for a genuine yes before continuing."},
    {t:"say",c:`"Awesome. Well, I read your application and got a 30,000-foot view of where you're at and where you're looking to go."\n\n"Just so you know how these calls typically work — I'm going to ask you some questions about what's working, what's not, and what your goals are. And if I feel like we can be the best ones to help you, I'll definitely let you know."\n\n"But if I feel like at any point we can't help you, I'll do my best to point you in a different direction or connect you with someone who might be a better fit."\n\n"Does that sound fair?"\n[Wait for yes — then move forward]`}
  ]},
  {id:3,name:"Discovery",sub:"Goal Syntax — 7 Blocks",color:"#1d4ed8",blocks:[
    {t:"coach",c:"In Goal Syntax, the 'problem' is the ABSENCE of a business — not a broken piece of an existing one. Discovery job: (1) understand their current reality, (2) surface their dream, (3) expose the gap, (4) build fear/doubt about going it alone, (5) land the Knife Turn so the cost of NOT starting feels very real. Build all 7 Beliefs here. Don't rush. Depth of discovery = ease of close."},
    {t:"opening",c:`"Awesome — so a good place for us to start: what's the main thing that motivated you to book this call today?"\n[If vague:] "What do you mean by that?" / "Tell me more..." / "How long have you been thinking about this?"`},
    {t:"block",num:1,label:"SITUATION QUESTIONS",belief:"BELIEF #1: PAIN",bc:"#dc2626",coach:"Ground them in their current reality. 'Do you like it or love it?' is a trap question — most will hesitate or say 'like it,' which opens the emotional gap. Let them describe their day. The friction of their current situation should come out in their own words.",c:`"What are you currently doing for work right now?"\n[prospect responds]\n\n"How did you get into that?"\n[prospect responds]\n\n"How long have you been doing that?"\n[prospect responds]\n\n"Do you like it or love it?"\n[Listen carefully — the texture of their answer tells you how much pain they're in right now]`},
    {t:"block",num:2,label:"URGENCY / WHY NOW",belief:"BELIEF #4: DESIRE",bc:"#16a34a",coach:"Something triggered this call. Find it. This becomes your desire anchor — you'll reference it throughout. Go deeper than the surface answer. If they say 'burnt out' → 'What does that actually feel like day to day?' If they say 'money' → 'What would more money actually allow you to do?'",c:`"Has anything recently happened that's prompting you to start this online coaching business? Like, what's the trigger right now?"\n[prospect responds]\n\n"Tell me more about that..."\n[Dig deeper. Let them feel it.]`},
    {t:"block",num:3,label:"WHY NOT STAY?",belief:"BELIEF #2: DOUBT IN DIY",bc:"#7c3aed",coach:"Forces them to articulate why staying put isn't an option. Surfaces the future pain of inaction before you ever name it.",c:`"Can I ask — why not just stay where you are? Like, what's the thing that makes that not an option for you?"\n[Let them answer fully. Don't interrupt.]`},
    {t:"block",num:4,label:"PAINT THE PICTURE",belief:"BELIEF #4: DESIRE",bc:"#16a34a",coach:"Get them to build the vision in their OWN words. You'll use this exact language in the Hamburger Transition. Take mental notes — or literal ones. Their words are your script.",c:`"So if you could paint the picture — what does your life actually look like in 12 to 18 months when this business is running? What specifically are you going after?"\n[prospect responds]\n\n"And beyond the income — what does that actually change for you personally? Like, what does your day look like?"\n[Get the emotional picture: family time, freedom, no alarm clock, leave the job]`},
    {t:"block",num:5,label:"FINANCIAL QUALIFIER",belief:"BELIEF #5: MONEY",bc:"#d97706",coach:"Anchor their goal to a real number AND go deeper on why that number matters. 'Why that number?' is the most underused question in this block — it's where you find the real emotional driver. The goal number becomes the math you use in the pitch ('you'd only need X clients'). Enter these numbers silently into the Goal Syntax Calculator as they answer — don't announce it.",c:`"Got it. And just so I understand the full picture — what would you need to make from the online business to feel like this was actually worth it? What's the monthly number that would make you go 'okay, this is real'?"\n[prospect responds]\n\n"Why that number — like what specifically does hitting that change for you?"\n[Let them go deeper. This is your desire anchor — you'll use their exact words in the Hamburger Transition.]\n\n"And right now, what's your monthly take-home today, roughly?"\n[prospect responds]`},
    {t:"calc",tab:"Goal Syntax Calculator \u00b7 Inputs Panel",quickAction:"Fill inputs as they answer Block 5. Defaults: $500/$375 offer, 50% resign, 40% PIF, 4/mo sign rate. Don't share screen yet.",action:"Silently fill in the inputs panel as they answer Block 5: <strong>Current Income</strong>, <strong>Monthly Goal</strong>, <strong>Months Stuck</strong>. Then fold in offer assumptions \u2014 default to the IFCA beginner offer: <strong>FE Rate $500/mo, FE Length 6 mo, BE Rate $375/mo, BE Length 12 mo, Resign 50%, PIF 40%, Sign Rate 4/mo</strong>. That builds a $3K FE / $4.5K BE offer with $5,250 LTV per client. All four views auto-calculate \u2014 ready to share post-Knife-Turn.",note:"Defaults work for almost all Goal Syntax prospects (true beginners). Only override FE Rate / FE Length if they\u2019re already pricing higher. Sign Rate 4/mo is the standard plan for a $10K goal \u2014 lower it to 2 or 3 if the prospect signals limited bandwidth. Do NOT click Share View yet \u2014 you're staying private until post-Knife-Turn."},
    {t:"block",num:6,label:"SURFACE FEAR & DOUBT",belief:"BELIEF #2: DOUBT",bc:"#7c3aed",coach:"Two jobs here: (1) surface their fear about doing this alone, and (2) probe why they haven't sought help before. The second question is the one most closers skip — but it's what cements Belief #2.",c:`"Have you made any attempts to get this started on your own before? What happened?"\n[prospect responds]\n\n"What's your biggest concern about actually making this work?"\n[Let them voice the fear — failure, not knowing how, wasting money, what people will think]\n\n"And have you looked into getting any help with this — a coach, a program, anything like that?"\n[prospect responds]\n\n[If no:] "What's held you back from that?"\n[Let them answer. Most will say cost, not knowing what to trust, or thinking they could figure it out. All three of those answers build Belief #2 for you.]`},
    {t:"block",num:7,label:"THE KNIFE TURN",belief:"BELIEF #3: COST OF INACTION",bc:"#9f1239",coach:"Most powerful question in Goal Syntax discovery. Do NOT rush it. Ask it. Then sit in complete silence. After they answer, run the amplification beat \u2014 don\u2019t move on with just 'yeah.' This is where Janie\u2019s pain-amplification gap shows up: hearing pain, reflecting it, and moving on. The follow-up question makes them feel the cost in their own voice. That feeling is what closes the call later.",c:`"I hate to even ask this... but if you're still doing [their job] in 2 years, and this business still hasn't gotten off the ground — what does that actually cost you? Like financially, but also personally."\n[Long pause. Let them answer. Let them feel it.]\n\n"And how does that hit you when you actually say it out loud?"\n[Pause again. Let them sit with their own words. Don't rescue them.]\n\n"Yeah... so that's exactly why we're talking."`},
    {t:"calc",tab:"Goal Syntax Calculator \u2192 View 1: Cost of Inaction \u00b7 \u26a0\ufe0f OPTIONAL",quickAction:"<strong>Default: skip.</strong> The Knife Turn lands harder verbally \u2014 let the moment breathe. Pull up View 1 ONLY if they deflected, minimized the cost, or gave a low/fuzzy number. If pulling up: highlight the 'Already Lost' card (months stuck \u00d7 the gap) \u2014 it's the heaviest hitter. Save the rest of the CoI math for View 4 at the Combined Reveal.",action:"<strong>Default: skip.</strong> Most prospects feel the cost more deeply when it stays verbal at this point in the call. The CoI math lands harder when it compounds with the rest of the picture in View 4 (Combined Reveal) \u2014 not here. <strong>Pull up View 1 only as a rescue move when:</strong> (a) they deflected the cost question, (b) their estimate was wildly off the real math (high or low) and you need to anchor it, or (c) they're a numbers-oriented buyer who won't connect emotionally without seeing the screen. <strong>If you do pull it up:</strong> click View 1 \u2192 Share View \u2192 focus the conversation on the <strong>'Already Lost'</strong> card (months stuck \u00d7 the gap). For Goal Syntax beginners this number lands hardest because it represents real lived time, not hypothetical future loss. Say: <em>\"That's just what's already gone. The harder question is what the next 12 months cost if nothing changes.\"</em> Then: <em>\"That's exactly why you booked this call.\"</em> Don't narrate the lost-every-month or next-12-months cards \u2014 those compound in View 4.",
      note:"Why View 1 went optional: pulling up cards during the most emotionally charged moment of the call flips prospects out of <em>feeling</em> and into <em>evaluating</em>. The Knife Turn is amplification, not confirmation. Trust the verbal moment. The math lands harder in View 4 when it confirms what they've already accepted internally. <strong>Default to verbal only.</strong> Pull up the screen only when the verbal moment didn't land or you need to anchor a fuzzy answer."},
    {t:"support",c:`"Quick question before we talk about what's possible — is this a decision you'd be able to make on your own, or would your partner be involved in something like this?"\n[prospect responds]`}
  ]},
  {id:4,name:"Pre-Pitch Coaching",sub:"The Two Keys + Offer Repositioning + Math Moment",color:"#b45309",blocks:[
    {t:"coach",c:"This is the high-leverage moment before the pitch. Two jobs: (1) install the Two Keys frame \u2014 a desirable offer + a system to get clients \u2014 and (2) make their goal feel achievable BEFORE the pitch starts via the Clients Needed math. Most Goal Syntax prospects have NO offer yet, or a vague one. Some have a small/cheap offer (one-off training, low-ticket monthly, fitness app). This block handles both branches \u2014 and pre-frames the repositioning conversation before the pitch lands."},
    {t:"sec",label:"OPEN \u2014 PERMISSION + THE TWO KEYS",
      c:`"Alright \u2014 we've covered a lot. Before we get into what's possible, let me give you some quick coaching on what it actually takes to hit [their goal] in an online coaching business. Cool?"\n[Wait for yes]\n\n"It's actually simpler than most people make it. You really only need two things \u2014 a desirable, scalable offer, and a way to consistently get clients for that offer. That's it. Those two things are why coaches either make it or don't."\n\n"Make sense?"\n[Wait for yes]`},
    {t:"sec",label:"OFFER DIAGNOSIS \u2014 WHO / WHAT / HOW",
      c:`"In terms of the offer side \u2014 do you have an idea of what that looks like yet? What I mean is:"\n\n\u2192 WHO is it for?\n\u2192 WHAT specific problem are you solving?\n\u2192 HOW do you deliver it \u2014 in a way that's scalable and doesn't just mean more hours for you?\n[Prospect responds]`},
    {t:"coach",c:"<strong>If they start rambling about deliverables</strong> (workout splits, meal plans, check-in cadence, app setup):<br><br>Cut it off cleanly. Say: <em>\"Got it \u2014 so I understand what you'd deliver. Let me zoom you out for a second though. Who specifically is it for? What outcome do they want more than anything? And why would they pick you over the thousand other online coaches?\"</em><br><br>That's the positioning piece \u2014 deliverables are HOW you serve the offer, positioning is WHY anyone buys it. Get them to re-answer at the positioning level, not the deliverables level. <strong>For Goal Syntax beginners this is the most common gap</strong> \u2014 they think the offer IS the deliverables. The pitch (Pillar 1) lands much harder when this gap is visible to them before you ever start."},
    {t:"sec",label:"BRANCH A \u2014 IF THEY HAVE NO OFFER YET",
      c:`"Perfect \u2014 we'll build that from scratch in your first 48 hours with your Success Coach. Most of our clients in your position start at $500 a month for a 6-month package \u2014 so $3,000 total. We then increase pricing from there as proof of results stacks up."\n\n"At that price, to hit your goal of [their monthly number], you'd only need [X] clients. Want to see what that math looks like?"\n[Wait for yes \u2014 then pull up View 2]`},
    {t:"sec",label:"BRANCH B \u2014 IF THEY HAVE AN OFFER (LOW-TICKET, VAGUE, OR SIDE-HUSTLE)",
      c:`"Got it. How is it priced right now?"\n[Prospect responds]\n\n"Cool \u2014 would you be open to potentially restructuring how it's priced and positioned if it could get you to [their goal] faster?"\n[Wait for yes \u2014 most will say yes]\n\n"Most of our clients in your position start out at $500 a month for a 6-month package \u2014 so $3,000 total \u2014 and we increase pricing from there as proof of results stacks. At that price, to hit your monthly goal of [number], you'd only need [X] clients."\n[Pull up View 2]`},
    {t:"coach",c:"<strong>If their current offer is significantly under $300/mo</strong> (e.g., $49/mo monthly programs, fitness app at $79, $199 challenge):<br><br>Say: <em>\"Most coaches under $300/month end up competing with $99 fitness apps \u2014 and they burn out trying to manage 30-plus clients at that price just to make $10K. We position you at $500/month so you serve fewer clients at a higher level, which is how the math actually works to your goal. Does that make sense as a starting point?\"</em><br><br><strong>If their current offer is at or above $500/mo:</strong> don't downgrade them. Acknowledge and build: <em>\"Even better \u2014 you're already pricing at a premium tier. We'll just sharpen the positioning so you can scale the volume at that price.\"</em><br><br><strong>If they have no offer at all:</strong> skip the pricing pushback \u2014 they have no anchor to defend. Go straight to <em>\"$500/mo for a 6-month package is where almost all our beginners start.\"</em>"},
    {t:"calc",tab:"Goal Syntax Calculator \u2192 View 2: Clients Needed",quickAction:"Click <strong>View 2: Clients Needed</strong> \u2192 <em>\"At $3K/package, here's how many clients you need to hit your goal.\"</em> \u2192 Silence \u2192 <em>\"Tell me what you think.\"</em>",action:"Click <strong>View 2: Clients Needed</strong>. Already in Share View. Say: <em>\"At $3,000 per package, here's exactly how many active clients you need to hit your goal.\"</em> Let the active-clients number sit on screen. The caption below shows <strong>Total New Client Revenue</strong> over their first 6 months \u2014 ~$77K at default offer. Reference it lightly: <em>\"And the way our offer compounds with backend resigns, that's around $77K in new client revenue contracted over your first 6 months.\"</em> Then ask: <em>\"Tell me what you think when you look at that number.\"</em> Stay silent. <strong>The goal is for them to say it themselves:</strong> <em>\"that's actually doable.\"</em> If they don't \u2014 the offer or price is still wrong. Go back to repositioning before continuing. Builds Belief #4 (Achievability) + Belief #5 (Money).",
      note:"If their goal was set low, challenge it: 'To hit $15K instead of $10K, you only need [X+1] more clients. Want to use $15K as the real target?' Update the goal field live in the input panel. Let them watch the number barely move. <strong>If the prospect says the client count feels intimidating</strong> (e.g., 'I don't know about 18 clients'): drop to the half-replace milestone instead \u2014 <em>'Forget hitting your full goal for a second. Just to make a meaningful $5K/month online, you'd only need [X/2] clients. Does that feel more doable as a starting point?'</em> Get them past the first achievability hurdle before the pitch begins. The LTV caption underneath (FE + BE \u00d7 resign) is your tee-up for Pillar 4 \u2014 don't explain it here, just leave it visible."},
    {t:"sec",label:"BRIDGE TO PITCH \u2014 SURFACE THE SECOND KEY",
      c:`"Right? Now \u2014 the second key is the system to actually GET those clients consistently."\n\n"Do you currently have a way to bring in new clients online consistently? Or is that something you'd need help with?"\n[Prospect: I need help / I don't have one]\n\n"Yeah \u2014 that's honestly where most coaches get stuck. And here's the thing: you don't actually need an audience or a pile of cash to start. You already have something more powerful than both of those \u2014 a network of people who know you, trust you, and have been waiting for you to offer them something. That's where we start. Does that make sense?"\n[Prospect responds]\n\n"Good \u2014 that's exactly what step two is. Let me walk you through the four things we build for you."\n[Transition to Hamburger \u2192 Pitch]`}
  ]},
  {id:5,name:"Hamburger Transition",sub:"",color:"#15803d",blocks:[
    {t:"coach",c:"The bridge from coaching moment to pitch. Use their EXACT words from discovery — not paraphrases. If they said 'I feel trapped,' say 'trapped.' If they said 'I just want to be there when my kids get home,' say that back verbatim. Three parts: (1) recap their pain in their words, (2) position IFCA's process as the precise answer, (3) invite them to walk through it. They will always say yes."},
    {t:"say",c:`"Well, [Name], based on everything you've shared with me — I think what I have going on here could be a really good fit for you..."\n\n"...because you know how earlier you mentioned [recap their #1 pain/desire in their EXACT words]..."\n[prospect: yeah, exactly]\n\n"Our area of expertise at IFCA is a proven, four-step process to help you build your online fitness coaching business from the ground up — to $5K, $10K, even $15K months — in about six months."\n\n"This way, instead of spending months — or years — trying to piece this together through trial and error, we just help you build it right from day one. Make sense?"\n[prospect: yes]\n\n"Cool — so where do you want to go from here? I can walk you through exactly how we make that happen from A to Z if you'd like. But you tell me."\n[They will say: walk me through it]\n\n"Perfect. Do you have a pen and paper? Great — write down 1 through 4 with some space between each. I'm going to walk you through the four things we build for you."`}
  ]},
  {id:6,name:"The Pitch",sub:"4 Client Engine Pillars",color:"#4338ca",blocks:[
    {t:"pitch-sop",c:"In Goal Syntax, the prospect has no existing constraint to diagnose \u2014 the problem IS the absence of a business. Lead with Full on P1 (Offer) and P2 (Lead Engine) because these are always the most foreign and most feared. P3 (Business Manager) and P4 (Conversion) usually run Quick. <strong>Default to Quick on every pillar except the one that maps to their #1 stated fear.</strong> Use the optional Discovery Hook in Full mode to mirror their exact words from discovery."},
    {t:"sec",label:"HIGH LEVEL PROMISE",c:`"Before I walk you through the four things \u2014 let me just preface this."\n\n"The moment you enroll, the first thing we do is pair you with a 1-on-1 Success Coach who has already built a six or seven-figure fitness coaching business themselves. They are your guide through everything. Every piece of what I'm about to walk you through gets shaped and personalized by them, starting from day one."\n\n"So this might look slightly different once we map out your specific situation \u2014 but based on everything you've shared, here's what I think it looks like for you..."`},
    {t:"pillar",num:1,label:"AI OFFER OPTIMIZATION",
      sop_hint:"Lead with Full here \u2014 most Goal Syntax prospects have never thought about positioning or premium pricing. This is the belief-breaking moment. Use the Discovery Hook in Full mode if they used specific language about pricing confusion or feeling generic. Quick only if they already have a niche they're confident in.",
      hook:[
        "\"Remember earlier when you said you don't really know what you'd charge or how to describe what you do?\"",
        "\"You mentioned you'd just be 'an online coach' \u2014 that's exactly the trap step one solves.\"",
        "\"Earlier you said you've been spinning on niche and pricing for [X] months \u2014 this is how we end that.\""
      ],
      when:"They flagged \"don't know what to charge,\" \"don't know what kind of coach I'd be,\" \"would just blend in,\" or have been stuck on niche/pricing for months. Run Quick only if their offer is fully defined.",
      quick:`"Number one \u2014 AI Offer Optimization. {{r}}Most new coaches go online as 'an online fitness coach' or 'I help people lose weight' \u2014 same as thousands of others charging $99 a month through fitness apps. They become a commodity, attract no one (or worse, attract price-shoppers), and quit within a year. The ones who try to figure out their niche, pricing, and positioning alone burn 6 to 12 months in trial-and-error \u2014 most never land it.{{/r}} {{g}}In your first 48 hours, your Success Coach uses our AI Offer Optimizer to dial in your dream client, your premium positioning, and your offer at $3,000 to $5,000 a package. You go to market right the first time \u2014 not after months of guessing.{{/g}} {{tie}}When you have that clarity from day one \u2014 does the 'I don't know what to charge or who to target' fear go away?{{/tie}}"`,
      full:`"Number one \u2014 and this is where we start on day one \u2014 is AI Offer Optimization."\n\n"Here's what most new coaches do when they decide to go online: they start posting content, sending DMs, maybe try to run some ads \u2014 before they've even confirmed that their offer actually lands with the market they're going after. And the problem with that is: it doesn't matter how hard you market if the offer doesn't convert. You're just burning energy and wondering why nothing's working."\n\n"Now compare that to the alternatives if you try to figure this out alone. Option one: spend 6 to 12 months Googling 'fitness niches' and never landing on anything. Option two: copy whatever guru you're following and end up sounding like everyone else. Option three: price yourself low because you assume 'online has to be cheaper than in-person' \u2014 now you're working harder for less and competing with $99-a-month apps. We see new coaches spend a year on this and never get it right. Most quit before they ever sign their first client."\n\n"What we do instead: your Success Coach sits with you 1-on-1 inside the first 48 hours using our AI Offer Optimizer. We figure out exactly who your dream client is, what specific result they actually want, and we craft your offer in language so precise that when the right person finds you, they think: <em>'that's exactly what I need, and I need it from this person.'</em> $3,000 to $5,000 a package. Premium positioning. Day two of the program."\n\n"Think about the difference: '$99 a month for online fitness coaching' versus '$3,000 for a 6-month transformation system that gets [specific person] [specific result].' Same expertise. Completely different category."\n\n{{tie}}"When your offer takes you out of the '$99-a-month commodity' bucket completely \u2014 does that change what kind of clients you'd attract and what you'd charge from day one?"{{/tie}}\n[Wait for response before moving to Pillar 2]`},
    {t:"pillar",num:2,label:"LEAD GENERATION ENGINE",
      sop_hint:"Almost always runs Full in Goal Syntax \u2014 the three-stage sequence is the core hook and resolves the biggest fear (\"I have no audience\"). Use the Discovery Hook in Full mode if they used emotional language about cold messaging or starting from zero. Quick only if running long.",
      hook:[
        "\"Remember when you said you have no following and have no idea where clients would even come from?\"",
        "\"You mentioned you'd feel weird messaging people \u2014 this is the structural alternative.\"",
        "\"Earlier you said the audience-building thing is what's been blocking you \u2014 this is exactly that fear, solved.\""
      ],
      when:"This is the universal Goal Syntax belief break. Run Full unless they have an existing audience and lead-flow isn't their stated fear.",
      quick:`"Number two \u2014 the Lead Generation Engine. {{r}}Most new coaches end up in one of three traps. They burn 6 to 12 months trying to grow Instagram from zero and never sign a single client because they have no warm audience. They burn $5K to $20K trying to figure out paid ads alone and quit. Or they hire an agency \u2014 and most coaches we talk to spent $5K-$10K with an agency and got zero clients, because agencies don't understand coaching offers and run cold ads to a market that doesn't trust you yet.{{/r}} {{g}}Three stages, in order. Stage one: Affinity Launch \u2014 structured warm outreach to people already in your network. Out of every 100 contacts, 3 to 7 typically become $3K paying clients. That's $9K to $21K from people in your phone before a dollar in ads. Stage two: AI content runs in parallel. Stage three: paid ads only after your offer's proven \u2014 and we cover your first month of ad spend.{{/g}} {{tie}}Knowing your first 3 to 7 clients come from people who already trust you \u2014 does the 'I have no audience' fear feel solvable now?{{/tie}}"`,
      full:`"Number two \u2014 the Lead Generation Engine. And I want to walk you through this carefully, because this is the one where most new coaches either go broke trying to figure it out alone, or give up right before it would have worked."\n\n"There are three stages \u2014 and the order is everything."\n\n"Stage one: The Affinity Launch. Before we run a single ad, before you post a single piece of content, we run a structured warm outreach campaign to the people who already know and trust you. NOT cold messaging \u2014 I want to be clear on that. A specific conversation framework that feels completely natural. You're reconnecting, asking good questions, and when the moment is right, mentioning what you've built. Out of every 100 people, typically 3 to 7 become $3,000 paying clients. That's $9,000 to $21,000 from contacts already sitting in your phone. Before a single dollar goes to ads. Those first clients prove your offer works, fund the next stage, and become the social proof that makes everything else work better."\n\n"Now \u2014 compare that to the three things most new coaches actually try. Option one: try to grow Instagram from zero. We see coaches post daily for 6 to 12 months, get to 800 followers, and never sign a client because there's no warm audience yet. Option two: figure out paid ads alone. Burn $5K to $20K guessing at messaging and audiences before knowing what works. Option three: hire an agency. They run cold ads to a market that doesn't trust you, your CPL climbs, and most coaches we talk to spent $5K to $10K with an agency and got zero clients. None of those work because they all skip the trust step."\n\n"Stage two: AI Content System. While the Affinity Launch is running, we install Lexi \u2014 your AI content assistant. She plugs in your exact offer, analyzes what's already working in your market, and gives you ready-to-execute content creatives. You're not staring at a blank screen. You're not guessing what to post. Now one of two things happens \u2014 either your content starts converting on its own and inbound leads come in without ad spend, or it's warming your audience while the Affinity Launch is closing clients. You can't lose."\n\n"Stage three: Paid Amplification. Once your offer is proven \u2014 you have clients, you have results, you have content that converts \u2014 that's when we layer in ads. Not before. Because the number one mistake new coaches make is spending money on ads before they know what works. By the time we turn ads on, we know exactly what message lands. And we even cover your first month of ad spend."\n\n"Network first. Content to test what converts. Ads to scale what's proven. That's the sequence \u2014 and that's exactly why this works when going at it alone fails."\n\n{{tie}}"When you compare this to growing Instagram from zero or burning ad spend trying to figure it out alone \u2014 does the 'I have no audience' fear get fully resolved by this approach?"{{/tie}}\n[Wait for response]`},
    {t:"calc",tab:"Goal Syntax Calculator \u2192 View 3: 6-Month Path",quickAction:"Click <strong>View 3: 6-Month Path</strong> \u2192 Confirm sign rate (default 4/mo) \u2192 <em>\u201c$80K contracted, $50K cash, $30K still in pipeline.\u201d</em> \u2192 <em>\u201cDoes that make the next 12 months feel different than the last?\u201d</em>",action:"Click <strong>View 3: 6-Month Path</strong>. Already in Share View. Confirm Sign Rate Plan in inputs (default 4/mo \u2014 adjust to 2 or 3 if they signal limited bandwidth, or up if they\u2019re ambitious). Three big cards appear: <strong>Total New Client Revenue</strong> (hero, green) \u2014 full FE + BE-resign value over 6 months; <strong>Collected as Cash by Month 6</strong> \u2014 what they actually deposit; <strong>Still in Pipeline</strong> \u2014 paying in after month 6. Say: <em>\"At 4 new clients per month over your first 6 months, here's what you\u2019ve actually built \u2014 $80K in new client revenue contracted, $50K of that already in the bank by month 6, $30K still paying in over the months after.\"</em> Pause 5 seconds. Then tie down: <em>\"When you see that \u2014 is that the kind of business that makes the next 12 months feel different than the last?\"</em> Builds Belief #4 (Desire) + Belief #7 (Trust the methodology).",note:"<strong>Optional reverse-funnel reveal (solution-aware prospects only):</strong> If they\u2019ve run ads before or ask 'but how many leads though?' \u2014 click the small <em>\u25B6 Show the lead engine math</em> chip below the cards. Four cells appear: ~8 live calls, ~10 booked calls, ~194 leads, ~$388 ad spend per month at IFCA benchmarks (55% close, 75% show, 5% L\u2192B, $2/lead). Skip entirely for true beginners \u2014 the ad spend number scares them. The cash card ($50K) is what closes Goal Syntax beginners. Most expect 'online business' to be slow money. The pipeline card protects you against later doubt: <em>'Even if month 7 goes sideways, you still have $30K paying in.'</em>"},
    {t:"pillar",num:3,label:"IMPACT AI BUSINESS MANAGER",
      sop_hint:"Usually Quick unless they expressed tech anxiety or said \"I'm not techy.\" Use the Discovery Hook in Full mode if they used specific language about juggling tools or being overwhelmed by systems.",
      hook:[
        "\"Remember when you said you have no idea how to set up the tech side of an online business?\"",
        "\"You mentioned you're worried leads would just slip through the cracks \u2014 this is the fix.\"",
        "\"Earlier you said the operational side scares you more than the marketing \u2014 this is exactly that.\""
      ],
      when:"They expressed tech anxiety, \"I'm not techy,\" or didn't structurally understand how an online coaching business runs operationally. Run Quick otherwise.",
      quick:`"Number three \u2014 Impact AI Business Manager. {{r}}Most new coaches end up duct-taping 5 to 7 different apps together \u2014 CRM, payments, scheduling, follow-up \u2014 each one $30 to $100 a month, none of them talking to each other. They spend the first 30 to 60 days fighting tech instead of getting clients. Worse: a lead comes in Monday, follow-up slips, by Wednesday they've gone cold. That's not a hustle problem \u2014 it's a system problem.{{/r}} {{g}}One AI-powered platform replaces all of it. Your CRM, scheduling, payments, follow-up, automated text and email sequences \u2014 all integrated and talking to each other. $1 a month while you're enrolled. We set it up for you in your first 7 days. You launch with a real, professional business, not a duct-taped one.{{/g}} {{tie}}When a lead can't slip through the cracks because follow-up is automated \u2014 does that change how confident you'd feel about actually running this thing?{{/tie}}"`,
      full:`"Number three \u2014 Impact AI Business Manager. And I want to spend a second on this because most new coaches don't realize how much of their first year is killed by tech."\n\n"Best way I can describe it: think of it like MyFitnessPal \u2014 but for your business. MyFitnessPal puts everything about your health in one place. Impact AI Business Manager does the same for your coaching business. Lead tracking, payments, scheduling, client management, DM automations, email follow-up \u2014 all in one place, all talking to each other."\n\n"Now \u2014 compare that to what most new coaches actually do. They Google 'what tools do I need for online coaching' and end up duct-taping 5 to 7 different apps together. Calendly here, Stripe there, Google Docs and spreadsheets in between, MailChimp on the side, separate tool for DMs. Each one $30 to $100 a month. Each one with its own learning curve. None of them talk to each other cleanly. So a lead comes in on Monday \u2014 and by Wednesday they've gone cold because the follow-up slipped between apps. We see new coaches spend 30 to 60 days fighting their tech stack instead of getting clients. Some never recover \u2014 the operational mess gets so bad they quit before signing a single client."\n\n"Impact AI Business Manager replaces all of it. One platform \u2014 program delivery, CRM, scheduling, payments, follow-up, automated text and email sequences when someone applies \u2014 all integrated. $1 a month while you're with us. Most coaches save $300 to $1,000 a month from day one in tool costs alone. We set it up for you. You launch with a real, professional system from day one \u2014 1-on-1 tech onboarding call within your first 7 days."\n\n"A lead comes in from your content \u2014 they're automatically logged, they get a text, an email, a DM. All without you lifting a finger. Nothing falls through the cracks."\n\n{{tie}}"When you picture starting with one clean system instead of fighting six apps for two months \u2014 does that feel like setting the business up to actually work?"{{/tie}}\n[Wait for response]`},
    {t:"pillar",num:4,label:"CONVERSION + RETENTION",
      sop_hint:"Quick unless they expressed sales anxiety. Use the Discovery Hook in Full mode if they said specific things about hating sales or being worried about closing. Always land the 17-month LTV math \u2014 it reframes the entire business model from launch-cycle to compounding.",
      hook:[
        "\"Remember when you said you've never done a sales call before and the idea of selling makes you nervous?\"",
        "\"You mentioned you don't want to be pushy or salesy \u2014 this is exactly the training that solves that.\"",
        "\"Earlier you said you're worried about how you'd actually keep clients long-term \u2014 this is the second half.\""
      ],
      when:"They expressed sales anxiety, said \"I'm not good at selling,\" or asked how clients stay long-term. Run Quick otherwise.",
      quick:`"Number four \u2014 Conversion and Retention. {{r}}Industry close rate is 10 to 20% \u2014 meaning new coaches need 3x the leads just to hit goal. Industry retention is 9 months \u2014 meaning you're constantly running just to stand still, acquiring just to replace what's leaving. That's why most new coaches plateau at $5K-$8K and never break through.{{/r}} {{g}}Two parts. Proven scripts plus unlimited 1-on-1 call reviews \u2014 our students close 30 to 50%. Two to three times the income off the same call volume. Then our LTV Retention System keeps clients an average of 17+ months. 10 clients at $3K \u00d7 17 months = $8K+ lifetime value each. That's a compounding business, not a constant launch cycle.{{/g}} {{tie}}When you picture closing half your calls AND clients staying twice as long as average \u2014 does that change the size of the business you can actually build?{{/tie}}"`,
      full:`"And number four \u2014 the Conversion and Retention System. And this last piece is the difference between an online business that compounds and one that always feels like it's about to fall apart."\n\n"Two parts."\n\n"Part one: closing your calls. The average coach starting out closes 10 to 20% of their discovery calls. Our coaches close 30 to 50%. The difference is a proven sales process \u2014 and the reps to make it feel completely natural. You get our DM and sales call scripts built specifically for fitness coaches. And then we do unlimited 1-on-1 call reviews \u2014 our coaches listen to your actual recorded calls and tell you exactly what to say, where you're losing people, and how to handle objections without ever feeling pushy."\n\n"Now compare that to going at this alone. Most new coaches wing every call, freeze when objections come up, and assume 'people just aren't ready' \u2014 instead of seeing they're losing winnable calls every single week. They get on 10 calls and close 1. They blame the leads. The leads were fine. The conversation wasn't."\n\n"Part two: keeping your clients long-term. Most new coaches are so focused on getting clients that they never think about what happens after they sign. That's actually the biggest mistake \u2014 because the real income stability comes from retention. The industry average is 9 months. So you spend month 1\u20133 onboarding, month 4\u20136 they get results, month 7\u20139 they leave. You're starting over every quarter. That's not a business \u2014 that's a treadmill."\n\n"Our LTV Retention System helps you design a back-end offer so clients don't just finish their 6-month program and leave \u2014 they resign into the next phase. Our students keep clients for an average of 17+ months. Think about what that means: 10 clients at $3K per package, with 17-month average retention, each client is worth over $8K in lifetime value. That's building a real business, not just running a launch."\n\n{{tie}}"When you compare 10\u201320% close rate and 9-month retention \u2014 what most new coaches get going at it alone \u2014 to 30\u201350% close rate and 17-month retention with a coached system: does that change the size of the business you can actually build?"{{/tie}}\n[Wait for response]`},
    {t:"sec",label:"DELIVERY + RECAP",c:`"One quick thing — do you currently have an app where you can deliver your coaching programs, track your clients' progress, and communicate with them all in one place?"\n[If no:] "Perfect — we'll get you set up on Trainerize. It's pre-built for fitness coaches, we have a partnership so you get it at a significant discount, and we onboard you onto it alongside your Success Coach."\n[If yes:] "Great — we can work with what you've got."\n\n"So to recap: your offer built and positioned so every piece of marketing actually lands. A content system that finds organic winners fast — then campaigns that amplify what's already working. One platform that replaces all your tools and catches every lead automatically. Plus Trainerized so you can deliver programs professionally. And a sales and retention system that closes 30 to 50% and keeps clients 17-plus months."\n\n"Everything is completely customized to your situation. Once you enroll, we'll schedule your onboarding call with your Success Coach. We map out your entire 6-month game plan — what we do for you, what we need from you, how often we meet, and what happens in what order. Zero guesswork."\n\n"Does that sound good?"\n[Wait for yes — if they hesitate, surface the concern NOW before price]`}
  ]},
  {id:7,name:"Committing Phase",sub:"Price Drop",color:"#b91c1c",blocks:[
    {t:"sec",label:"TEMP CHECK \u00b7 ALWAYS",c:`"Before I share the investment — quick gut check on where you're at."\n\n"On a scale of 1 to 10 — where do you fall in terms of alignment with what we do?"\n[ALWAYS ask this. Do not skip even if they seem enthusiastic. This is the gate before price — running it prevents 80% of post-price objections.]\n\n[If 8+] "Good — let's get into next steps."\n[If less than 8:] "What would make it a 10 for you?"\n[Surface the hidden objection NOW — before the price.]`},
    {t:"calc",tab:"Goal Syntax Calculator \u2192 View 4: Combined Reveal",quickAction:"Click <strong>View 4: Combined Reveal</strong> \u2192 <em>\u201cLet me leave you with two numbers.\u201d</em> \u2192 5 sec silence \u2192 <em>\u201cWhat\u2019s worth more \u2014 that on the left, or that on the right?\u201d</em> \u2192 Drop price.",action:"Click <strong>View 4: Combined Reveal</strong>. Already in Share View. Say: <em>\"Let me leave you with two numbers.\"</em> Stay silent for 5 full seconds. Two cards on screen: <strong>Left (red)</strong> \u2014 cost of another 12 months staying where you are. <strong>Right (green)</strong> \u2014 Total New Client Revenue from your first 6 months, with Collected as Cash and Still in Pipeline stacked underneath. Then: <em>\"So the real question is \u2014 what\u2019s worth more: that on the left, or that on the right?\"</em> Then drop price. Builds urgency right before commitment.",note:"Do not narrate the numbers \u2014 they did the work earlier. The closer cue is silence + one bridge sentence + price. If they speak first \u2014 even just 'huh' \u2014 let them. Don\u2019t fill silence with explanation. The cash subcard reinforces that the green number isn\u2019t hypothetical revenue, it\u2019s mostly money in the bank."},
    {t:"rule",c:"After you drop the price — STOP. Complete silence. The first person to speak loses the momentum. Every single time, no exceptions. Do not fill the silence."},
    {t:"sec",label:"PRICE DROP",c:`"So basically next steps — you'll process the investment with me today, we'll get your onboarding call scheduled, and you'll have complete clarity on everything that happens over the next six months. Does that sound good?"\n[wait for yes]\n\n"And the investment is just [PRICE]."\n[STOP. Silence. Let them speak first.]`},
    {t:"sec",label:"STALL CLOSE",c:`[When they agree it makes sense but go quiet:]\n"Can I just welcome you to the family?"\n\n[If yes:] "Perfect. What's a good email to send the receipt to? And what card do you want to put down?"`}
  ]},
  {id:8,name:"Objection Handling",sub:"",color:"#374151",blocks:[
    {t:"rule",c:"Run the Master Sequence FIRST on every objection. Never book a follow-up for a fear-based objection — close it on the call. Complaints ≠ Objections. Don't handle complaints."},
    {t:"sec",label:"MASTER SEQUENCE — RUN FIRST ON EVERY OBJECTION",c:`"[Objection] aside — do you feel this is exactly what you need to achieve [their goal]?"\n"So you're 100% in on the process... it's just a matter of solving [objection], and then you're ready to move forward. Is that right?"\n[Now you're problem-solving together — not fighting]`},
    {t:"obj",label:"'I NEED TO THINK ABOUT IT' — Fear Objection",c:`1. Clarify: "What specifically is it that you'd like to think about?"\n2. Isolate: "Outside of [what they said] — is there anything else holding you back?"\n3. Reframe: "People who say 'think about it' are usually asking one of two things: 'Will this work for me?' or 'Can I afford this right now?' Which one is it for you?"\n4. Cost Flip: "The coaches who keep saying 'let me think about it' are the same ones still figuring this out 12 months from now. What does another year cost you?"`},
    {t:"obj",label:"MONEY — TRIPLE TIE-DOWN",c:`Step 1 — Isolate: "Investment aside — is there anything else that would keep you less than 100% certain that you'd want to work with us to help you get to [their goal]? Or is it just a cash flow thing?"\n\nStep 2 — Tie Down: "If you had $[PRICE] completely liquid to you right now... would you do it? Would you say you're 10/10 on the process specifically?"\n\nPermission Bridge: "Got it. The last thing we want is for finances to be the thing that holds you back from getting the help you need. I do have some flexibility here to create something custom for you to make it more digestible. I don't have an option A or option B or anything set in stone... so do you mind if I ask you a personal question?"\n\nOpen Wallet: "Just so I can see if I can help — what would you have available to you today in terms of cash on hand? Checking, savings, or even credit via credit cards?"\n[Probe 3 buckets: checking / savings / credit]\n\nStep 3 — Close: "I appreciate you being open and honest. If I was able to break this up and allow you in today — we'll still treat you like you paid in full. If I can make this more digestible based on what you have, would you be ready to get started today?"`},
    {t:"obj",label:"SPOUSE OBJECTION",c:`[Path A — Haven't talked yet:]\n"Are they generally supportive of you building something for yourself, or is that a conversation you need to have?"\n[If supportive:] "So it's more of a formality — you just want them in the loop. Is that fair? Let's make sure this makes sense for YOU first. What's holding you back personally?"\n\n[Path B — Spouse on call or already discussed:]\n"Where does [spouse's name] land? What's their main concern?"\n"And you — where do YOU land? If you could make this decision just for yourself, what would you do?"`},
    {t:"obj",label:"EGO OBJECTION — 'I Can Figure This Out Myself'",c:`"I love that mindset — seriously. And I'm sure you could figure parts of it out. How long have you been thinking about building this online? And how far along are you?"\n[Let them answer]\n\n"So what makes you think the next 6 months are going to be different from the last [X months]?"\n[Pause]\n\n"The issue isn't your ability. It's that you're solving a systems problem with hustle. The system is what's missing — not your work ethic."`}
  ]}
];

function fmt(t){if(!t)return '';return t.split('\n\n').map(p=>{const h=p.split('\n').map(l=>l.replace(/\[([^\]]+)\]/g,'<span class="cue">[$1]</span>')).join('<br>');return`<p>${h}</p>`;}).join('');}
function fmtDisc(t){if(!t)return '';return t.split('\n\n').map(p=>{const h=p.split('\n').map(l=>l.replace(/\[([^\]]+)\]/g,'<span class="disc-bracket">[$1]</span>')).join('<br>');return`<p>${h}</p>`;}).join('');}
function fmtPitch(t){if(!t)return '';return t.split('\n\n').map(p=>{const h=p.split('\n').map(l=>l.replace(/\{\{r\}\}/g,'<span class="contrast">').replace(/\{\{\/r\}\}/g,'</span>').replace(/\{\{g\}\}/g,'<span class="new-way">').replace(/\{\{\/g\}\}/g,'</span>').replace(/\{\{tie\}\}/g,'<span class="tie-line">').replace(/\{\{\/tie\}\}/g,'</span>').replace(/\[([^\]]+)\]/g,'<span class="cue">[$1]</span>')).join('<br>');return`<p>${h}</p>`;}).join('');}

let globalPM='quick';const pillarModes={};
function getPM(n){return pillarModes[n]||globalPM;}
function setGlobalPM(m){
  globalPM=m;
  ['quick','full'].forEach(x=>{const b=document.getElementById('ptgl-'+x);if(b)b.classList.toggle('active',x===m);});
  for(let i=1;i<=4;i++){if(!pillarModes[i])updatePD(i);}
}
function setPM(n,m){if(m===null){delete pillarModes[n];}else{pillarModes[n]=m;}updatePD(n);updatePOB(n);}
function updatePD(n){const m=getPM(n);const el=document.getElementById('pillar-p'+n);if(!el)return;el.querySelectorAll('.pm-block').forEach(b=>b.classList.remove('pm-visible'));const a=el.querySelector('.pm-'+m+'-block');if(a)a.classList.add('pm-visible');}
function updatePOB(n){const ov=pillarModes[n]||null;const el=document.getElementById('pillar-p'+n);if(!el)return;el.querySelectorAll('.pmo-btn[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===ov));}
function initPMs(){for(let i=1;i<=4;i++){updatePD(i);updatePOB(i);}}

function renderBlock(b){
  switch(b.t){
    case 'say': return`<div class="block-say"><div class="say-label">SAY THIS</div><div class="say-text">${fmt(b.c)}</div></div>`;
    case 'coach': return`<div class="block-coach coach-only"><div class="coach-head"><span class="coach-lbl">📝 Coaching Note</span></div><div class="coach-body">${b.c}</div></div>`;
    case 'pitch-sop': return`<div class="block-coach coach-only"><div class="coach-head"><span class="coach-lbl">📝 Pitch Mode Guide — Goal Syntax</span></div><div class="coach-body">${b.c}</div></div>`;
    case 'rule': return`<div class="block-rule"><div class="rule-lbl">⚠ RULE</div><div class="rule-body">${b.c}</div></div>`;
    case 'calc': return`<div class="block-calc"><div class="calc-head"><span class="calc-icon">📊</span><div class="calc-info"><div class="calc-tab">Open: ${b.tab}</div><div class="calc-action calc-action-quick">${b.quickAction||b.action}</div><div class="calc-action calc-action-full">${b.action}</div></div></div>${b.note?`<div class="calc-note">${b.note}</div>`:''}</div>`;
    case 'opening': return`<div class="block-opening"><div class="opening-head"><div class="opening-lbl">Opening Question</div></div><div class="opening-body"><div class="block-say" style="background:transparent;border:none;padding:0"><div class="say-text">${fmt(b.c)}</div></div></div></div>`;
    case 'block':{const cs=`background:${b.bc}18;color:${b.bc}`;return`<div class="block-disc"><div class="disc-head"><div class="disc-num" style="background:#1d4ed8">${b.num}</div><div class="disc-lbl">${b.label}</div><span class="belief-chip" style="${cs}">${b.belief}</span></div><div class="disc-body">${b.coach?`<div class="block-coach coach-only"><div class="coach-head"><span class="coach-lbl">📝 Coaching Note</span></div><div class="coach-body">${b.coach}</div></div>`:''}<div class="block-say" style="background:transparent;border:none;padding:0"><div class="say-text">${fmt(b.c)}</div></div></div></div>`;}
    case 'support': return`<div class="block-support"><div class="support-lbl">Support Check</div><div class="btext">${fmt(b.c)}</div></div>`;
    case 'sec': return`<div class="block-sec"><div class="sec-head"><div class="sec-lbl">${b.label}</div></div><div class="sec-body"><div class="block-say" style="background:transparent;border:none;padding:0"><div class="say-text">${fmt(b.c)}</div></div></div></div>`;
    case 'pillar': {const hookHtml=b.hook?`<div class="hook-box"><div class="hook-lbl">Optional Discovery Hook \u00b7 Pick one if it matches</div><div class="hook-intro">Mirror their exact words from discovery. Skip if none of these came up.</div><ul class="hook-list">${b.hook.map(h=>`<li>${h}</li>`).join('')}</ul></div>`:'';const whenHtml=b.when?`<div class="when-bar"><strong>Run Full If</strong><span>${b.when}</span></div>`:'';return`<div class="block-pillar" id="pillar-p${b.num}"><div class="pillar-head"><div class="pillar-num">${b.num}</div><div class="pillar-lbl">${b.label}</div><div class="pillar-mode-btns"><button class="pmo-btn" data-mode="quick" title="Quick" onclick="setPM(${b.num},'quick')">\u26a1</button><button class="pmo-btn" data-mode="full" title="Full" onclick="setPM(${b.num},'full')">\ud83d\udccb</button><button class="pmo-btn pmo-reset" title="Reset to global" onclick="setPM(${b.num},null)">\u21ba</button></div></div>${b.sop_hint?`<div class="pillar-sop-hint"><div class="coach-lbl">\ud83d\udcdd When to Use Each Mode</div><div class="coach-body">${b.sop_hint}</div></div>`:''}<div class="pm-block pm-quick-block"><div class="pm-tag pm-quick-tag">\u26a1 Quick</div><div class="pm-text">${fmtPitch(b.quick)}</div></div><div class="pm-block pm-full-block"><div class="pm-tag pm-full-tag">\ud83d\udccb Full</div>${hookHtml}<div class="pm-text">${fmtPitch(b.full)}</div></div>${whenHtml}</div>`;}
    case 'obj': return`<div class="block-obj"><div class="obj-head"><div class="obj-lbl">${b.label}</div></div><div class="obj-body"><div class="block-say" style="background:transparent;border:none;padding:0"><div class="say-text">${fmt(b.c)}</div></div></div></div>`;
    case 'list': return`<div class="block-list"><div class="list-title">${b.label}</div><ul class="closer-beliefs">${b.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
    case 'beliefs': return`<div class="block-beliefs"><div class="beliefs-label">${b.label}</div>${b.coach?`<div class="block-coach coach-only"><div class="coach-head"><span class="coach-lbl">📝 Coaching Note</span></div><div class="coach-body">${b.coach}</div></div>`:''}<table class="beliefs-table"><thead><tr><th>#</th><th>Belief</th><th>What It Means</th><th>✓</th></tr></thead><tbody>${b.rows.map(r=>`<tr><td class="b-num">${r.n}</td><td class="b-name">${r.name}</td><td class="b-desc">${r.desc}</td><td class="b-check" onclick="this.textContent=this.textContent==='☐'?'✅':'☐'">☐</td></tr>`).join('')}</tbody></table></div>`;
    default: return '';
  }
}

function pitchGuideHtml(){
  return`<div class="phase" id="phase-guide"><div class="phase-head" style="background:#7c3aed"><div class="phase-badge">\ud83d\udccb</div><div class="phase-info"><div class="phase-name">Pitch Guide</div><div class="phase-sub">Training Reference \u00b7 Full SOP Only \u00b7 Goal Syntax Framework</div></div></div><div class="phase-body">

  <div class="guide-callout">
    <div class="guide-callout-title">Why the Pitch Matters More Than Anything Else on the Call</div>
    <div class="guide-callout-body">
      <p>The pitch is where the close is actually won or lost. Everything before it \u2014 discovery, the Knife Turn, the Hamburger Transition \u2014 is set-up. Everything after \u2014 temp check, price drop, objection handling \u2014 is consequence. The pitch itself is the only phase where the prospect transitions from <em>"I have a problem"</em> to <em>"this is the specific solution."</em></p>
      <p>Most closers think the pitch is where you explain the program. <strong>That's wrong.</strong> The pitch is where you build <strong>Belief #7 \u2014 Trust the Methodology</strong> in real time, while simultaneously confirming that everything they told you in discovery is being addressed by something specific.</p>
      <p>If they don't believe IFCA's method is the precise answer to their specific problem by the time you finish the pitch, <strong>you'll get an objection at price drop. Every time.</strong></p>
      <p>A great pitch makes price feel like a logical next step. A bad pitch makes price feel like a surprise. <strong>Same offer. Same price. Different outcome \u2014 entirely because of how the four pillars were delivered.</strong></p>
    </div>
  </div>

  <div class="guide-section">
    <div class="guide-section-title">The Three Dialogue Principles \u2014 Apply to Every Pillar</div>

    <div class="guide-principle">
      <div class="guide-principle-num">1</div>
      <div class="guide-principle-body">
        <div class="guide-principle-title">Start from what they said \u2014 or ask a question</div>
        <div class="guide-principle-desc">
          <p>Never just launch into <em>"Number one is offer optimization."</em> Every pillar opens with either (a) a mirror of their exact language from discovery (the amber <strong>Discovery Hook</strong>), or (b) a question that surfaces the gap in real time.</p>
          <p>When a prospect hears their own words come back at them, they automatically feel understood. When they answer a question, they're now <strong>participating</strong> in the diagnosis instead of receiving it. Both build buy-in before the solution is introduced.</p>
        </div>
      </div>
    </div>

    <div class="guide-principle">
      <div class="guide-principle-num">2</div>
      <div class="guide-principle-body">
        <div class="guide-principle-title">Compare and contrast \u2014 cost of DIY vs. our way</div>
        <div class="guide-principle-desc">
          <p>The human brain only understands things through comparison. Every pillar should compare what most coaches try (or what they've tried before) against what we do \u2014 and explain <strong>why theirs failed</strong> and <strong>why ours works</strong>.</p>
          <p>Without contrast: <em>"we build your offer in 48 hours"</em> = a feature. With contrast: <em>"most coaches spend 6\u201312 months on this through trial and error \u2014 you get it done in 48 hours"</em> = a meaningful advantage. <strong>Same fact. Different weight.</strong></p>
        </div>
      </div>
    </div>

    <div class="guide-principle">
      <div class="guide-principle-num">3</div>
      <div class="guide-principle-body">
        <div class="guide-principle-title">Tie down with a belief-specific question</div>
        <div class="guide-principle-desc">
          <p>Every pillar ends with a question that requires a real answer. <strong>Not</strong> <em>"Make sense?"</em> \u2014 anyone mumbles yes without being bought in. Belief-specific tie-downs lock in the exact thing that pillar is supposed to build:</p>
          <p>P1 \u2192 <em>"Does the 'I don't know what to charge or who to target' fear go away?"</em><br>P2 \u2192 <em>"Does the 'I have no audience' fear feel solvable now?"</em><br>P3 \u2192 <em>"Does that feel like setting the business up to actually work from day one?"</em><br>P4 \u2192 <em>"Does that change the size of the business you can actually build?"</em></p>
          <p>If they can't give a confident yes, <strong>that's a real objection surfacing early \u2014 when you can still address it.</strong> Skip the tie-down and that same objection shows up at price drop, fully formed and twice as hard to handle.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="guide-section">
    <div class="guide-section-title">The Two Pitch Modes \u2014 When to Use Each</div>

    <p style="font-size:12.5px;line-height:1.65;color:#475569;margin-bottom:14px;">There are three core linking techniques used to build value inside a pitch \u2014 <em>Quick Benefit</em>, <em>Market Problem</em>, and <em>Discovery Linking</em>. We've simplified them into <strong>two modes</strong> you'll actually toggle on the call:</p>

    <div class="guide-mode-card">
      <div class="guide-mode-card-head">
        <div class="guide-mode-icon q">\u26a1</div>
        <div><div class="guide-mode-name">Quick = Benefit Linking</div><div class="guide-mode-tagline">Short \u00b7 fast \u00b7 keeps call momentum \u00b7 ~30\u201345 sec</div></div>
      </div>
      <div class="guide-mode-body">
        <p>Feature-and-benefit framing. <em>"Here's what we do, here's what it gives you, here's the tie-down."</em> Used when <strong>the pillar is NOT their core constraint</strong> \u2014 it's not the silver bullet, it's not what discovery told you they actually need.</p>
        <p>The prospect doesn't need to be sold on this pillar. They just need to know it exists and is included. <strong>Don't burn 90 seconds on a pillar that isn't what's broken.</strong></p>
      </div>
      <div class="guide-mode-when"><strong>Example:</strong> A Goal Syntax prospect who's already confident in their niche and pricing \u2014 run Quick on P1 (Offer). Save the airtime for P2 (Lead Engine), which is almost always the universal Goal Syntax fight.</div>
    </div>

    <div class="guide-mode-card">
      <div class="guide-mode-card-head">
        <div class="guide-mode-icon m">\ud83d\udccb</div>
        <div><div class="guide-mode-name">Full = Market Problem + Discovery (blended)</div><div class="guide-mode-tagline">~60\u2013120 sec \u00b7 compare-and-contrast + their words</div></div>
      </div>
      <div class="guide-mode-body">
        <p>Full mode combines two linking techniques into one delivery:</p>
        <p><strong>1. Market Problem Linking (the safe baseline)</strong> \u2014 Name what most coaches do, why it fails, why ours is different. This is the foundation of Full mode. <strong>If you're ever unsure how to deliver a Full pitch, just read the Market Problem Linking copy and it will land well.</strong> The contrast carries the weight.</p>
        <p><strong>2. Discovery Linking (the skill ceiling)</strong> \u2014 Open with their exact words from discovery, then transition into the Market Problem framing. The amber <strong>Discovery Hook</strong> callout in Full mode gives you 2\u20133 ready-made openers based on common Goal Syntax discovery answers. Pick one if it matches what they said. Skip if it doesn't.</p>
        <p><strong>Use Full mode when the pillar IS their core constraint</strong> \u2014 what discovery told you they actually need. As you build reps, layer Discovery Linking on top of Market Problem to make it feel surgical.</p>
      </div>
      <div class="guide-mode-when"><strong>The coaching:</strong> Market Problem is the cake. Discovery Linking is the icing. The cake alone closes calls. The icing makes the close feel inevitable. <strong>When in doubt, default to Market Problem and don't force Discovery.</strong></div>
    </div>
  </div>

  <div class="guide-decision">
    <div class="guide-decision-eyebrow">\u2192 Decision Rule \u2014 Before You Enter the Pitch</div>
    <div class="guide-decision-q">Pause 5 seconds and ask: "Which pillar matches their #1 stated fear \u2014 and what were their exact words?"</div>
    <div class="guide-decision-body">
      <p>That pillar runs <span class="accent">Full</span>. Everything else runs <span class="accent">Quick</span>.</p>
      <p><strong>The rule that holds:</strong> only <strong>ONE</strong> pillar runs Full per call. Try to run all four in Full and the pitch dilutes \u2014 you stop sounding like a doctor diagnosing one specific issue and start sounding like a salesperson reading a brochure. <strong>Pick the one. Make it precise. Keep the others moving.</strong></p>
    </div>
  </div>

  <div class="guide-section"><div class="guide-section-title">Goal Syntax \u2014 Default Mode by Pillar</div><table class="guide-table"><thead><tr><th>Pillar</th><th>Default</th><th>Override When</th></tr></thead><tbody>
  <tr><td>P1 \u2014 AI Offer Optimization</td><td><span class="guide-mode-chip chip-f">\ud83d\udccb Full</span></td><td>Already confident in niche/pricing \u2192 Quick</td></tr>
  <tr><td>P2 \u2014 Lead Generation Engine</td><td><span class="guide-mode-chip chip-f">\ud83d\udccb Full</span></td><td>Almost always Full \u2014 the three-stage sequence is the universal Goal Syntax belief break</td></tr>
  <tr><td>P3 \u2014 Impact AI Business Manager</td><td><span class="guide-mode-chip chip-q">\u26a1 Quick</span></td><td>Tech anxiety or "I'm not techy" \u2192 Full + Hook</td></tr>
  <tr><td>P4 \u2014 Conversion + Retention</td><td><span class="guide-mode-chip chip-q">\u26a1 Quick</span></td><td>Fear of selling or worried about retention \u2192 Full + Hook</td></tr>
  </tbody></table></div>

  <div class="guide-callout" style="background:linear-gradient(180deg,#f0fdfa 0%,#ecfeff 100%);border-color:#5eead4;border-left-color:#0d9488;">
    <div class="guide-callout-title" style="color:#134e4a;">\ud83d\udcca The Goal Syntax Calculator \u2014 How to Deploy Each View</div>
    <div class="guide-callout-body" style="color:#134e4a;">
      <p><strong>Core rule:</strong> The calculator <em>confirms</em> what they've already said. Don't lead with math \u2014 math reinforces beliefs the prospect verbalized first. If they haven't said it, the calculator can't sell it.</p>
      <p><strong>Universal rule:</strong> Don't click <em>Share View</em> until the prospect has verbalized the belief you're about to confirm. <strong>Math that confirms = closes. Math that surprises = creates resistance.</strong></p>
      <p style="margin-top:14px;padding:10px 12px;background:rgba(254,243,199,.6);border-radius:6px;border-left:3px solid #f59e0b;"><strong>\u26a0\ufe0f View 1 \u2014 Cost of Inaction</strong> \u00b7 <em>OPTIONAL \u00b7 Default: skip.</em><br>Most calls don't need this. The Knife Turn lands harder verbally \u2014 let the moment breathe. Pull this up ONLY if: (a) they deflect or minimize the cost question, (b) they gave a low/fuzzy number you need to anchor, or (c) they're math-oriented and won't feel it without seeing it. <strong>If you do pull it up:</strong> focus on the "Already Lost" card (months stuck \u00d7 the gap) \u2014 it's the heaviest hitter for Goal Syntax. Don't narrate all three cards; let the biggest one land alone.</p>
      <p style="padding:10px 12px;background:rgba(220,252,231,.6);border-radius:6px;border-left:3px solid #15803d;"><strong>\u2705 View 2 \u2014 Clients Needed</strong> \u00b7 <em>ALWAYS \u00b7 During Pre-Pitch (after offer/price conversation).</em><br>This is the math moment. Makes the goal feel achievable. Builds <strong>Belief #4 (Desire)</strong> + <strong>Belief #5 (Money/Achievability)</strong>. The prospect should react with <em>"that's actually doable."</em> If they don't, the offer or price is wrong \u2014 go back and reposition before continuing.</p>
      <p style="padding:10px 12px;background:rgba(220,252,231,.6);border-radius:6px;border-left:3px solid #15803d;"><strong>\u2705 View 3 \u2014 6-Month Path</strong> \u00b7 <em>ALWAYS \u00b7 During Pillar 2 (Lead Engine).</em><br>Shows compounding cash flow: $80K contracted / $50K cash by month 6 / $30K still paying in (at 4/mo sign rate). Builds <strong>Belief #2 (DIY doubt)</strong> + <strong>Belief #7 (Trust the methodology).</strong> Don't explain \u2014 share, pause, ask <em>"is that the kind of business that makes the next 12 months feel different than the last?"</em></p>
      <p style="padding:10px 12px;background:rgba(220,252,231,.6);border-radius:6px;border-left:3px solid #15803d;margin-bottom:0;"><strong>\u2705 View 4 \u2014 Combined Reveal</strong> \u00b7 <em>ALWAYS \u00b7 Post-pitch, before price drop.</em><br>The final lock-in. Two numbers side by side \u2014 cost of another 12 months staying stuck (red) vs. revenue built in your first 6 months (green). The Cost of Inaction math lives here. This is where the prospect makes the <em>internal decision</em> before they hear the number. Stay silent. The math closes them.</p>
    </div>
  </div>

  <div class="guide-section"><div class="guide-section-title">High Level Promise Formula</div><div class="guide-formula">"This is going to be <strong>[# pillars] steps</strong> to get you from <strong>[current situation]</strong> to <strong>[desired situation]</strong> in <strong>[approximate timeframe]</strong>."</div></div>

  <div class="guide-section"><div class="guide-section-title">Discovery Hook \u2014 How to Use the Amber Callout</div><div class="guide-formula">In Full mode, the amber Discovery Hook callout shows 2\u20133 ready-made openers based on common discovery answers. <strong>Pick one if it matches what they actually said. Skip it entirely if it doesn't.</strong> The hook replaces the old Discovery mode \u2014 cleaner, less toggling, same belief-locking effect.</div></div>

  <div class="guide-section"><div class="guide-section-title">Tie-Down Rule \u2014 No "Make Sense?"</div><div class="guide-rule">Every pillar ends with a belief-specific question. If they can't give a confident yes, that's a real objection \u2014 surface it now, not at price drop.</div></div>

  </div></div>`;
}

function renderNav(){document.getElementById('phase-nav').innerHTML=PHASES.map(p=>`<div class="nav-item" id="nav-${p.id}" style="--nc:${p.color}" onclick="jumpTo(${p.id})"><div class="nav-dot" style="background:${p.color}">${p.id}</div><div class="nav-text"><div class="nav-name">${p.name}</div>${p.sub?`<div class="nav-sub">${p.sub}</div>`:''}</div></div>`).join('');}

function renderPhase(p){
  const isPitch=p.id===6;
  return`<div class="phase" id="phase-${p.id}"><div class="phase-head" style="background:${p.color}"><div class="phase-badge">${p.id}</div><div class="phase-info"><div class="phase-name">${p.name}</div>${p.sub?`<div class="phase-sub">${p.sub}</div>`:''}</div>${isPitch?`<div class="pitch-toggle-bar"><button class="ptgl-btn active" id="ptgl-quick" onclick="setGlobalPM('quick')">\u26a1 Quick</button><button class="ptgl-btn" id="ptgl-full" onclick="setGlobalPM('full')">\ud83d\udccb Full</button></div>`:''}</div><div class="phase-body">${p.blocks.map(b=>renderBlock(b)).join('')}</div></div>`;
}

function renderContent(){
  const phase0=PHASES.find(p=>p.id===0);
  const otherPhases=PHASES.filter(p=>p.id!==0);
  const phase0Html=phase0?renderPhase(phase0):'';
  const otherPhasesHtml=otherPhases.map(p=>renderPhase(p)).join('');
  document.getElementById('content').innerHTML=phase0Html+pitchGuideHtml()+otherPhasesHtml+'<div class="calc-footer">IFCA · Impact Fitness Coaching Academy · impactcoachacademy.com</div>';
}

let mode='quick',coaching=false;
function applyClasses(){
  document.body.classList.toggle('sop-mode',mode==='sop');
  document.body.classList.toggle('notes-on',coaching);
  const navGuide=document.getElementById('nav-guide');
  if(navGuide)navGuide.style.display=mode==='sop'?'flex':'none';
}
function setMode(m){
  mode=m;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='quick')||(i===1&&m==='sop')));
  if(m==='quick'){coaching=false;document.getElementById('coach-btn').classList.remove('on');}
  applyClasses();
  if(m==='quick'){
    const navGuide=document.getElementById('nav-guide');
    if(navGuide&&navGuide.classList.contains('active')){jumpTo(0);}
  }
}
function toggleCoaching(){if(mode==='quick'){setMode('sop');return;}coaching=!coaching;document.getElementById('coach-btn').classList.toggle('on',coaching);applyClasses();}
function jumpTo(id){const el=document.getElementById(`phase-${id}`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));const an=document.getElementById(`nav-${id}`);if(an)an.classList.add('active');}
function jumpToGuide(){const el=document.getElementById('phase-guide');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));document.getElementById('nav-guide').classList.add('active');}
document.addEventListener('DOMContentLoaded',()=>{
  const content=document.getElementById('content');
  content.addEventListener('scroll',()=>{
    const ge=document.getElementById('phase-guide');
    const phase0=document.getElementById('phase-0');
    const clear=()=>document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    if(phase0&&content.scrollTop<phase0.offsetTop-40){clear();document.getElementById('nav-0')?.classList.add('active');return;}
    if(mode==='sop'&&ge&&phase0){
      const guideTop=ge.offsetTop-40;
      const phase1=document.getElementById('phase-1');
      if(phase1&&content.scrollTop>=guideTop&&content.scrollTop<phase1.offsetTop-40){clear();document.getElementById('nav-guide').classList.add('active');return;}
    }
    let active=0;
    PHASES.forEach(p=>{const el=document.getElementById(`phase-${p.id}`);if(el&&el.offsetTop-40<=content.scrollTop)active=p.id;});
    clear();
    const an=document.getElementById(`nav-${active}`);
    if(an){an.classList.add('active');an.scrollIntoView({block:'nearest'});}
  });
});
renderNav();renderContent();initPMs();applyClasses();document.getElementById('nav-0').classList.add('active');
</script>
</body>
</html>
